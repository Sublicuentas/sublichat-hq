<!DOCTYPE html>
<html lang="es">
<head>
    <style>
        body { background: #000; color: #00FF00; font-family: 'Orbitron', sans-serif; height: 100vh; display: flex; flex-direction: column; }
        .hud-header { border-bottom: 2px solid #E60000; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .main-view { flex-grow: 1; display: grid; grid-template-columns: 300px 1fr; gap: 20px; padding: 20px; }
        .panel { border: 1px solid #333; padding: 20px; background: rgba(20,20,20,0.8); }
        .chat-log { height: 400px; overflow-y: auto; color: #fff; }
    </style>
</head>
<body>
    <div class="hud-header">
        <img src="public/logo.png" style="height: 50px;">
        <h2>CUARTEL GENERAL - SUBLICHAT</h2>
        <img src="public/mascota.png" style="height: 60px; border-radius: 50%;">
    </div>
    <div class="main-view">
        <div class="panel"><h3>DATOS CLIENTES</h3><div id="data-display">Esperando consulta...</div></div>
        <div class="panel">
            <div class="chat-log" id="chat"></div>
            <input type="text" id="userInput" style="width:100%; background:#111; color:#fff; padding:10px;">
            <button onclick="enviar()" style="background:#E60000; color:#fff;">CONSULTAR</button>
        </div>
    </div>
    <script>
        async function enviar() {
            const input = document.getElementById('userInput').value;
            const chat = document.getElementById('chat');
            const res = await fetch('/api/chat', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ consulta: input }) 
            }).then(r => r.json());
            chat.innerHTML += `<div>Lic: ${input}</div><div style="color:#E60000;">Sublichat: ${res.respuesta || res.error}</div>`;
        }
    </script>
</body>
</html>
