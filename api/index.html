<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sublichat | Cuartel General</title>
    <style>
        body { background: #050505; color: #fff; font-family: 'Orbitron', sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #top-bar { display: flex; justify-content: space-between; padding: 20px; border-bottom: 2px solid #E60000; background: #0a0a0a; }
        #logo { height: 60px; }
        #mascota { height: 150px; border-radius: 50%; border: 2px solid #00FFFF; }
        #chat-area { flex-grow: 1; padding: 20px; overflow-y: auto; background: #000; }
        .input-panel { padding: 20px; background: #111; display: flex; gap: 10px; }
        input { flex-grow: 1; padding: 15px; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; }
        button { background: #E60000; border: none; padding: 15px 30px; color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="top-bar">
    <img src="/logo.png" id="logo" alt="Logo Sublicuentas">
    <div>CENTRO DE MANDO DIGITAL</div>
    <img src="/mascota.png" id="mascota" alt="Secretario Virtual">
</div>

<div id="chat-area">
    <div style="color: #00FFFF;">> Sistema Sublichat en línea, Lic. ¿Qué orden desea ejecutar?</div>
</div>

<div class="input-panel">
    <input type="text" id="userInput" placeholder="Ej: Analizar cartera de clientes...">
    <button onclick="enviar()">EJECUTAR</button>
</div>

<script>
    async function enviar() {
        const input = document.getElementById('userInput');
        const chat = document.getElementById('chat-area');
        const respuesta = await fetch('/api/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ consulta: input.value })
        }).then(res => res.json());
        
        chat.innerHTML += `<div>Lic: ${input.value}</div>`;
        chat.innerHTML += `<div style="color: #E60000;">Sublichat: ${respuesta.respuesta}</div>`;
        input.value = "";
    }
</script>
</body>
</html>
