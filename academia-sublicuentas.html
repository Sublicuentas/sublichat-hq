  </div>

<script>
// ===== FIREBASE: hereda la sesión de Sublichat (login de asesor) =====
const firebaseConfig={apiKey:"AIzaSyA_b1a0Zo4OIAj4KayD5ChtPWToANQ1nrA",authDomain:"sublicuentasbot.firebaseapp.com",projectId:"sublicuentasbot",storageBucket:"sublicuentasbot.firebasestorage.app",messagingSenderId:"17227154881",appId:"1:17227154881:web:654a1c94c2c6a331d95b40",measurementId:"G-40Z71BGE7E"};
const ACA_COL='academia_progreso';
let _fs=null, CLOUD=false, _user=null;
let _resolveAuth; const authReady=new Promise(r=>{_resolveAuth=r;});
(async()=>{
  try{
    const { initializeApp, getApps, getApp } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
    const { getAuth, onAuthStateChanged }    = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
    const { getFirestore, doc, getDoc, setDoc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    const app = getApps().length ? getApp() : initializeApp(firebaseConfig);
    const auth = getAuth(app);
    _fs={ db:getFirestore(app), doc, getDoc, setDoc };
    let first=true;
    onAuthStateChanged(auth,(user)=>{
      _user=user||null; CLOUD=!!user;
      if(first){ first=false; _resolveAuth(!!user); }
      if(user){ Promise.all(Object.keys(USERS).map(u=>cloudPull(u))).then(()=>{ try{renderUsers();}catch(_){ } }); }
    },()=>{ if(first){first=false;_resolveAuth(false);} CLOUD=false; });
  }catch(e){ console.warn('FB init:', e&&e.message); CLOUD=false; if(_resolveAuth)_resolveAuth(false); }
})();
async function cloudPull(user){
  await authReady;
  if(!CLOUD||!_fs) return null;
  try{
    const snap=await _fs.getDoc(_fs.doc(_fs.db,ACA_COL,user));
    if(snap.exists()){
      const d=snap.data()||{};
      if(Array.isArray(d.progress)) progress[user]=d.progress;
      if(typeof d.pin==='string'&&d.pin) pins[user]=d.pin;
      settings[user]=settings[user]||{};
      if(typeof d.avatar==='number') settings[user].avatar=d.avatar;
      if(typeof d.mascot==='number') settings[user].mascot=d.mascot;
      localStorage.setItem('aca_focus_progress',JSON.stringify(progress));
      localStorage.setItem('aca_focus_pins',JSON.stringify(pins));
      localStorage.setItem('aca_focus_settings',JSON.stringify(settings));
      return d;
    }
  }catch(e){ console.warn('cloudPull:', e&&e.message); }
  return null;
}
async function cloudPush(user){
  await authReady;
  if(!CLOUD||!_fs||!user) return;
  try{
    const s=settings[user]||{};
    await _fs.setDoc(_fs.doc(_fs.db,ACA_COL,user),{
      pin: pins[user]||null,
      progress: progress[user]||[],
      avatar: (typeof s.avatar==='number'? s.avatar : USERS[user].defaultAvatar),
      mascot: (typeof s.mascot==='number'? s.mascot : 0),
      name: USERS[user].name,
      updatedAt: Date.now()
    },{merge:true});
  }catch(e){ console.warn('cloudPush:', e&&e.message); }
}
const USERS={
  libni:{name:'Libni',bg:'linear-gradient(135deg,#FFE66D,#FFB44D)',defaultAvatar:0},
  naara:{name:'Naara',bg:'linear-gradient(135deg,#8BF5D2,#35D6B2)',defaultAvatar:1}
};

carga, para volverlo cliente fijo:", "options": ["Solo 'de nada'", "Ofrecer avisarle de promos y guardar su ID", "No responder"], "correct": 1}]}, {"type": "leccion", "cat": "Marketing y WhatsApp", "icon": "📣", "badge": "Marketing", "title": "El texto que sí vende", "subtitle": "Lección", "teach": "Una publicación vende cuando tiene un beneficio claro y le dice a la gente QUÉ HACER ('escríbeme'). Texto en mayúsculas y genérico no engancha. Una sola oferta clara vende más que 20 amontonadas.", "bien": "🎬 Netflix desde Lps. ___ · entrega al toque · ¿lo querés hoy? Escribime 👇", "mal": "NETFLIX DISPONIBLE PRECIOS BARATOS", "recuerda": "Beneficio claro + llamado a la acción ('escríbeme'). Una oferta protagonista, no una lista."}, {"type": "error", "cat": "Marketing y WhatsApp", "icon": "📣", "badge": "Marketing", "title": "¿Qué subir al estado?", "subtitle": "Detecta el error", "prompt": "Quiere subir algo a su estado para vender. ¿Cuál opción es mejor?", "options": [{"text": "Una recomendación del día con un 'escríbeme si la querés ver hoy'.", "ok": true}, {"text": "La lista de 20 precios todos los días.", "ok": false}, {"text": "Nada, esperar que escriban.", "ok": false}], "explain": "Mezclar contenido útil con un llamado a escribir genera mensajes. Solo precios cansa."}, {"type": "vof", "cat": "Marketing y WhatsApp", "icon": "📣", "badge": "Marketing", "title": "Verdadero o falso: marketing", "subtitle": "Verdadero o falso", "items": [{"stmt": "Mostrar una captura (sin datos privados) de un cliente feliz da más confianza que uno mismo decir que es el mejor.", "answer": true, "explain": "La prueba de otros convence más."}, {"stmt": "Mandar la misma promo a los 800 clientes es lo más efectivo.", "answer": false, "explain": "Mejor separar por interés: gamers, familias, fútbol."}, {"stmt": "La letra grande y legible llega a más gente, incluidas personas mayores.", "answer": true, "explain": "Si no se lee, no vende."}]}, {"type": "opcion", "cat": "Marketing y WhatsApp", "ic  mentalidad", "icon": "🚀", "badge": "Mentalidad", "title": "La constancia vence al talento", "subtitle": "Lección", "teach": "Vender es de constancia, no de suerte. En los días flojos es cuando más importa hacer la rutina: revisar vencimientos, escribir a unos clientes, subir un estado. Lo que se hace todos los días es lo que sostiene el negocio.", "bien": "Hoy está flojo, pero igual reviso vencimientos, escribo a 5 clientes y subo un estado.", "mal": "Hoy no se vendió, ni modo.", "recuerda": "La constancia diaria, aunque sea poquito, gana a largo plazo."}, {"type": "reto", "cat": "Motivación y mentalidad", "icon": "🚀", "badge": "Mentalidad", "title": "Tu rutina de hoy", "subtitle": "Reto del día", "teach": "Un día ordenado vende más que uno a la suerte. Empiece por lo seguro (cobrar), luego responda, luego busque clientes nuevos, y al final suba contenido.", "reto": "Hoy: 1) revise quién vence, 2) cóbrele a 3, 3) escríbale a 1 cliente dormido, 4) suba 1 estado."}, {"type": "leccion", "cat": "Motivación y mentalidad", "icon": "🚀", "badge": "Mentalidad", "title": "Mentalidad de marca", "subtitle": "Lección", "teach": "Cómo se ve usted misma se nota en cómo vende. Pensar 'es solo cuentitas' la hace vender barato y disculparse por cobrar. Verse como una empresa con clientes, soporte y sistema propio la hace cobrar lo justo, con seguridad.", "bien": "Somos Sublicuentas, con 800 clientes y soporte de verdad.", "mal": "Es que esto es chiquito.", "recuerda": "Preséntese como la empresa que es. La seguridad vende."}, {"type": "vof", "cat": "Motivación y mentalidad", "icon": "🚀", "badge": "Mentalidad", "title": "Verdadero o falso: mentalidad", "subtitle": "Verdadero o falso", "items": [{"stmt": "En una crisis, su calma calma a los clientes.", "answer": true, "explain": "Estresarse y responder mal multiplica el problema."}, {"stmt": "Una queja bien vista es información gratis para mejorar.", "answer": true, "explain": "Le dice qué arreglar para que no vuelva a pasar."}, {"stmt": "Vender algo que sabe que va a fallar está bien si gana hoy.", "answer": false, "explain": "La reputación es el negocio: un cliente engañado cuesta muchos mañana."}]}, {"type": "reto", "cat": "Motivación y mentalidad", "icon": "🚀", "badge": "Mentalidad", "title": "Meta de la semana", "subtitle": "Reto del día", "teach": "Lo que se mide, crece. Cada domingo anote cuánto vendió, cuántos clientes nuevos y cuántos renovaron, y póngase una meta para la siguiente semana.", "reto": "Este domingo: anote ventas, clientes nuevos y renovaciones de la semana, y fije 1 meta concreta."}, {"type": "examen", "cat": "Motivación y mentalidad", "icon": "🚀", "badge": "Mentalidad", "title": "Examen: Mentalidad", "subtitle": "Examen del módulo", "questions": [{"q": "Un día está lento. ¿Qué hace?", "options": ["Rendirse por hoy", "Hacer la rutina igual", "Esperar a mañana"], "correct": 1}, {"q": "¿Qué cuida el negocio a largo plazo?", "options": ["Vender lo que sea hoy", "Priorizar la confianza del cliente", "No pensar en mañana"], "correct": 1}, {"q": "¿Cómo saber si el negocio mejora?", "options": ["Adivinando", "Midiendo ventas y poniéndose metas", "No llevando cuentas"], "correct": 1}]}, {"type": "leccion", "cat": "Herramientas e IA", "icon": "🤖", "badge": "Herramientas", "title": "La IA para lo repetido", "subtitle": "Lección", "teach": "La IA sirve para ahorrarte tiempo en lo que se repite: responder precios, armar recordatorios de cobro, resumir tus números. Vos revisás y mandás. No la uses para reemplazar tu criterio, sino para ir más rápido.", "bien": "Le pido a la IA un recordatorio amable de renovación, le cambio el nombre y lo mando.", "mal": "Escribo cada mensaje desde cero, uno por uno.", "recuerda": "Use la IA para lo repetido; el criterio y la decisión los pone usted."}, {"type": "vof", "cat": "Herramientas e IA", "icon": "🤖", "badge": "Herramientas", "title": "Verdadero o falso: datos seguros", "subtitle": "Verdadero o falso", "items": [{"stmt": "Dejar la base de datos abierta a cualquiera para 'que jale rápido' es peligroso.", "answer": true, "explain": "Es como dejar la tienda sin llave."}, {"stmt": "Las reglas de seguridad protegen los datos de los clientes.", "answer": true, "explain": "Solo entra quien debe."}, {"stmt": "Si solo va a cambiar un color de un botón, conviene tocar todo el código.", "answer": false, "explain": "Cambie solo lo visual; no toque la lógica que ya funciona."}]}, {"type": "ordenar", "cat": "Herramientas e IA", "icon": "🤖", "badge": "Herramientas", "title": "Cambiar algo sin romper", "subtitle": "Ordene los pasos", "prompt": "Va a cambiar algo en el bot o la app. Ordene cómo hacerlo con cuidado:", "steps": ["Anotar qué hace cada parte", "Cambiar solo lo necesario", "Probar el cambio aparte", "Revisar que lo de antes sigue funcionando", "Recién entonces publicar"]}, {"type": "opcion", "cat": "Herramientas e IA", "icon": "🤖", "badge": "Herramientas", "title": "Usar bien las herramientas", "subtitle": "Mini-examen", "questions": [{"q": "¿Para qué sirve mejor la IA en la atención?", "options": ["Reemplazarla a usted", "Responder rápido lo repetido", "No atender a nadie"], "correct": 1, "explain": "La IA libera tiempo respondiendo lo repetido."}, {"q": "Un panel de control sirve para:", "options": ["Que se vea bonito", "Ver dinero, clientes y vencimientos de un vistazo", "Nada"], "correct": 1, "explain": "Lo que se ve claro se decide mejor."}]}, {"type": "examen", "cat": "Herramientas e IA", "icon": "🤖", "badge": "Herramientas", "title": "Examen: Herramientas e IA", "subtitle": "Examen del módulo", "questions": [{"q": "La IA conviene usarla para:", "options": ["Decidir todo sola", "Acelerar lo repetido, con su revisión", "Nada"], "correct": 1}, {"q": "Para que la web funcione NO debe:", "options": ["Poner reglas de quién entra", "Dejar la base abierta o las claves a la vista", "Revisar la seguridad"], "correct": 1}, {"q": "Para diseñar con IA y que se vea de su marca:", "options": ["Dejar que haga cualquier cosa", "Guiarla con sus colores y estilo", "No usarla"], "correct": 1}]}];

let current=null;
let pin='';
let activeCat='Todos';
let selectedAnswer=null;
let progress=JSON.parse(localStorage.getItem('aca_focus_progress')||'{}');
let pins=JSON.parse(localStorage.getItem('aca_focus_pins')||'{}');
let settings=JSON.parse(localStorage.getItem('aca_focus_settings')||'{}');
function save(){localStorage.setItem('aca_focus_progress',JSON.stringify(progress));localStorage.setItem('aca_focus_pins',JSON.stringify(pins));localStorage.setItem('aca_focus_settings',JSON.stringify(settings));if(current)cloudPush(current);}
function ensureSettings(user){settings[user]=settings[user]||{avatar:USERS[user].defaultAvatar,mascot:0};return settings[user];}
function getAvatar(user){const s=ensureSettings(user);return AVATARS[s.avatar]||AVATARS[USERS[user].defaultAvatar];}
function getMascot(user){const s=ensureSettings(user);return MASCOTS[s.mascot]||MASCOTS[0];}
function goHome(){sessionStorage.setItem('sublichat_skip_intro','1');window.location.href='./index.html#inicio';}
function show(id){document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');document.getElementById('topSettings').style.display=(id==='dash'||id==='lesson'||id==='settings')?'grid':'none';window.scrollTo(0,0);}
function toast(t){const el=document.getElementById('toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1800);}
function celebrate(){const c=document.getElementById('confetti');c.innerHTML='';['⭐','💎','🎉','🚀','🏆','✨'].forEach((e,idx)=>{for(let i=0;i<5;i++){const s=document.createElement('i');s.textContent=e;s.style.left=(Math.random()*100)+'%';s.style.fontSize=(18+Math.random()*18)+'px';s.style.animationDelay=(Math.random()*0.4)+'s';c.appendChild(s);}});setTimeout(()=>c.innerHTML='',2100);}
function renderUsers(){
  const wrap=document.getElementById('usersList');
  wrap.innerHTML=Object.keys(USERS).map(id=>{const av=getAvatar(id);return `<button class="user" data-user="${id}" type="button"><span class="avatar" style="background:${av.bg}">${av.emoji}</span><span class="uinfo"><span class="role">Agente de ventas</span><h3>${USERS[id].name}</h3><small>Ruta comercial · avatar personal · acceso por PIN</small></span><span class="go">›</span></button>`;}).join('');
  wrap.querySelectorAll('.user').forEach(btn=>btn.addEventListener('click',()=>selectUser(btn.dataset.user)));
}
async function selectUser(user){current=user;pin='';let av=getAvatar(current);document.getElementById('pinAvatar').textContent=av.emoji;document.getElementById('pinAvatar').style.background=av.bg;document.getElementById('pinName').textContent=USERS[current].name;document.getElementById('pinHelp').textContent='Verificando…';paintDots();show('pin');await cloudPull(current);av=getAvatar(current);document.getElementById('pinAvatar').textContent=av.emoji;document.getElementById('pinAvatar').style.background=av.bg;document.getElementById('pinHelp').textContent=pins[current]?'Ingrese su PIN':'Cree su PIN nuevo de 4 dígitos';}
document.getElementById('homeBack').addEventListener('click',()=>{if(document.getElementById('select').classList.contains('active')||document.getElementById('dash').classList.contains('active'))goHome();else if(document.getElementById('pin').classList.contains('active'))show('select');else{renderDash();show('dash');}});
document.getElementById('topSettings').addEventListener('click',()=>{renderSettings();show('settings');});
function paintDots(){document.querySelectorAll('#dots .dot').forEach((d,i)=>d.classList.toggle('on',i<pin.length));}
const keys=document.getElementById('keys');
['1','2','3','4','5','6','7','8','9','Borrar','0','Volver'].forEach(k=>{const b=document.createElement('button'); b.type='button'; b.textContent=k; b.className=isNaN(k)?'fn':'';b.addEventListener('click',()=>press(k)); keys.appendChild(b);});
function press(k){if(k==='Volver'){show('select');return;}if(k==='Borrar'){pin=pin.slice(0,-1);paintDots();return;}if(pin.length<4){pin+=k;paintDots();}if(pin.length===4){if(!pins[current]){pins[current]=pin;save();toast('PIN guardado');renderDash();show('dash');}else if(pin===pins[current]){renderDash();show('dash');}else{pin='';paintDots();toast('PIN incorrecto');}}}
function doneList(){return progress[current]||[];}
function pct(){return Math.round((doneList().length/COURSES.length)*100);}
function unlockedIndex(){return doneList().length;}
function xp(){return doneList().length*50;}
function earnedBadges(){const done=doneList();const base=[];if(done.length>=1)base.push('Primer paso');if(done.length>=5)base.push('Disciplina');if(done.length>=12)base.push('Agente Pro');if(done.length>=25)base.push('Cierre');if(done.length>=50)base.push('Supervisor');if(done.length>=80)base.push('Máquina de ventas');if(done.length>=COURSES.length)base.push('Leyenda');return [...new Set([...base,...COURSES.filter((c,i)=>done.includes(i)&&((i+1)%10===0)).map(c=>c.badge)])];}
function categories(){return ['Todos',...Array.from(new Set(COURSES.map(c=>c.cat)))];}
function renderDash(){
  const done=doneList(); const av=getAvatar(current); const mascot=getMascot(current); const cats=categories();
  const visible=COURSES.map((c,i)=>({...c,i})).filter(c=>activeCat==='Todos'||c.cat===activeCat);
  const next=COURSES[unlockedIndex()]||COURSES[COURSES.length-1];
  document.getElementById('dash').innerHTML=`<div class="dashHead"><span class="avatar" style="background:${av.bg}">${av.emoji}</span><div style="flex:1"><h2>Hola, ${USERS[current].name}</h2><p>${pct()}% completado · ${xp()} XP · ${COURSES.length} cursos</p><div class="xp"><i style="width:${pct()}%"></i></div></div></div>
  <div class="stats"><div class="stat"><b>📚 ${done.length}</b><span>Cursos</span></div><div class="stat"><b>⭐ ${xp()}</b><span>XP</span></div><div class="stat"><b>🏆 ${earnedBadges().length}</b><span>Logros</span></div></div>
  <div class="coach-card"><div class="coach-emoji">${mascot.emoji}</div><div><b>${mascot.name}</b><p>${mascot.line}</p></div></div>
  <div class="mission-card"><h3>🎯 Misión de hoy</h3><ul><li>Complete 1 curso: <b>${next.title}</b>.</li><li>Escriba una práctica libre antes de ver la respuesta modelo.</li><li>Use un mensaje aprendido con un cliente real.</li></ul></div>
  <div class="achievement-card"><div class="achievement-title">🏅 Logros de superación</div><div class="badges">${['Primer paso','Disciplina','Agente Pro','Cierre','Renovador','Soporte','Marketing','Caso Pro','Supervisor','Máquina de ventas','Leyenda'].map(b=>`<span class="badge-pill ${earnedBadges().includes(b)?'on':''}">${earnedBadges().includes(b)?'✅':'🔒'} ${b}</span>`).join('')}</div></div>
  <div class="module-filter">${cats.map(c=>`<button type="button" class="filter-btn ${c===activeCat?'on':''}" data-cat="${c}">${c}</button>`).join('')}</div>
  <div class="section">Ruta interactiva · desbloqueo por niveles · ${visible.length} cursos en esta vista</div>
  <div class="path">${visible.map(c=>`<button type="button" class="node ${done.includes(c.i)?'done':''} ${c.i===unlockedIndex()?'current':''} ${c.i>unlockedIndex()?'locked':''}" data-i="${c.i}"><div class="bubble">${done.includes(c.i)?'✅':c.icon}</div><div class="info"><b>${c.title}</b><small>Nivel ${c.i+1} · ${c.subtitle}</small><span class="cat">${c.cat}</span></div></button>`).join('')}</div>
  <button type="button" class="ghost" id="openSettings">⚙️ Ajustes de avatar y mascota</button><button type="button" class="ghost" id="changeAgent">Cambiar agente</button><button type="button" class="ghost" id="backInicio">Volver a inicio</button>`;
  document.querySelectorAll('.filter-btn').forEach(b=>b.addEventListener('click',()=>{activeCat=b.dataset.cat;renderDash();}));
  document.querySelectorAll('.node').forEach(n=>n.addEventListener('click',()=>{const i=Number(n.dataset.i);if(i>unlockedIndex()){toast('Complete el nivel anterior');return;}renderLesson(i);show('lesson');}));
  document.getElementById('openSettings').addEventListener('click',()=>{renderSettings();show('settings');});
  document.getElementById('changeAgent').addEventListener('click',()=>show('select'));
  document.getElementById('backInicio').addEventListener('click',goHome);
}
function typeLabel(t){return {leccion:'📖 Lección',opcion:'✅ Opción múltiple',ordenar:'🔀 Ordene los pasos',vof:'⚖️ Verdadero o falso',error:'🔎 Detecta el error',reto:'🎯 Reto',examen:'🏆 Examen del módulo'}[t]||'';}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function enableComplete(){const b=document.getElementById('completeLevel');if(b)b.disabled=false;}
function fb(id,txt,cls){const e=document.getElementById(id);if(e){e.innerHTML=txt;e.className='feedback'+(cls?' '+cls:'');}}

function renderLesson(i){
  const c=COURSES[i]; const done=doneList().includes(i); const mascot=getMascot(current);
  let body='';
  if(c.type==='leccion'){
    body=`<div class="exercise-card"><h3>📖 ${c.title}</h3><p class="teach">${c.teach}</p>
      <div class="ex-pair"><div class="ex-good"><span class="ex-tag">✅ Así sí</span><div>${c.bien}</div></div>
      <div class="ex-bad"><span class="ex-tag">❌ Así no</span><div>${c.mal}</div></div></div>
      <div class="recuerda"><b>💡 Recuerde:</b> ${c.recuerda}</div>
      <button type="button" class="primary" id="gotIt">Entendido ✅</button></div>`;
  } else if(c.type==='reto'){
    body=`<div class="exercise-card"><h3>🎯 ${c.title}</h3><p class="teach">${c.teach}</p>
      <div class="reto-box">🎯 ${c.reto}</div>
      <button type="button" class="primary" id="gotIt">Me comprometo a hacerlo ✅</button></div>`;
  } else if(c.type==='ordenar'){
    body=`<div class="exercise-card"><h3>🔀 ${c.title}</h3><p>${c.prompt}</p>
      <div class="ord-pool" id="ordPool"></div>
      <div class="ord-line">Su orden:</div><ol class="ord-result" id="ordResult"></ol>
      <div class="feedback" id="fbk">Toque los pasos en el orden correcto.</div>
      <button type="button" class="ghost" id="ordReset">Reiniciar</button></div>`;
  } else if(c.type==='error'){
    body=`<div class="exercise-card"><h3>🔎 ${c.title}</h3><p>${c.prompt}</p>
      <div class="choices" id="optWrap">${c.options.map((o,oi)=>`<button type="button" class="choice" data-oi="${oi}">${o.text}</button>`).join('')}</div>
      <div class="feedback" id="fbk">Elija la opción correcta.</div></div>`;
  } else { // opcion / examen / vof
    body=quizBody(c);
  }
  document.getElementById('lesson').innerHTML=`<div class="lesson"><div class="meta">Nivel ${i+1} · ${c.cat}</div><div class="bigicon">${c.icon}</div><h2>${c.title}</h2><div class="type-tag">${typeLabel(c.type)}</div>
    <div class="coach-card"><div class="coach-emoji">${mascot.emoji}</div><div><b>${mascot.name} dice:</b><p>${mascot.line}</p></div></div>
    ${body}
    <button type="button" class="primary" id="completeLevel" ${done?'':'disabled'}> ${done?'Nivel completado · volver a ruta':'Completar nivel'}</button>
    <button type="button" class="ghost" id="backRoute">Volver a ruta</button></div>`;
  if(done) enableComplete();
  wire(c);
  document.getElementById('completeLevel').addEventListener('click',()=>complete(i));
  document.getElementById('backRoute').addEventListener('click',()=>{renderDash();show('dash');});
}

function quizBody(c){
  if(c.type==='vof'){
    return `<div class="exercise-card"><h3>⚖️ ${c.title}</h3>${c.items.map((it,qi)=>`
      <div class="vof-item" data-qi="${qi}"><p class="vof-q">${it.stmt}</p>
        <div class="vof-btns"><button type="button" class="vbtn" data-qi="${qi}" data-v="1">Verdadero</button><button type="button" class="vbtn" data-qi="${qi}" data-v="0">Falso</button></div>
        <div class="vof-exp" id="exp${qi}"></div></div>`).join('')}
      <div class="feedback" id="fbk">Responda los ${c.items.length}.</div></div>`;
  }
  const head=c.type==='examen'?`<h3>🏆 ${c.title}</h3><p>Conteste todo y vea su nota.</p>`:`<h3>✅ ${c.title}</h3>`;
  return `<div class="exercise-card">${head}${c.questions.map((q,qi)=>`
    <div class="q-item" data-qi="${qi}"><p class="q-text">${qi+1}. ${q.q}</p>
      <div class="choices">${q.options.map((o,oi)=>`<button type="button" class="choice" data-qi="${qi}" data-oi="${oi}">${o}</button>`).join('')}</div>
      ${c.type==='opcion'?`<div class="q-exp" id="exp${qi}"></div>`:''}</div>`).join('')}
    <div class="feedback" id="fbk"></div>${c.type==='examen'?'<button type="button" class="ghost" id="seeScore">Ver mi nota</button>':''}</div>`;
}

function wire(c){
  if(c.type==='leccion'||c.type==='reto'){
    document.getElementById('gotIt').addEventListener('click',()=>{enableComplete();toast('¡Bien! Nivel listo');document.getElementById('gotIt').textContent='Listo ✅';});
    return;
  }
  if(c.type==='error'){
    let ans=false;
    document.querySelectorAll('#optWrap .choice').forEach(b=>b.addEventListener('click',()=>{
      if(ans)return; ans=true; const oi=+b.dataset.oi;
      document.querySelectorAll('#optWrap .choice').forEach((x,xi)=>{x.classList.add(c.options[xi].ok?'good':'');});
      b.classList.add(c.options[oi].ok?'good':'bad');
      fb('fbk',(c.options[oi].ok?'✅ ¡Correcto! ':'❌ Esa no. ')+c.explain);
      enableComplete();
    }));
    return;
  }
  if(c.type==='vof'){
    const total=c.items.length; let done=0;
    document.querySelectorAll('.vbtn').forEach(b=>b.addEventListener('click',()=>{
      const qi=+b.dataset.qi; const item=document.querySelector(`.vof-item[data-qi="${qi}"]`);
      if(item.dataset.ans)return; item.dataset.ans='1';
      const v=b.dataset.v==='1'; const ok=v===c.items[qi].answer;
      item.querySelectorAll('.vbtn').forEach(x=>x.disabled=true);
      b.classList.add(ok?'vgood':'vbad');
      document.getElementById('exp'+qi).innerHTML=(ok?'✅ ':'❌ ')+c.items[qi].explain;
      done++; if(done>=total){fb('fbk','¡Listo! Ya puede completar el nivel.');enableComplete();}
    }));
    return;
  }
  if(c.type==='ordenar'){
    const correct=c.steps; let order=[];
    const pool=document.getElementById('ordPool'); const result=document.getElementById('ordResult');
    function paint(){pool.innerHTML=shuffle(correct.map((s,idx)=>({s,idx}))).filter(o=>!order.includes(o.idx)).map(o=>`<button type="button" class="chip" data-idx="${o.idx}">${o.s}</button>`).join('');
      pool.querySelectorAll('.chip').forEach(ch=>ch.addEventListener('click',()=>{order.push(+ch.dataset.idx);draw();}));}
    function draw(){result.innerHTML=order.map(idx=>`<li>${correct[idx]}</li>`).join('');
      if(order.length===correct.length){const ok=order.every((v,k)=>v===k);
        if(ok){fb('fbk','✅ ¡Orden correcto!','');enableComplete();}
        else{fb('fbk','❌ Ese orden no es. Toque Reiniciar e inténtelo de nuevo.');}
      } else { paint(); }
    }
    document.getElementById('ordReset').addEventListener('click',()=>{order=[];draw();paint();});
    paint();
    return;
  }
  // opcion / examen
  const total=c.questions.length; let answered=0, correct=0;
  document.querySelectorAll('.q-item .choice').forEach(b=>b.addEventListener('click',()=>{
    const qi=+b.dataset.qi, oi=+b.dataset.oi; const item=document.querySelector(`.q-item[data-qi="${qi}"]`);
    if(item.dataset.ans)return; item.dataset.ans='1';
    const q=c.questions[qi]; const ok=oi===q.correct;
    item.querySelectorAll('.choice').forEach((x,xi)=>{x.disabled=true; if(xi===q.correct)x.classList.add('good');});
    if(!ok)b.classList.add('bad');
    if(c.type==='opcion'){document.getElementById('exp'+qi).innerHTML=(ok?'✅ ':'❌ ')+q.explain;}
    answered++; if(ok)correct++;
    if(c.type==='opcion'){ fb('fbk',`Va ${answered}/${total}`); if(answered>=total){fb('fbk','¡Listo! Ya puede completar el nivel.');enableComplete();} }
    else { if(answered>=total){fb('fbk','Toque «Ver mi nota».');} }
  }));
  if(c.type==='examen'){
    document.getElementById('seeScore').addEventListener('click',()=>{
      if(answered<total){fb('fbk','Conteste todas las preguntas primero.');return;}
      const pct=Math.round(correct/total*100);
      const aprob=pct>=70;
      fb('fbk',`<div class="grade-box">${aprob?'🏆':'📚'} Nota: ${correct}/${total} (${pct}%). ${aprob?'¡Aprobado! Excelente.':'Repáselo y vuelva a intentar para dominarlo.'}</div>`);
      enableComplete(); if(aprob)celebrate();
    });
  }
}
function renderSettings(){
  const s=ensureSettings(current); const av=getAvatar(current); const mascot=getMascot(current);
  document.getElementById('settings').innerHTML=`<div class="settings-card"><h2>⚙️ Ajustes de ${USERS[current].name}</h2><p>Cambie avatar y mascota coach. Se guarda solo para este agente.</p>
  <div class="coach-card"><div class="coach-emoji">${av.emoji}</div><div><b>Avatar actual</b><p>${av.name} · Coach: ${mascot.name}</p></div></div>
  <div class="option-title">Avatar del agente</div><div class="avatar-grid">${AVATARS.map((a,i)=>`<button type="button" class="avatar-tile ${s.avatar===i?'on':''}" data-avatar="${i}"><span class="av-emoji" style="background:${a.bg}">${a.emoji}</span><small>${a.name}</small></button>`).join('')}</div>
  <div class="option-title">Mascota coach</div><div class="mascot-grid">${MASCOTS.map((m,i)=>`<button type="button" class="mascot-tile ${s.mascot===i?'on':''}" data-mascot="${i}"><span class="mascot-emoji">${m.emoji}</span><small>${m.name}</small></button>`).join('')}</div>
  <button type="button" class="primary" id="saveSettings">Guardar ajustes</button><button type="button" class="ghost" id="settingsBack">Volver a ruta</button></div>`;
  document.querySelectorAll('[data-avatar]').forEach(b=>b.addEventListener('click',()=>{settings[current].avatar=Number(b.dataset.avatar);save();renderSettings();}));
  document.querySelectorAll('[data-mascot]').forEach(b=>b.addEventListener('click',()=>{settings[current].mascot=Number(b.dataset.mascot);save();renderSettings();}));
  document.getElementById('saveSettings').addEventListener('click',()=>{save();renderUsers();toast('Ajustes guardados');renderDash();show('dash');});
  document.getElementById('settingsBack').addEventListener('click',()=>{renderDash();show('dash');});
}
function complete(i){
  progress[current]=progress[current]||[];
  if(!progress[current].includes(i)){progress[current].push(i);progress[current].sort((a,b)=>a-b);save();celebrate();const msg=(i+1)%10===0?'🏆 Logro desbloqueado: '+COURSES[i].badge:'+50 XP · nuevo nivel desbloqueado';toast(msg);}
  renderDash();show('dash');
}
renderUsers();
</script>
</body>
</html>
