tino. Crunchyroll: anime. Prime/Max: catálogo enorme. Spotify: música. Canva: diseño."}, {"h": "Para quién es cada una", "p": "Familias con niños → Disney+. Fan de anime → Crunchyroll. Amante de novelas → Vix. Quien quiere de todo → Prime o Max. El que trabaja → Canva o IA."}, {"h": "Manténgase al día", "p": "Salen estrenos y cambian catálogos. Estar informado le da de qué hablar y un gancho de venta siempre fresco."}], "examples": [{"sit": "Cliente: «¿Qué tiene Disney+?»", "bien": "Disney+ tiene Disney, Pixar, Marvel y Star Wars, ideal para la familia y sin contenido pesado. ¿Es para los niños?", "mal": "películas y series", "why": "Conocer el catálogo le permite recomendar con seguridad."}, {"sit": "Cliente: «¿En cuál veo de todo?»", "bien": "Para máxima variedad, Prime Video o Max: catálogo enorme y estrenos seguido. ¿Cuál prefiere?", "mal": "en cualquiera", "why": "Saber lo fuerte de cada una guía al cliente."}], "scenarios": [{"client": "Cliente: «Quiero algo para toda la familia con niños»", "options": [{"t": "Disney+ es perfecto: contenido sano y de sobra para los peques.", "ok": true}, {"t": "Cualquiera sirve.", "ok": false}, {"t": "Crunchyroll, tiene caricaturas.", "ok": false}], "explain": "Conocer el catálogo permite encajar al cliente con lo correcto."}, {"client": "Cliente: «Soy fan del anime, ¿qué me recomiendas?»", "options": [{"t": "Crunchyroll, que es la especializada en anime y trae los estrenos al tiempo.", "ok": true}, {"t": "Netflix, creo que tiene algo.", "ok": false}, {"t": "Disney+.", "ok": false}], "explain": "Saber qué es cada plataforma evita recomendar mal."}], "quiz": [{"q": "Conocer su catálogo lo convierte en:", "opts": ["Un simple vendedor", "Un asesor de confianza", "Un repartidor"], "correct": 1, "explain": "Asesora, no solo vende."}, {"q": "Para una familia con niños, lo fuerte es:", "opts": ["Crunchyroll", "Disney+", "Spotify"], "correct": 1, "explain": "Disney+ es familiar."}, {"q": "Estar al día con estrenos le da:", "opts": ["Más trabajo y nada más", "Un gancho de venta siempre fresco", "Confusión"], "correct": 1, "explain": "Tema de conversación y venta."}], "tip": "Hoy repase qué es lo fuerte de 3 plataformas para recomendarlas con seguridad."}, {"cat": "Contenido y recomendaciones", "icon": "🎬", "badge": "Contenido", "title": "Recomendar por tipo de cliente", "subtitle": "Lección 3 · A cada quien lo suyo", "intro": "El mismo producto no le sirve a todos. Aprender a leer qué tipo de cliente tiene enfrente le permite recomendar justo lo que va a disfrutar y comprar.", "concept": {"term": "Perfil del cliente", "def": "Es el tipo de persona que le escribe: familia, joven, gamer, persona mayor, alguien que trabaja. Cada perfil quiere cosas distintas; identificarlo le permite recomendar lo que de verdad le encaja."}, "sections": [{"h": "Lea las señales", "p": "'Para los niños' → familia. 'Para ver anime' → joven fan. 'Para mi negocio' → uso comercial. Cada pista le dice qué ofrecer."}, {"h": "Adapte el lenguaje", "p": "Al gamer háblele con su jerga; a una señora, simple y cálido. Conectar en su tono ayuda a vender."}, {"h": "Recomiende el encaje, no lo caro", "p": "Ofrézcale lo que ese perfil va a aprovechar. Un cliente que disfruta lo que compró, vuelve."}], "examples": [{"sit": "Cliente: «Es para mis hijos pequeños»", "bien": "Para los peques, Disney+ es ideal: contenido sano y de sobra. ¿Se lo dejo listo?", "mal": "lleve Netflix", "why": "Identifica el perfil (familia con niños) y recomienda el encaje."}, {"sit": "Cliente joven: «quiero pa' ver anime y jugar»", "bien": "¡Va! Crunchyroll para el anime, y si querés te armo combo con una recarga. ¿Le metemos?", "mal": "tengo Netflix nomás", "why": "Adapta el tono y recomienda lo que ese perfil disfruta."}], "scenarios": [{"client": "Escribe alguien: «necesito algo para la sala de espera de mi clínica»", "options": [{"t": "Para una sala de espera le sirve variedad o noticias; ¿lo pondría en TV o tablet?", "ok": true}, {"t": "Le vendo Spotify.", "ok": false}, {"t": "Eso no se puede.", "ok": false}], "explain": "Lee el uso (negocio, sala de espera) y recomienda según eso."}, {"client": "Cliente mayor: «quiero ver mis novelas»", "options": [{"t": "Para novelas le recomiendo Vix, y le explico la instalación bien fácil 😊", "ok": true}, {"t": "Crunchyroll.", "ok": false}, {"t": "Lo más caro que tengo.", "ok": false}], "explain": "Identifica el perfil y recomienda + adapta el trato."}], "quiz": [{"q": "Identificar el perfil del cliente sirve para:", "opts": ["Venderle lo más caro", "Recomendar lo que de verdad le encaja", "Perder tiempo"], "correct": 1, "explain": "Encaje, no lo caro."}, {"q": "Al gamer conviene hablarle:", "opts": ["Muy formal", "Con su jerga, conectando", "Sin responder"], "correct": 1, "explain": "Conectar en su tono vende."}, {"q": "Un cliente que disfruta lo que compró:", "opts": ["No vuelve", "Vuelve y recomienda", "Se queja"], "correct": 1, "explain": "El encaje fideliza."}], "tip": "Hoy, con el próximo cliente, identifique su perfil antes de recomendar."}, {"cat": "Contenido y recomendaciones", "icon": "🎬", "badge": "Contenido", "title": "Vender con estrenos", "subtitle": "Lección 4 · La novedad como gancho", "intro": "La gente se mueve por lo nuevo. Usar los estrenos como gancho crea deseo y un motivo para comprar HOY, no después.", "concept": {"term": "Gancho de venta", "def": "Es algo que llama la atención y crea ganas de comprar ya. Un estreno popular es un gancho perfecto: el cliente quiere verlo ahora, y usted le da la forma de hacerlo hoy mismo."}, "sections": [{"h": "Mencione estrenos concretos", "p": "'Acaba de salir [serie] que está pegando.' Lo específico crea deseo; 'hay muchas cosas' no engancha."}, {"h": "Conecte el estreno con la venta", "p": "'Con su Netflix lo ve hoy. ¿Se lo activo?'. Una el deseo con la acción de comprar."}, {"h": "Aproveche fechas y temporadas", "p": "Mundial, vacaciones, estrenos grandes: úselos para ofertas con sentido. La gente compra para un momento."}], "examples": [{"sit": "Cliente: «¿Qué hay de nuevo?»", "bien": "¡Bastante! Acaba de salir [estreno] que está pegando un montón. Con su Netflix lo ve hoy. ¿Se lo activo?", "mal": "un montón de cosas", "why": "Estreno concreto + acción crea deseo y venta hoy."}, {"sit": "Temporada de fútbol importante", "bien": "Viene la fecha grande de la selección ⚽ Con la IPTV no se pierde ningún partido. ¿Se la dejo lista para el finde?", "mal": "(no aprovecha la fecha)", "why": "Aprovechar el momento da un motivo concreto para comprar."}], "scenarios": [{"client": "Cliente indeciso: «no sé, tal vez después»", "options": [{"t": "Justo salió [estreno] que está pegando; con la cuenta lo ve esta noche. ¿Se lo dejo?", "ok": true}, {"t": "Bueno, ahí me avisa.", "ok": false}, {"t": "Como quiera.", "ok": false}], "explain": "Un estreno concreto crea urgencia honesta para decidir hoy."}, {"client": "Se acerca el estreno de una película muy esperada", "options": [{"t": "Aviso a mis clientes: 'ya casi sale [película], tené tu cuenta lista para verla el día 1'.", "ok": true}, {"t": "No hago nada.", "ok": false}, {"t": "Subo solo precios.", "ok": false}], "explain": "Anticipar el estreno genera ventas de quienes no quieren perdérselo."}], "quiz": [{"q": "Un buen gancho de venta es:", "opts": ["Decir 'hay muchas cosas'", "Un estreno concreto que crea deseo", "El precio en mayúsculas"], "correct": 1, "explain": "Lo específico engancha."}, {"q": "Tras mencionar el estreno conviene:", "opts": ["Dejarlo ahí", "Conectarlo con comprar hoy", "Cambiar de tema"], "correct": 1, "explain": "Una deseo y acción."}, {"q": "Las fechas y temporadas sirven para:", "opts": ["Nada", "Ofertas con sentido (Mundial, vacaciones)", "Confundir"], "correct": 1, "explain": "La gente compra para un momento."}], "tip": "Hoy use un estreno o una fecha concreta como gancho con un cliente o en su estado."}, {"cat": "Contenido y recomendaciones", "icon": "🎬", "badge": "Contenido", "title": "Combos de entretenimiento", "subtitle": "Lección 5 · Paquetes que dan más valor", "intro": "Un combo bien armado le da más valor al cliente y más venta a usted. Aprenda a juntar plataformas que tengan sentido para cada persona.", "concept": {"term": "Combo", "def": "Es juntar dos o más servicios en un paquete a mejor precio que comprarlos por separado. Bien armado, el cliente siente que ahorra y usted vende más; mal armado, parece que solo quiere sacarle dinero."}, "sections": [{"h": "Junte lo que tenga sentido", "p": "Netflix + Disney para una familia. Spotify + recarga para un gamer. El combo debe encajar con quién es el cliente."}, {"h": "Preséntelo como ahorro", "p": "'En combo le sale más barato que aparte.' El cliente compra cuando ve el beneficio, no la suma."}, {"h": "Deje la puerta abierta", "p": "'Si no, igual le dejo lo que pidió.' Sube la venta sin presionar y mantiene la buena onda."}], "examples": [{"sit": "Familia que compró Netflix", "bien": "¿Le sumo Disney+ para los niños? En combo le sale más barato que aparte. Si no, igual le dejo el Netflix 😊", "mal": "tiene que llevar los dos", "why": "Combo que encaja, como ahorro y sin obligar."}, {"sit": "Para el fin de semana familiar", "bien": "Le armo combo Netflix + Disney para ver de todo en familia este finde, más barato que separado. ¿Va?", "mal": "tengo varias cosas", "why": "Combo pensado para un momento es concreto y deseable."}], "scenarios": [{"client": "Cliente gamer compró una recarga", "options": [{"t": "¿Te armo combo con Spotify para tus partidas? Te sale barato. Si no, tranqui.", "ok": true}, {"t": "Tenés que llevar el combo.", "ok": false}, {"t": "No le ofrezco nada.", "ok": false}], "explain": "Combo relacionado (música para jugar), como ahorro y con buena onda."}, {"client": "Cliente: «Solo quiero Netflix, nada más»", "options": [{"t": "¡Listo el Netflix! Si algún día querés sumar algo, aquí estoy 😊", "ok": true}, {"t": "Pero llévese también Disney.", "ok": false}, {"t": "Está bien, ya no le ofrezco nunca.", "ok": false}], "explain": "Respete el 'solo eso' y deje la puerta abierta, sin insistir."}], "quiz": [{"q": "Un buen combo debe:", "opts": ["Juntar cosas al azar", "Encajar con quién es el cliente", "Ser el más caro"], "correct": 1, "explain": "Que tenga sentido para él."}, {"q": "El combo se presenta como:", "opts": ["Una obligación", "Un ahorro, con puerta abierta", "Algo caro"], "correct": 1, "explain": "Ahorro + 'si no, tranquilo'."}, {"q": "Si el cliente dice 'solo eso':", "opts": ["Insistir", "Respetarlo y dejar la puerta abierta", "Ofrecerlo 5 veces"], "correct": 1, "explain": "Respete y mantenga la buena onda."}], "tip": "Hoy arme un combo que tenga sentido para un cliente y ofrézcalo como ahorro."}, {"cat": "Contenido y recomendaciones", "icon": "🎬", "badge": "Contenido", "title": "Crear la recomendación del día", "subtitle": "Lección 6 · Contenido que trae clientes solos", "intro": "Publicar una buena recomendación hace que la gente le escriba sin que usted persiga a nadie. Es marketing gratis que da conversación y ventas.", "concept": {"term": "Recomendación del día", "def": "Es una publicación corta donde sugiere algo bueno para ver, con una invitación a escribirle. Da de qué hablar, mantiene su negocio presente y hace que entren clientes por sí solos."}, "sections": [{"h": "Una sugerencia + una frase corta", "p": "'🔥 [Serie] está imperdible. ¿La querés ver hoy? Escribime.' Útil y con un llamado a la acción."}, {"h": "Hágalo costumbre", "p": "Suba una al día. La gente se acostumbra a esperarla y le escribe por ese contenido."}, {"h": "Mezcle con sus ofertas", "p": "No solo recomiende: de vez en cuando incluya el precio o una promo. Contenido que además vende."}], "examples": [{"sit": "Va a subir algo al estado", "bien": "🎬 Recomendación del día: [serie] está pegando. ¿La querés ver hoy? Escribime 👇", "mal": "subo la lista de precios", "why": "Contenido útil + llamado a escribir trae mensajes."}, {"sit": "Estado de un día tranquilo", "bien": "🍿 ¿Aburrido? Hoy do' trae reclamos. Saber en qué aparatos funciona y preguntar el modelo evita sorpresas y deja al cliente contento.", "concept": {"term": "Compatibilidad", "def": "Es saber si el servicio funciona en el aparato del cliente (Smart TV, TV Box, celular, compu) y cómo instalarlo en cada uno. Preguntar el modelo antes de prometer evita fallas y reclamos."}, "sections": [{"h": "Pregunte marca y modelo", "p": "'¿De qué marca y modelo es su tele?' Con eso confirma la app correcta y los pasos exactos."}, {"h": "Sepa las opciones", "p": "Smart TV (tienda de apps), TV Box (Play Store o Downloader), celular/tablet (app), compu (web o app). Cada uno tiene su forma."}, {"h": "No prometa de más", "p": "En vez de 'sirve en todas', diga 'casi seguro, confírmeme el modelo'. Honestidad evita el reclamo."}], "examples": [{"sit": "Cliente: «¿Me sirve en mi tele?»", "bien": "Casi seguro que sí 😊 ¿De qué marca y modelo es? Así le digo exactamente qué instalar y no hay sorpresas.", "mal": "en todas sirve", "why": "Pedir el modelo evita prometer lo que tal vez no funcione."}, {"sit": "Cliente: «Solo tengo el celular»", "bien": "¡Perfecto, en el celular se ve muy bien! Le paso la app y los datos, y le voy guiando. 📱", "mal": "necesita una tele", "why": "Conocer las opciones le permite vender igual al del celular."}], "scenarios": [{"client": "Cliente: «Tengo una tele vieja sin internet»", "options": [{"t": "Para esa tele necesitaría un TV Box o usar el celular; le explico las opciones.", "ok": true}, {"t": "Sí, en todas sirve, cómprelo.", "ok": false}, {"t": "Esa tele no sirve para nada.", "ok": false}], "explain": "Conozca las opciones y sea honesto; no prometa de más ni desprecie su equipo."}, {"client": "Cliente: «¿Funciona en una compu?»", "options": [{"t": "Sí, en compu se puede por la app o por la web. ¿La usaría en Windows?", "ok": true}, {"t": "No, solo en tele.", "ok": false}, {"t": "Ni idea.", "ok": false}], "explain": "Saber dónde funciona le permite atender cualquier caso con seguridad."}], "quiz": [{"q": "Antes de prometer que funciona en su tele:", "opts": ["Decir 'en todas sirve'", "Pedir marca y modelo", "Decir que su tele no sirve"], "correct": 1, "explain": "El modelo confirma la compatibilidad."}, {"q": "En un TV Box, si la app no está en la tienda:", "opts": ["No se puede", "Se usa el Downloader", "Se devuelve"], "correct": 1, "explain": "El Downloader es el plan B."}, {"q": "Prometer 'sirve en todo' sin confirmar:", "opts": ["Es lo mejor", "Trae reclamos cuando no funciona", "No pasa nada"], "correct": 1, "explain": "Honestidad evita reclamos."}], "tip": "Hoy, antes de prometer compatibilidad, pídale al cliente la marca y modelo de su aparato."}, {"cat": "IPTV y dispositivos", "icon": "📺", "badge": "IPTV", "title": "El plan correcto de pantallas", "subtitle": "Lección 4 · Cuántos van a ver a la vez", "intro": "Venderle una pantalla a una familia grande es buscarse un reclamo. Preguntar cuántos verán a la vez le permite vender el plan correcto desde el inicio.", "concept": {"term": "Plan de pantallas", "def": "Es la cantidad de dispositivos que pueden ver al mismo tiempo con un servicio. Si el cliente verá en varias teles a la vez, necesita un plan de varias pantallas; con una sola, se traba."}, "sections": [{"h": "Pregunte cuántos a la vez", "p": "'¿En cuántas teles lo verán al mismo tiempo?' Ese dato define el plan correcto."}, {"h": "Explique el porqué", "p": "'Si son varias a la vez con una sola pantalla, se traba.' El cliente entiende y compra el plan que sirve."}, {"h": "Venda bien desde el inicio", "p": "Es mejor vender el plan correcto que tener reclamos después. Más venta y mejor servicio."}], "examples": [{"sit": "Cliente: «Lo vamos a ver en 3 teles a la vez»", "bien": "¡Gracias por avisar! Le conviene el plan de 3 pantallas para que todos vean sin trabarse. ¿Se lo armo?", "mal": "con una basta", "why": "El plan correcto evita reclamos ('se traba')."}, {"sit": "Cliente: «Somos yo y mi esposa nada más»", "bien": "Entonces c ", "icon": "📣", "badge": "Marketing", "title": "Publicar para vender", "subtitle": "Lección única · Estados, canal e imagen de marca que traen clientes", "intro": "Publicar bien hace que los clientes le escriban solos. Aquí aprende a hacer estados, ofertas e imagen de marca que sí generan mensajes, sin parecer spam.", "concept": {"term": "Marketing", "def": "Marketing es todo lo que hace para que la gente lo conozca, confíe y le compre, sin que usted tenga que perseguirla. En WhatsApp son sus estados, su canal, sus ofertas y la imagen de su marca."}, "sections": [{"h": "Beneficio claro + llamado a la acción", "p": "Una publicación vende cuando dice un beneficio claro y le dice a la gente QUÉ HACER: 'escríbeme'. Sin ese 'escríbeme', la gente ve y no actúa."}, {"h": "Una oferta protagonista, no una lista", "p": "Publique UNA oferta clara, no 20 plataformas amontonadas. Lo claro se actúa; lo amontonado nadie lo lee."}, {"h": "Mezcle contenido útil con ofertas", "p": "En el estado o canal, suba también cosas útiles: estrenos, tips, 'recomendación del día'. La gente lo sigue porque le sirve, y de paso compra."}, {"h": "Imagen limpia y letra legible", "p": "Una imagen con sus colores, su logo y poco texto se ve seria. Letra grande para que hasta una persona mayor la lea. Si no se lee, no vende."}], "examples": [{"sit": "Anunciar Netflix en el estado", "bien": "🎬 Netflix desde Lps. ___ · entrega al toque · ¿lo querés hoy? Escribime 👇", "mal": "NETFLIX DISPONIBLE PRECIOS BARATOS", "why": "Beneficio claro + 'escríbeme'; las mayúsculas frías no enganchan."}, {"sit": "Un cliente quedó feliz con la IPTV", "bien": "Don Marco no sabía ver el fútbol y le instalamos la IPTV; ahora no se pierde un partido ⚽ ¿Querés lo mismo? Escribime.", "mal": "(no hace nada con eso)", "why": "Una historia real de cliente feliz vende sola; desaprovecharla es perder marketing gratis."}], "scenarios": [{"client": "Quiere subir algo al estado para vender. ¿Qué conviene?", "options": [{"t": "Una recomendación del día con un 'escríbeme si la querés ver hoy'.", "ok": true}, {"t": "La lista de 20 precios todos los días.", "ok": false}, {"t": "Nada, esperar que escriban.", "ok": false}], "explain": "Contenido útil + llamado a escribir genera mensajes."}, {"client": "Va a hacer una promo. ¿Cómo la publica?", "options": [{"t": "Una oferta protagonista clara: 'Combo Netflix + Disney Lps. ___'.", "ok": true}, {"t": "Las 20 plataformas con todos los precios juntos.", "ok": false}, {"t": "Puro texto en mayúsculas.", "ok": false}], "explain": "Una oferta clara vende más que una lista enorme."}], "quiz": [{"q": "¿Qué hace que una publicación venda?", "opts": ["Muchos colores", "Beneficio claro y un 'escríbeme'", "Mayúsculas"], "correct": 1, "explain": "Beneficio + llamado a la acción."}, {"q": "Lo mejor en una publicación es:", "opts": ["20 ofertas juntas", "Una oferta protagonista clara", "Solo el precio"], "correct": 1, "explain": "Lo claro se actúa."}, {"q": "Para mantener vivo el canal/estado:", "opts": ["Solo precios", "Mezclar contenido útil con ofertas", "No subir nada"], "correct": 1, "explain": "Contenido útil atrae y retiene."}, {"q": "La imagen de marca debe ser:", "opts": ["Llena de fotos y colores", "Limpia, con sus colores y letra legible", "Sin logo"], "correct": 1, "explain": "Limpia y legible da confianza."}], "tip": "Hoy publique un estado con un beneficio claro y un 'escríbeme', no solo la lista de precios."}, {"cat": "Marketing y WhatsApp", "icon": "📣", "badge": "Marketing", "title": "El estado que vende", "subtitle": "Lección 2 · Publicaciones que traen mensajes", "intro": "El estado de WhatsApp es su vitrina gratis. Saber qué subir y cómo hace que la gente le escriba en vez de pasar de largo.", "concept": {"term": "Estado efectivo", "def": "Es una publicación de WhatsApp pensada para que la gente actúe: con un beneficio claro, buena imagen y una invitación a escribirle. Un estado bien hecho trae clientes; uno aburrido pasa desapercibido."}, "sections": [{"h": "Beneficio + llamado a la acción", "p": "'🎬 Netflix desde Lps. ___ · entrega al toque · escríbeme 👇'. Diga qué gana y qué hacer."}, {"h": "Poco texto, imagen limpia", "p": "Que se lea de un vistazo. Mucho texto o mayúsculas frías espantan."}, {"h": "Varíe el contenido", "p": "No solo precios: estrenos, tips, recomendaciones. La gente sigue al que le da algo útil."}], "examples": [{"sit": "Anunciar una oferta en el estado", "bien": "🎬 Netflix desde Lps. ___ · entrega al toque · ¿lo querés hoy? Escribime 👇", "mal": "NETFLIX BARATO DISPONIBLE", "why": "Beneficio + 'escríbeme'; las mayúsculas frías no enganchan."}, {"sit": "Estado de un día normal", "bien": "🍿 Hoy te recomiendo [serie], está pegando. Con tu cuenta la ves ya. Escribime 😉", "mal": "(no sube nada)", "why": "Contenido útil con llamado a escribir mantiene el negocio vivo."}], "scenarios": [{"client": "Quiere que le escriban por el estado", "options": [{"t": "Subo una oferta con beneficio claro y un 'escríbeme'.", "ok": true}, {"t": "Subo 20 precios en mayúsculas.", "ok": false}, {"t": "No subo nada.", "ok": false}], "explain": "Beneficio + llamado a la acción trae mensajes."}, {"client": "Su estado tiene mucho texto y nadie escribe", "options": [{"t": "Lo simplifico: poco texto, imagen limpia y un 'escríbeme'.", "ok": true}, {"t": "Le agrego más texto.", "ok": false}, {"t": "Lo dejo igual.", "ok": false}], "explain": "Poco texto y claro se lee y se actúa."}], "quiz": [{"q": "Un estado que vende lleva:", "opts": ["Solo el precio", "Beneficio claro + 'escríbeme'", "Mucho texto"], "correct": 1, "explain": "Beneficio + llamado a la acción."}, {"q": "La imagen del estado debe ser:", "opts": ["Llena de texto", "Limpia y de un vistazo", "En mayúsculas"], "correct": 1, "explain": "Clara y rápida de leer."}, {"q": "Conviene variar con:", "opts": ["Solo precios", "Estrenos, tips, recomendaciones", "Nada"], "correct": 1, "explain": "Contenido útil atrae."}], "tip": "Hoy suba un estado con un beneficio claro y un 'escríbeme', no solo el precio."}, {"cat": "Marketing y WhatsApp", "icon": "📣", "badge": "Marketing", "title": "El canal de WhatsApp", "subtitle": "Lección 3 · Su boletín de ofertas", "intro": "Un canal de WhatsApp le permite llegar a muchos a la vez. Bien usado, se vuelve su boletín de ofertas que la gente sigue porque le sirve.", "concept": {"term": "Canal de WhatsApp", "def": "Es un espacio donde publica para todos sus seguidores a la vez (como un boletín). Sirve para avisar ofertas, estrenos y tips. Crece cuando da contenido útil, no solo cuando vende."}, "sections": [{"h": "Una cosa útil al día", "p": "Estreno, promo o tip. La gente sigue el canal porque le sirve, y de paso compra."}, {"h": "No solo vender", "p": "Un canal que solo tira precios cansa y la gente lo silencia. Mezcle valor con ofertas."}, {"h": "Invite a escribir al privado", "p": "'¿Te interesa? Escríbeme al privado 👇'. El canal informa; la venta se cierra en el chat."}], "examples": [{"sit": "Publicación en el canal", "bien": "🔥 Hoy: combo Netflix + Disney a precio especial. ¿Lo querés? Escríbeme al privado 👇", "mal": "subo precios y ya", "why": "Una oferta clara + invitación al privado genera ventas."}, {"sit": "Canal medio muerto", "bien": "Subo 1 cosa útil al día (estreno o tip) para que la gente lo siga, no solo precios.", "mal": "subo lo mismo siempre", "why": "Contenido útil hace crecer el canal."}], "scenarios": [{"client": "Su canal solo tiene precios y la gente lo silencia", "options": [{"t": "Empiezo a subir tips y estrenos útiles, mezclados con ofertas.", "ok": true}, {"t": "Subo más precios.", "ok": false}, {"t": "Lo abandono.", "ok": false}], "explain": "Contenido útil mantiene vivo el canal."}, {"client": "Publica una oferta en el canal", "options": [{"t": "La cierro con '¿te interesa? escríbeme al privado'.", "ok": true}, {"t": "La dejo sin más.", "ok": false}, {"t": "Pongo solo el precio.", "ok": false}], "explain": "El canal informa; la venta se cierra en privado."}], "quiz": [{"q": "Un canal de WhatsApp sirve para:", "opts": ["Cerrar ventas ahí mismo", "Avisar a muchos (ofertas, estrenos, tips)", "Nada"], "correct": 1, "explain": "Es su boletín."}, {"q": "Para que crezca, suba:", "opts": ["Solo precios", "Contenido útil mezclado con ofertas", "Nada"], "correct": 1, "explain": "Útil + ofertas."}, {"q": "La venta del canal se cierra:", "opts": ["En el canal", "En el chat privado", "Sola"], "correct": 1, "explain": "Invite al privado."}], "tip": "Hoy suba algo útil (un estreno o tip) a su canal, con invitación al privado."}, {"cat": "Marketing y WhatsApp", "icon": "📣", "badge": "Marketing", "title": "Imagen de marca", "subtitle": "Lección 4 · Verse serio y confiable", "intro": "Cómo se ve su negocio influye en si le compran o no. Una imagen limpia y consistente da confianza y hace que cobre lo justo.", "concept": {"term": "Imagen de marca", "def": "Es la forma en que se ve y se siente su negocio: su logo, sus colores, su tono. Una imagen cuidada da confianza y seriedad; una improvisada hace dudar al cliente."}, "sections": [{"h": "Logo y colores consistentes", "p": "Use siempre los colores y el logo de Sublicuentas. La consistencia hace que lo reconozcan y confíen."}, {"h": "Limpio y profesional", "p": "Imágenes limpias, poco texto, letra legible. Menos es más: se ve serio."}, {"h": "Un tono propio", "p": "Hable siempre con la misma voz cercana y clara. La marca se vuelve memorable."}], "examples": [{"sit": "Hacer una portada para el catálogo", "bien": "Portada limpia: logo de Sublicuentas, un fondo de un color de la marca y poco texto. Se ve seria y da confianza.", "mal": "muchas fotos y colores", "why": "Limpio y consistente da confianza; recargado se ve improvisado."}, {"sit": "Un anuncio de oferta", "bien": "Mismo estilo de siempre: colores de la marca, logo y un beneficio claro. Se ve profesional.", "mal": "cada anuncio con un estilo distinto", "why": "La consistencia hace reconocible la marca."}], "scenarios": [{"client": "Va a diseñar un anuncio", "options": [{"t": "Uso los colores y el logo de Sublicuentas, limpio y con poco texto.", "ok": true}, {"t": "Lleno de fotos y colores distintos.", "ok": false}, {"t": "Sin logo, da igual.", "ok": false}], "explain": "Imagen limpia y consistente da confianza."}, {"client": "Cada publicación suya se ve totalmente distinta", "options": [{"t": "Las unifico con los mismos colores y estilo de marca.", "ok": true}, {"t": "Las dejo cada una a su modo.", "ok": false}, {"t": "Quito el logo.", "ok": false}], "explain": "La consistencia hace reconocible y confiable la marca."}], "quiz": [{"q": "Una buena imagen de marca es:", "opts": ["Recargada de fotos", "Limpia y consistente", "Sin logo"], "correct": 1, "explain": "Limpia da confianza."}, {"q": "Conviene usar siempre:", "opts": ["Colores al azar", "Los mismos colores y logo", "Ningún logo"], "correct": 1, "explain": "Consistencia = reconocimiento."}, {"q": "Una imagen improvisada hace que el cliente:", "opts": ["Confíe más", "Dude", "Compre más"], "correct": 1, "explain": "La seriedad da confianza."}], "tip": "Hoy haga una imagen con los colores y el logo de Sublicuentas, limpia y con poco texto."}, {"cat": "Marketing y WhatsApp", "icon": "📣", "badge": "Marketing", "title": "Prueba social", "subtitle": "Lección 5 · Que otros hablen por usted", "intro": "La gente confía más en lo que dicen otros clientes que en lo que usted dice de sí mismo. Mostrar pruebas de clientes felices vende sin que usted se elogie.", "concept": {"term": "Prueba social", "def": "Es mostrar que otras personas ya le compraron y quedaron contentas (capturas de agradecimiento, testimonios). Convence más que decir uno mismo que es el mejor, porque viene de terceros."}, "sections": [{"h": "Capturas de clientes felices", "p": "Un '¡todo bien, gracias!' o '¡ya lo estoy viendo!' (sin datos privados) vale más que su propio elogio."}, {"h": "Cuide la privacidad", "p": "Tape nombres y números. Muestre el mensaje, no los datos personales."}, {"h": "Cuente historias reales", "p": "'Don Marco no sabía ver el fútbol y ahora no se pierde un partido.' Las historias conectan y venden."}], "examples": [{"sit": "Quiere dar confianza a clientes nuevos", "bien": "Subo una captura (sin datos) de un cliente diciendo '¡todo bien, gracias!'. Eso convence más que yo decir que soy buena.", "mal": "digo que soy la mejor", "why": "Que otros lo digan convence más que decirlo uno."}, {"sit": "Un cliente quedó feliz con su servicio", "bien": "Cuento su historia (con permiso): 'Doña Ana quería novelas y ahora las ve feliz'. Eso vende solo.", "mal": "(no lo aprovecha)", "why": "Las historias reales son marketing gratis."}], "scenarios": [{"client": "Quiere que un cliente nuevo confíe", "options": [{"t": "Le muestro pruebas de clientes felices, cuidando sus datos.", "ok": true}, {"t": "Le digo que soy el mejor.", "ok": false}, {"t": "Le bajo el precio.", "ok": false}], "explain": "La prueba social convence más que el autoelogio."}, {"client": "Va a compartir un testimonio", "options": [{"t": "Tapo el nombre y número, muestro solo el mensaje.", "ok": true}, {"t": "Lo subo con todos los datos.", "ok": false}, {"t": "Invento un testimonio.", "ok": false}], "explain": "Cuide la privacidad y nunca invente."}], "quiz": [{"q": "La prueba social es:", "opts": ["Decir uno que es el mejor", "Mostrar que otros ya compraron felices", "Bajar el precio"], "correct": 1, "explain": "Viene de terceros, convence más."}, {"q": "Al compartir un testimonio:", "opts": ["Mostrar todos los datos", "Cuidar la privacidad", "Inventarlo"], "correct": 1, "explain": "Tape datos personales."}, {"q": "Las historias reales de clientes:", "opts": ["Aburren", "Conectan y venden", "No sirven"], "correct": 1, "explain": "Marketing gratis."}], "tip": "Hoy comparta una prueba de cliente feliz (sin datos personales) o cuente una historia real."}, {"cat": "Marketing y WhatsApp", "icon": "📣", "badge": "Marketing", "title": "Segmentar a sus clientes", "subtitle": "Lección 6 · A cada quien la oferta que le sirve", "intro": "Mandar la misma promo a todos cansa y vende poco. Separar a sus clientes por interés y enviarles lo que les sirve multiplica los resultados.", "concept": {"term": "Segmentar", "def": "Es agrupar a sus clientes por interés (gamers, familias, fans del fútbol, etc.) para enviarle a cada grupo la oferta que de verdad le sirve. Vende más que un mismo mensaje para todos."}, "sections": [{"h": "Agrupe por interés", "p": "Gamers, familias, amantes del fútbol, de novelas… Cada grupo quiere cosas distintas."}, {"h": "Mande lo que les sirve", "p": "A los gamers, promos de recargas. A las familias, Disney. A los de fútbol, IPTV. Reciben lo que les interesa y compran."}, {"h": "No bombardee a todos por igual", "p": "Un mensaje para todos hace que muchos lo ignoren o se molesten. Lo dirigido se valora."}], "examples": [{"sit": "Va a mandar una promo de recargas", "bien": "Se la mando solo a mis clientes gamers, que es lo que a ellos les interesa. Más respuestas, menos molestias.", "mal": "se la mando a los 800", "why": "Lo dirigido vende; lo masivo molesta."}, {"sit": "Promo de Disney+", "bien": "Esta va para mis clientes con familia y niños, que es justo lo que buscan.", "mal": "misma promo para todos", "why": "A cada grupo lo que le sirve."}], "scenarios": [{"client": "Tiene una promo de IPTV de deportes", "options": [{"t": "La mando a los clientes que les gusta el fútbol.", "ok": true}, {"t": "A los 800 por igual.", "ok": false}, {"t": "A nadie.", "ok": false}], "explain": "Dirigir la oferta al grupo correcto vende más."}, {"client": "Quiere que sus promos den más resultado", "options": [{"t": "Separo clientes por interés y mando a cada uno lo suyo.", "ok": true}, {"t": "Mando todo a todos.", "ok": false}, {"t": "No mando nada.", "ok": false}], "explain": "Segmentar multiplica los resultados."}], "quiz": [{"q": "Segmentar es:", "opts": ["Mandar lo mismo a todos", "Agrupar por interés y mandar lo que sirve", "No mandar nada"], "correct": 1, "explain": "A cada grupo lo suyo."}, {"q": "A los gamers conviene mandarles:", "opts": ["Promos de novelas", "Promos de recargas", "Nada"], "correct": 1, "explain": "Lo que a ellos les interesa."}, {"q": "Mandar lo mismo a todos:", "opts": ["Vende más", "Hace que muchos lo ignoren", "Es lo ideal"], "correct": 1, "explain": "Lo masivo molesta."}], "tip": "Hoy mande una oferta solo al grupo de clientes a quienes les sirve."}, {"cat": "Motivación y mentalidad", "icon": "🚀", "badge": "Mentalidad", "title": "Mentalidad de vendedor", "subtitle": "Lección 1 · Constancia, actitud y verse como empresa", "intro": "Vender bien no es solo técnica: es mentalidad. La forma en que usted piensa y se ve a sí misma se nota en cómo vende. Aquí trabaja la cabeza, que es donde empieza todo.", "concept": {"term": "Mentalidad de crecimiento", "def": "Es creer que sus resultados pueden mejorar con esfuerzo y constancia, no que 'ya es lo que es'. Un vendedor con esta mentalidad ve los días flojos y los 'no' como parte del juego, no como fracasos."}, "sections": [{"h": "La constancia vence al talento", "p": "Vender es de constancia, no de suerte. En los días flojos es cuando más importa hacer la rutina: revisar vencimientos, escribir a unos clientes, subir un estado. Lo que se hace todos los días sostiene el negocio."}, {"h": "Verse como empresa, no como 'algo chiquito'", "p": "Cómo se ve a sí misma se nota al vender. Pensar 'es solo cuentitas' la hace vender barato y disculparse por cobrar. Verse como Sublicuentas —con clientes, soporte y sistema propio— la hace cobrar lo justo con seguridad."}, {"h": "El 'no' no es personal", "p": "Un cliente que dice no hoy puede comprar mañana. No se lo tome personal: siga, dé seguimiento amable, y enfóquese en el siguiente."}, {"h": "Aprenda de cada reclamo", "p": "Una queja bien vista es información gratis: le dice qué arreglar para que no vuelva a pasar. Molestarse con quien reclama desperdicia esa lección."}], "examples": [{"sit": "Día lento, pocas ventas", "bien": "Aunque esté flojo, hago mi rutina: reviso vencimientos, escribo a 5 clientes y subo un estado.", "mal": "hoy no se vendió, ni modo", "why": "La rutina en días flojos es lo que sostiene el negocio."}, {"sit": "Pensando en el negocio", "bien": "Somos Sublicuentas, con 800 clientes y soporte de verdad; cobro lo justo con seguridad.", "mal": "es que esto es chiquito", "why": "Verse como empresa la hace vender con valor."}], "scenarios": [{"client": "Es un día lento y no ha vendido nada. ¿Qué hace?", "options": [{"t": "Hago mi rutina igual: vencimientos, contactos y un estado.", "ok": true}, {"t": "Me rindo por hoy.", "ok": false}, {"t": "Espero a que mañana sea mejor.", "ok": false}], "explain": "La constancia diaria, aunque sea poquito, gana a largo plazo."}, {"client": "Un cliente le dice que no. ¿Qué actitud conviene?", "options": [{"t": "No tomarlo personal, dar seguimiento amable y seguir.", "ok": true}, {"t": "Sentirse mal todo el día.", "ok": false}, {"t": "Reclamarle por no comprar.", "ok": false}], "explain": "El 'no' es parte del juego; mañana puede ser sí."}], "quiz": [{"q": "¿Qué sostiene el negocio en días flojos?", "opts": ["La suerte", "Hacer la rutina igual", "No hacer nada"], "correct": 1, "explain": "Constancia."}, {"q": "Verse como empresa (no 'cuentitas') ayuda a:", "opts": ["Vender barato", "Cobrar lo justo con seguridad", "Disculparse por cobrar"], "correct": 1, "explain": "La seguridad vende."}, {"q": "Un 'no' del cliente significa:", "opts": ["Que usted falló como persona", "Que hoy no, quizá mañana sí", "Que debe rendirse"], "correct": 1, "explain": "No es personal."}, {"q": "Una queja, bien vista, es:", "opts": ["Un ataque", "Información gratis para mejorar", "Algo que ignorar"], "correct": 1, "explain": "Le dice qué arreglar."}], "tip": "Hoy haga su rutina completa (vencimientos, contactos, un estado) aunque el día esté flojo."}, {"cat": "Motivación y mentalidad", "icon": "🚀", "badge": "Mentalidad", "title": "Crisis y reputación", "subtitle": "Lección 2 · Mantener la cabeza fría y cuidar el nombre", "intro": "Cuando algo falla o un cliente reclama en público, su reacción define si pierde o gana. Aquí aprende a manejar crisis con calma y a cuidar la reputación, que es su mejor negocio.", "concept": {"term": "Reputación", "def": "Es lo que la gente dice y piensa de su negocio. Se construye con clientes contentos y se daña con un mal manejo de un problema. En un negocio de clientes que vuelven y recomiendan, la reputación vale más que una venta."}, "sections": [{"h": "En crisis, su calma calma", "p": "Cuando se cae un servidor y llueven reclamos, respire y vaya por orden: avise a todos que hay falla, atienda de a uno con calma, resuelva lo que sí puede ya. El cliente se calma cuando lo ve tranquila y con un plan."}, {"h": "Comunique en las fallas generales", "p": "Si Netflix o la IPTV se cae para todos, avise con calma: 'es una falla general, ya estamos al tanto'. El silencio multiplica el pánico."}, {"h": "Las quejas públicas se llevan a privado", "p": "Si comentan algo feo en su página, responda calmado y lleve el problema a privado. Pelear en público hace que todos vean el drama."}, {"h": "La confianza por encima de la venta rápida", "p": "No venda algo que sabe que va a fallar, aunque gane hoy. Un cliente engañado le cuesta muchos mañana."}], "examples": [{"sit": "Se cayó un servidor y llueven reclamos", "bien": "Respiro y aviso a todos: hay una falla general, ya la estamos atendiendo y les aviso apenas se normalice. Gracias por la paciencia 🙏", "mal": "(me estreso y respondo mal)", "why": "La calma y un plan calman a los clientes; el estrés empeora todo."}, {"sit": "Comentan en su página: «esta tienda es una estafa»", "bien": "Lamento su mala experiencia 🙏 No tengo registro de su caso, escríbame al privado y lo resolvemos de una.", "mal": "usted está mintiendo", "why": "En público calma; el problema se arregla en privado."}], "scenarios": [{"client": "Cliente VIP de 2 años, molesto: «me fallaste, ya no compro»", "options": [{"t": "Usted es de mis clientes más importantes y me duele que pasara. Permítame arreglarlo ya y le dejo un detalle por la molestia.", "ok": true}, {"t": "Bueno, usted decide.", "ok": false}, {"t": "Le regalo todo gratis de por vida.", "ok": false}], "explain": "A un cliente valioso: reconocer, resolver y un detalle; ni dejarlo ir ni regalar todo."}, {"client": "Su proveedor de IPTV está caído hace horas", "options": [{"t": "Aviso a los clientes que hay falla, compenso con días si tarda y busco un proveedor de respaldo.", "ok": true}, {"t": "Les digo que aguanten y ya.", "ok": false}, {"t": "Apago el teléfono.", "ok": false}], "explain": "Comunicar, compensar y buscar respaldo cuida la reputación."}], "quiz": [{"q": "En una crisis con muchos reclamos:", "opts": ["Estresarse y responder mal", "Mantener la calma, avisar y resolver por orden", "Apagar el teléfono"], "correct": 1, "explain": "Su calma calma a los clientes."}, {"q": "Una queja pública fuerte se maneja:", "opts": ["Discutiendo en público", "Con calma y llevándola a privado", "Borrando y bloqueando"], "correct": 1, "explain": "Privado para resolver, público con calma."}, {"q": "¿Qué cuida el negocio a largo plazo?", "opts": ["Vender lo que sea hoy", "Priorizar la confianza del cliente", "No pensar en mañana"], "correct": 1, "explain": "La reputación es el negocio."}, {"q": "Si su proveedor falla por horas:", "opts": ["Solo decir 'aguanten'", "Avisar, compensar y buscar respaldo", "Ignorar a todos"], "correct": 1, "explain": "Comunicar y respaldar cuida el nombre."}], "tip": "Hoy, si algo falla, antes de responder respire y piense: aviso, atiendo por orden, resuelvo lo que sí puedo."}, {"cat": "Motivación y mentalidad", "icon": "🚀", "badge": "Mentalidad", "title": "Rutina y disciplina", "subtitle": "Lección 3 · El día ordenado que vende", "intro": "Las ventas no llegan solas: llegan a quien hace lo correcto todos los días. Una rutina ordenada convierte el esfuerzo en resultados constantes.", "concept": {"term": "Disciplina", "def": "Es hacer lo que hay que hacer cada día, aunque no haya ganas. En ventas, la disciplina de una rutina (cobrar, responder, buscar, publicar) es lo que trae resultados estables, no la inspiración del momento."}, "sections": [{"h": "Empiece por lo seguro", "p": "Primero cobre (vencimientos), luego responda mensajes, después busque clientes nuevos y al final suba contenido."}, {"h": "Misma rutina, todos los días", "p": "Lo que se repite se vuelve hábito, y el hábito trae resultados sin depender del ánimo."}, {"h": "Mida y ajuste", "p": "Al final del día, vea qué funcionó. Pequeños ajustes diarios mejoran mucho con el tiempo."}], "examples": [{"sit": "Empezando el día", "bien": "1) reviso vencimientos y cobro, 2) respondo pendientes, 3) busco clientes nuevos, 4) subo contenido.", "mal": "voy viendo qué cae", "why": "La rutina por prioridades vende más que la improvisación."}, {"sit": "Un día sin ánimo", "bien": "Aunque no tenga ganas, hago mi rutina; las ventas vienen de la constancia, no del humor.", "mal": "hoy no tengo ganas, mañana", "why": "La disciplina gana cuando falta el ánimo."}], "scenarios": [{"client": "Empieza el día sin saber por dónde", "options": [{"t": "Sigo mi rutina: cobro, respondo, busco clientes y subo contenido.", "ok": true}, {"t": "Veo qué cae.", "ok": false}, {"t": "Reviso redes sociales primero.", "ok": false}], "explain": "La rutina por prioridades aprovecha el día."}, {"client": "No tiene ganas de trabajar hoy", "options": [{"t": "Hago aunque sea la rutina básica; la constancia no depende del ánimo.", "ok": true}, {"t": "Lo dejo para mañana.", "ok": false}, {"t": "Espero a tener ganas.", "ok": false}], "explain": "La disciplina sostiene el negocio."}], "quiz": [{"q": "La rutina del día empieza por:", "opts": ["Redes sociales", "Lo seguro: cobrar (vencimientos)", "Lo que caiga"], "correct": 1, "explain": "Primero lo seguro."}, {"q": "Lo que trae resultados estables es:", "opts": ["La inspiración del momento", "La disciplina diaria", "La suerte"], "correct": 1, "explain": "El hábito, no el ánimo."}, {"q": "Al final del día conviene:", "opts": ["Nada", "Ver qué funcionó y ajustar", "Olvidarlo"], "correct": 1, "explain": "Pequeños ajustes mejoran mucho."}], "tip": "Hoy haga su rutina en orden: cobrar, responder, buscar clientes, subir contenido."}, {"cat": "Motivación y mentalidad", "icon": "🚀", "badge": "Mentalidad", "title": "Manejar el rechazo", "subtitle": "Lección 4 · Que un 'no' no le tumbe el día", "intro": "En ventas, los 'no' son parte del trabajo. Saber manejarlos sin desanimarse es lo que separa a quien sigue vendiendo de quien se rinde.", "concept": {"term": "Manejo del rechazo", "def": "Es no tomarse personal cuando un cliente dice que no, entender que es parte normal de vender y seguir adelante con la misma energía. Cada 'no' lo acerca al siguiente 'sí'."}, "sections": [{"h": "El 'no' no es personal", "p": "El cliente no lo rechaza a usted; quizá no era el momento o el producto. Mañana puede ser un sí."}, {"h": "Aprenda del 'no'", "p": "¿Fue el precio, la duda, el momento? A veces un 'no' le enseña a mejorar la próxima oferta."}, {"h": "Siga con energía", "p": "Un 'no' no le tumba el día. Dé seguimiento amable y enfóquese en el siguiente cliente."}], "examples": [{"sit": "Cliente: «No, gracias, no me interesa»", "bien": "¡Sin problema! Aquí estoy por si cambia de idea. Que esté bien 😊", "mal": "(se desanima todo el día)", "why": "El 'no' es parte del juego; siga con energía."}, {"sit": "Varios 'no' seguidos en el día", "bien": "Sigo igual; cada 'no' me acerca al siguiente 'sí'. Reviso si puedo mejorar la oferta y continúo.", "mal": "ya para qué sigo", "why": "La constancia tras los 'no' es lo que vende."}], "scenarios": [{"client": "Un cliente le dice que no comprará", "options": [{"t": "Lo tomo bien, dejo la puerta abierta y sigo con el siguiente.", "ok": true}, {"t": "Me desanimo y dejo de trabajar.", "ok": false}, {"t": "Le insisto cinco veces.", "ok": false}], "explain": "El 'no' no es personal; siga adelante."}, {"client": "Lleva varios rechazos hoy", "options": [{"t": "Reviso si puedo mejorar algo y sigo con la misma energía.", "ok": true}, {"t": "Me rindo por hoy.", "ok": false}, {"t": "Me enojo con los clientes.", "ok": false}], "explain": "Cada 'no' acerca al siguiente 'sí'."}], "quiz": [{"q": "Un 'no' del cliente significa:", "opts": ["Que usted vale menos", "Que hoy no, quizá mañana sí", "Que debe rendirse"], "correct": 1, "explain": "No es personal."}, {"q": "De un 'no' se puede:", "opts": ["Solo sufrir", "Aprender para mejorar la próxima", "Nada"], "correct": 1, "explain": "A veces enseña algo."}, {"q": "Tras un rechazo conviene:", "opts": ["Rendirse", "Seguir con energía y dar seguimiento", "Insistir mil veces"], "correct": 1, "explain": "Siga con el siguiente."}], "tip": "Hoy, si recibe un 'no', respire, deje la puerta abierta y siga con el siguiente cliente."}, {"cat": "Motivación y mentalidad", "icon": "🚀", "badge": "Mentalidad", "title": "Metas y medir el progreso", "subtitle": "Lección 5 · Lo que se mide, mejora", "intro": "Sin metas, se trabaja a ciegas. Ponerse objetivos y medir sus ventas le muestra si avanza y qué cambiar para crecer.", "concept": {"term": "Meta", "def": "Es un objetivo concreto y medible que se pone (por ejemplo, vender X este mes o sumar Y clientes). Medir si la cumple le dice si va bien y qué ajustar. Lo que se mide, se mejora."}, "sections": [{"h": "Póngase metas concretas", "p": "'Esta semana sumar 5 clientes nuevos' es mejor que 'vender más'. Lo concreto se puede medir."}, {"h": "Anote sus números", "p": "Cuánto vendió, cuántos nuevos, cuántos renovaron. Sin números, no sabe si mejora."}, {"h": "Revise y ajuste", "p": "Cada semana compare con su meta. Si no llegó, ajuste; si llegó, suba la meta. Así crece."}], "examples": [{"sit": "Empezando la semana", "bien": "Mi meta: sumar 5 clientes nuevos y renovar a 20. El domingo reviso si llegué.", "mal": "a ver cuánto sale", "why": "Una meta concreta da rumbo y se puede medir."}, {"sit": "Fin de semana", "bien": "Anoto: vendí ___, sumé ___ nuevos, renovaron ___. Comparo con mi meta y ajusto.", "mal": "no llevo cuentas", "why": "Medir muestra si mejora y qué cambiar."}], "scenarios": [{"client": "Quiere crecer pero no sabe si va mejor o peor", "options": [{"t": "Me pongo metas y anoto mis ventas cada semana para compararlas.", "ok": true}, {"t": "Sigo sin llevar cuentas.", "ok": false}, {"t": "Adivino.", "ok": false}], "explain": "Lo que se mide, se mejora."}, {"client": "Cumplió su meta de la semana", "options": [{"t": "Subo un poco la meta para la siguiente y sigo midiendo.", "ok": true}, {"t": "Dejo de medir, ya llegué.", "ok": false}, {"t": "Bajo la meta.", "ok": false}], "explain": "Ajustar la meta mantiene el crecimiento."}], "quiz": [{"q": "Una buena meta es:", "opts": ["'Vender más'", "Concreta y medible ('5 clientes esta semana')", "Imposible"], "correct": 1, "explain": "Lo concreto se mide."}, {"q": "Para saber si mejora hay que:", "opts": ["Adivinar", "Anotar y comparar sus números", "No hacer nada"], "correct": 1, "explain": "Medir muestra el avance."}, {"q": "Si cumple su meta:", "opts": ["Dejar de medir", "Subirla un poco y seguir", "Bajarla"], "correct": 1, "explain": "Así sigue creciendo."}], "tip": "Hoy póngase una meta concreta para la semana y anótela."}, {"cat": "Motivación y mentalidad", "icon": "🚀", "badge": "Mentalidad", "title": "Trabajo en equipo", "subtitle": "Lección 6 · Rendir más con su socia", "intro": "Dos personas coordinadas rinden por cuatro. Repartir tareas claras con su socia evita que se caigan cosas y hace crecer el negocio.", "concept": {"term": "Trabajo en equipo", "def": "Es repartir las tareas y coordinarse con su socia para que el negocio funcione mejor que si cada quien hace todo por su lado. Roles claros evitan huecos y duplicar esfuerzos."}, "sections": [{"h": "Repartan roles", "p": "Quién cobra, quién at let current=null;
let pin='';
let activeCat='Todos';
let selectedAnswer=null;
let progress=JSON.parse(localStorage.getItem('aca_focus_progress')||'{}');
let pins=JSON.parse(localStorage.getItem('aca_focus_pins')||'{}');
let settings=JSON.parse(localStorage.getItem('aca_focus_settings')||'{}');
function save(){localStorage.setItem('aca_focus_progress',JSON.stringify(progress));localStorage.setItem('aca_focus_pins',JSON.stringify(pins));localStorage.setItem('aca_focus_settings',JSON.stringify(settings));if(current)cloudPush(current);}
function ensureSettings(user){settings[user]=settings[user]||{avatar:USERS[user].defaultAvatar,mascot:0};return settings[user];}
function getAvatar(user){const s=ensureSettings(user);return AVATARS[s.avatar]||AVATARS[USERS[user].defaultAvatar];}
function goHome(){sessionStorage.setItem('sublichat_skip_intro','1');window.location.href='./index.html#inicio';}
function show(id){document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');document.getElementById('topSettings').style.display=(id==='dash'||id==='lesson'||id==='settings')?'grid':'none';window.scrollTo(0,0);}
function toast(t){const el=document.getElementById('toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1800);}
function celebrate(){const c=document.getElementById('confetti');c.innerHTML='';['⭐','💎','🎉','🚀','🏆','✨'].forEach((e,idx)=>{for(let i=0;i<5;i++){const s=document.createElement('i');s.textContent=e;s.style.left=(Math.random()*100)+'%';s.style.fontSize=(18+Math.random()*18)+'px';s.style.animationDelay=(Math.random()*0.4)+'s';c.appendChild(s);}});setTimeout(()=>c.innerHTML='',2100);}
function renderUsers(){
  const wrap=document.getElementById('usersList');
  wrap.innerHTML=Object.keys(USERS).map(id=>{const av=getAvatar(id);return `<button class="user" data-user="${id}" type="button"><span class="avatar" style="background:${av.bg}">${av.emoji}</span><span class="uinfo"><span class="role">Agente de ventas</span><h3>${USERS[id].name}</h3><small>Ruta comercial · avatar personal · acceso por PIN</small></span><span class="go">›</span></button>`;}).join('');
  wrap.querySelectorAll('.user').forEach(btn=>btn.addEventListener('click',()=>selectUser(btn.dataset.user)));
}
async function selectUser(user){current=user;pin='';let av=getAvatar(current);document.getElementById('pinAvatar').textContent=av.emoji;document.getElementById('pinAvatar').style.background=av.bg;document.getElementById('pinName').textContent=USERS[current].name;document.getElementById('pinHelp').textContent='Verificando…';paintDots();show('pin');await cloudPull(current);av=getAvatar(current);document.getElementById('pinAvatar').textContent=av.emoji;document.getElementById('pinAvatar').style.background=av.bg;document.getElementById('pinHelp').textContent=pins[current]?'Ingrese su PIN':'Cree su PIN nuevo de 4 dígitos';}
document.getElementById('homeBack').addEventListener('click',()=>{if(document.getElementById('select').classList.contains('active')||document.getElementById('dash').classList.contains('active'))goHome();else if(document.getElementById('pin').classList.contains('active'))show('select');else{renderDash();show('dash');}});
document.getElementById('topSettings').addEventListener('click',()=>{renderSettings();show('settings');});
function paintDots(){document.querySelectorAll('#dots .dot').forEach((d,i)=>d.classList.toggle('on',i<pin.length));}
const keys=document.getElementById('keys');
['1','2','3','4','5','6','7','8','9','Borrar','0','Volver'].forEach(k=>{const b=document.createElement('button'); b.type='button'; b.textContent=k; b.className=isNaN(k)?'fn':'';b.addEventListener('click',()=>press(k)); keys.appendChild(b);});
function press(k){if(k==='Volver'){show('select');return;}if(k==='Borrar'){pin=pin.slice(0,-1);paintDots();return;}if(pin.length<4){pin+=k;paintDots();}if(pin.length===4){if(!pins[current]){pins[current]=pin;save();toast('PIN guardado');renderDash();show('dash');}else if(pin===pins[current]){renderDash();show('dash');}else{pin='';paintDots();toast('PIN incorrecto');}}}
function doneList(){return progress[current]||[];}
function pct(){return Math.round((doneList().length/COURSES.length)*100);}
function unlockedIndex(){return doneList().length;}
function xp(){return doneList().length*50;}
function earnedBadges(){const done=doneList();const base=[];if(done.length>=1)base.push('Primer paso');if(done.length>=5)base.push('Disciplina');if(done.length>=12)base.push('Agente Pro');if(done.length>=25)base.push('Cierre');if(done.length>=50)base.push('Supervisor');if(done.length>=80)base.push('Máquina de ventas');if(done.length>=COURSES.length)base.push('Leyenda');return [...new Set([...base,...COURSES.filter((c,i)=>done.includes(i)&&((i+1)%10===0)).map(c=>c.badge)])];}
function categories(){return ['Todos',...Array.from(new Set(COURSES.map(c=>c.cat)))];}
function renderDash(){
  const done=doneList(); const av=getAvatar(current); const mascot=welcomeMascot(); const cats=categories();
  const visible=COURSES.map((c,i)=>({...c,i})).filter(c=>activeCat==='Todos'||c.cat===activeCat);
  const next=COURSES[unlockedIndex()]||COURSES[COURSES.length-1];
  document.getElementById('dash').innerHTML=`<div class="dashHead"><span class="avatar" style="background:${av.bg}">${av.emoji}</span><div style="flex:1"><h2>Hola, ${USERS[current].name}</h2><p>${pct()}% completado · ${xp()} XP · ${COURSES.length} cursos</p><div class="xp"><i style="width:${pct()}%"></i></div></div></div>
  <div class="stats"><div class="stat"><b>📚 ${done.length}</b><span>Cursos</span></div><div class="stat"><b>⭐ ${xp()}</b><span>XP</span></div><div class="stat"><b>🏆 ${earnedBadges().length}</b><span>Logros</span></div></div>
  <div class="coach-card"><div class="coach-emoji">${mascot.svg}</div><div><b>${mascot.name}</b><p>${mascot.line}</p></div></div>
  <div class="section">🎓 Áreas del curso y sus coaches</div>
  <div class="mascot-grid">${MASCOTS.map(m=>`<div class="mascot-tile"><span class="mascot-emoji">${m.svg}</span><small>${m.name}</small><small class="m-area">${m.cat}</small></div>`).join('')}</div>
  <div class="mission-card"><h3>🎯 Misión de hoy</h3><ul><li>Complete 1 curso: <b>${next.title}</b>.</li><li>Escriba una práctica libre antes de ver la respuesta modelo.</li><li>Use un mensaje aprendido con un cliente real.</li></ul></div>
  <div class="achievement-card"><div class="achievement-title">🏅 Logros de superación</div><div class="badges">${['Primer paso','Disciplina','Agente Pro','Cierre','Renovador','Soporte','Marketing','Caso Pro','Supervisor','Máquina de ventas','Leyenda'].map(b=>`<span class="badge-pill ${earnedBadges().includes(b)?'on':''}">${earnedBadges().includes(b)?'✅':'🔒'} ${b}</span>`).join('')}</div></div>
  <div class="module-filter">${cats.map(c=>`<button type="button" class="filter-btn ${c===activeCat?'on':''}" data-cat="${c}">${c}</button>`).join('')}</div>
  <div class="section">Ruta interactiva · desbloqueo por niveles · ${visible.length} cursos en esta vista</div>
  <div class="path">${visible.map(c=>`<button type="button" class="node ${done.includes(c.i)?'done':''} ${c.i===unlockedIndex()?'current':''} ${c.i>unlockedIndex()?'locked':''}" data-i="${c.i}"><div class="bubble">${done.includes(c.i)?'✅':c.icon}</div><div class="info"><b>${c.title}</b><small>Nivel ${c.i+1} · ${c.subtitle}</small><span class="cat">${c.cat}</span></div></button>`).join('')}</div>
  <button type="button" class="ghost" id="openSettings">⚙️ Ajustes de avatar</button><button type="button" class="ghost" id="changeAgent">Cambiar agente</button><button type="button" class="ghost" id="backInicio">Volver a inicio</button>`;
  document.querySelectorAll('.filter-btn').forEach(b=>b.addEventListener('click',()=>{activeCat=b.dataset.cat;renderDash();}));
  document.querySelectorAll('.node').forEach(n=>n.addEventListener('click',()=>{const i=Number(n.dataset.i);if(i>unlockedIndex()){toast('Complete el nivel anterior');return;}renderLesson(i);show('lesson');}));
  document.getElementById('openSettings').addEventListener('click',()=>{renderSettings();show('settings');});
  document.getElementById('changeAgent').addEventListener('click',()=>show('select'));
  document.getElementById('backInicio').addEventListener('click',goHome);
}
function enableComplete(){const b=document.getElementById('completeLevel');if(b)b.disabled=false;}
function renderLesson(i){
  const c=COURSES[i]; const done=doneList().includes(i); const mascot=getMascot(c.cat);
  const br=s=>String(s).replace(/\n/g,'<br>');
  document.getElementById('lesson').innerHTML=`<div class="lesson"><div class="meta">Nivel ${i+1} · ${c.cat}</div><div class="bigicon">${c.icon}</div><h2>${c.title}</h2><div class="type-tag">${c.subtitle}</div>
    <div class="coach-card"><div class="coach-emoji">${mascot.svg}</div><div><b>${mascot.name} dice:</b><p>${mascot.line}</p></div></div>
    <div class="why-card"><b>📌 Por qué importa:</b> ${c.intro}</div>
    <div class="exercise-card"><h3>📖 ¿Qué es ${c.concept.term}?</h3><div class="concept">${c.concept.def}</div></div>
    <div class="exercise-card"><h3>📚 Cómo se hace</h3>${c.sections.map(s=>`<div class="sec"><h4>${s.h}</h4><p>${br(s.p)}</p></div>`).join('')}</div>
    <div class="exercise-card"><h3>💬 Ejemplos reales</h3>${c.examples.map(e=>`<div class="exmp"><div class="exmp-sit">${e.sit}</div><div class="ex-good"><span class="ex-tag">✅ Así sí</span><div>${e.bien}</div></div><div class="ex-bad"><span class="ex-tag">❌ Así no</span><div>${e.mal}</div></div><div class="why-line">💡 ${e.why}</div></div>`).join('')}</div>
    <div class="exercise-card"><h3>🎮 ¿Cómo responderías?</h3><p>Le escribe un cliente. Toque la mejor respuesta.</p>${c.scenarios.map((s,si)=>`<div class="scn" data-si="${si}"><div class="bubble-cli2">${s.client}</div><div class="choices">${s.options.map((o,oi)=>`<button type="button" class="choice" data-si="${si}" data-oi="${oi}">${o.t}</button>`).join('')}</div><div class="scn-exp" id="scnexp${si}"></div></div>`).join('')}</div>
    <div class="exercise-card"><h3>🧠 Quiz del nivel</h3>${c.quiz.map((q,qi)=>`<div class="q-item" data-qi="${qi}"><p class="q-text">${qi+1}. ${q.q}</p><div class="choices">${q.opts.map((o,oi)=>`<button type="button" class="choice" data-qi="${qi}" data-oi="${oi}">${o}</button>`).join('')}</div><div class="q-exp" id="qexp${qi}"></div></div>`).join('')}<div class="feedback" id="quizfb">Conteste las ${c.quiz.length} preguntas para completar el nivel.</div></div>
    <div class="recuerda"><b>💡 Consejo para hoy:</b> ${c.tip}</div>
    <button type="button" class="primary" id="completeLevel" ${done?'':'disabled'}> ${done?'Nivel completado · volver a ruta':'Completar nivel'}</button>
    <button type="button" class="ghost" id="backRoute">Volver a ruta</button></div>`;
  if(done) enableComplete();
  // Escenarios (práctica)
  c.scenarios.forEach((s,si)=>{
    let ans=false;
    document.querySelectorAll('.scn[data-si="'+si+'"] .choice').forEach(btn=>{
      btn.addEventListener('click',()=>{
        if(ans)return; ans=true; const oi=+btn.dataset.oi;
        document.querySelectorAll('.scn[data-si="'+si+'"] .choice').forEach((x,xi)=>{x.disabled=true; if(s.options[xi].ok)x.classList.add('good');});
        if(!s.options[oi].ok) btn.classList.add('bad');
        document.getElementById('scnexp'+si).innerHTML=(s.options[oi].ok?'✅ ¡Bien! ':'❌ ')+s.explain;
      });
    });
  });
  // Quiz (completa el nivel)
  const total=c.quiz.length; let answered=0, correct=0;
  c.quiz.forEach((q,qi)=>{
    let ans=false;
    document.querySelectorAll('.q-item[data-qi="'+qi+'"] .choice').forEach(btn=>{
      btn.addEventListener('click',()=>{
        if(ans)return; ans=true; const oi=+btn.dataset.oi; const ok=oi===q.correct;
        document.querySelectorAll('.q-item[data-qi="'+qi+'"] .choice').forEach((x,xi)=>{x.disabled=true; if(xi===q.correct)x.classList.add('good');});
        if(!ok) btn.classList.add('bad');
        document.getElementById('qexp'+qi).innerHTML=(ok?'✅ ':'❌ ')+q.explain;
        answered++; if(ok)correct++;
        if(answered>=total){
          const pct=Math.round(correct/total*100);
          document.getElementById('quizfb').innerHTML='<div class="grade-box">'+(pct>=70?'🏆':'📚')+' Nota: '+correct+'/'+total+' ('+pct+'%). '+(pct>=70?'¡Aprobado! Ya puede completar el nivel.':'Puede completar igual, pero repáselo para dominarlo.')+'</div>';
          enableComplete(); if(pct>=70)celebrate();
        } else { document.getElementById('quizfb').textContent='Va '+answered+'/'+total+'…'; }
      });
    });
  });
  document.getElementById('completeLevel').addEventListener('click',()=>complete(i));
  document.getElementById('backRoute').addEventListener('click',()=>{renderDash();show('dash');});
}
function renderSettings(){
  const s=ensureSettings(current); const av=getAvatar(current);
  document.getElementById('settings').innerHTML=`<div class="settings-card"><h2>⚙️ Ajustes de ${USERS[current].name}</h2><p>Cambie su avatar. La mascota coach cambia según el área del curso 🐾</p>
  <div class="coach-card"><div class="coach-emoji">${av.emoji}</div><div><b>Avatar actual</b><p>${av.name}</p></div></div>
  <div class="option-title">Avatar del agente</div><div class="avatar-grid">${AVATARS.map((a,i)=>`<button type="button" class="avatar-tile ${s.avatar===i?'on':''}" data-avatar="${i}"><span class="av-emoji" style="background:${a.bg}">${a.emoji}</span><small>${a.name}</small></button>`).join('')}</div>
  <button type="button" class="primary" id="saveSettings">Guardar ajustes</button><button type="button" class="ghost" id="settingsBack">Volver a ruta</button></div>`;
  document.querySelectorAll('[data-avatar]').forEach(b=>b.addEventListener('click',()=>{settings[current].avatar=Number(b.dataset.avatar);save();renderSettings();}));
  document.getElementById('saveSettings').addEventListener('click',()=>{save();renderUsers();toast('Ajustes guardados');renderDash();show('dash');});
  document.getElementById('settingsBack').addEventListener('click',()=>{renderDash();show('dash');});
}
function complete(i){
  progress[current]=progress[current]||[];
  if(!progress[current].includes(i)){progress[current].push(i);progress[current].sort((a,b)=>a-b);save();celebrate();const msg=(i+1)%10===0?'🏆 Logro desbloqueado: '+COURSES[i].badge:'+50 XP · nuevo nivel desbloqueado';toast(msg);}
  renderDash();show('dash');
}
renderUsers();
</script>
</body>
</html>
