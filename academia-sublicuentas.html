let current=null;
let pin='';
let activeCat='Todos';
let selectedAnswer=null;
let progress=JSON.parse(localStorage.getItem('aca_focus_progress')||'{}');
let pins=JSON.parse(localStorage.getItem('aca_focus_pins')||'{}');
let settings=JSON.parse(localStorage.getItem('aca_focus_settings')||'{}');
function save(){localStorage.setItem('aca_focus_progress',JSON.stringify(progress));localStorage.setItem('aca_focus_pins',JSON.stringify(pins));localStorage.setItem('aca_focus_settings',JSON.stringify(settings));}
function ensureSettings(user){settings[user]=settings[user]||{avatar:USERS[user].defaultAvatar,mascot:0};return settings[user];}
function getAvatar(user){const s=ensureSettings(user);return AVATARS[s.avatar]||AVATARS[USERS[user].defaultAvatar];}
function getMascot(user){const s=ensureSettings(user);return MASCOTS[s.mascot]||MASCOTS[0];}
function goHome(){sessionStorage.setItem('sublichat_skip_intro','1');window.location.href='./index.html#inicio';}
function show(id){document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');document.getElementById('topSettings').style.display=(id==='dash'||id==='lesson'||id==='settings')?'grid':'none';window.scrollTo(0,0);}
function toast(t){const el=document.getElementById('toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1800);}
function celebrate(){const c=document.getElementById('confetti');c.innerHTML='';['⭐','💎','🎉','🚀','🏆','✨'].forEach((e,idx)=>{for(let i=0;i<5;i++){const s=document.createElement('i');s.textContent=e;s.style.left=(Math.random()*100)+'%';s.style.fontSize=(18+Math.random()*18)+'px';s.style.animationDelay=(Math.random()*0.4)+'s';c.appendChild(s);}});setTimeout(()=>c.innerHTML='',2100);}
function renderUsers(){
  const wrap=document.getElementById('usersList');
  wrap.innerHTML=Object.keys(USERS).map(id=>{const av=getAvatar(id);return `<button class="user" data-user="${id}" type="button"><span class="avatar" style="background:${av.bg}">${av.emoji}</span><span class="uinfo"><span class="role">Agente de ventas</span><h3>${USERS[id].name}</h3><small>Ruta comercial · avatar personal · acceso por PIN</small></span><span class="go">›</span></button>`;}).join('');
  wrap.querySelectorAll('.user').forEach(btn=>btn.addEventListener('click',()=>selectUser(btn.dataset.user)));
}
function selectUser(user){current=user;pin='';const av=getAvatar(current);document.getElementById('pinAvatar').textContent=av.emoji;document.getElementById('pinAvatar').style.background=av.bg;document.getElementById('pinName').textContent=USERS[current].name;document.getElementById('pinHelp').textContent=pins[current]?'Ingrese su PIN':'Cree su PIN nuevo de 4 dígitos';paintDots();show('pin');}
document.getElementById('homeBack').addEventListener('click',()=>{if(document.getElementById('select').classList.contains('active')||document.getElementById('dash').classList.contains('active'))goHome();else if(document.getElementById('pin').classList.contains('active'))show('select');else{renderDash();show('dash');}});
document.getElementById('topSettings').addEventListener('click',()=>{renderSettings();show('settings');});
function paintDots(){document.querySelectorAll('#dots .dot').forEach((d,i)=>d.classList.toggle('on',i<pin.length));}
const keys=document.getElementById('keys');
['1','2','3','4','5','6','7','8','9','Borrar','0','Volver'].forEach(k=>{const b=document.createElement('button'); b.type='button'; b.textContent=k; b.className=isNaN(k)?'fn':'';b.addEventListener('click',()=>press(k)); keys.appendChild(b);});
function press(k){if(k==='Volver'){show('select');return;}if(k==='Borrar'){pin=pin.slice(0,-1);paintDots();return;}if(pin.length<4){pin+=k;paintDots();}if(pin.length===4){if(!pins[current]){pins[current]=pin;save();toast('PIN guardado');renderDash();show('dash');}else if(pin===pins[current]){renderDash();show('dash');}else{pin='';paintDots();toast('PIN incorrecto');}}}
function doneList(){return progress[current]||[];}
function pct(){return Math.round((doneList().length/COURSES.length)*100);}
function unlockedIndex(){return doneList().length;}
function xp(){return doneList().length*50;}
function earnedBadges(){const done=doneList();const base=[];if(done.length>=1)base.push('Primer paso');if(done.length>=5)base.push('Disciplina');if(done.length>=12)base.push('Agente Pro');if(done.length>=25)base.push('Cierre');if(done.length>=50)base.push('Supervisor');if(done.length>=80)base.push('Máquina de ventas');if(done.length>=COURSES.length)base.push('Leyenda');return [...new Set([...base,...COURSES.filter((c,i)=>done.includes(i)&&((i+1)%10===0)).map(c=>c.badge)])];}
function categories(){return ['Todos',...Array.from(new Set(COURSES.map(c=>c.cat)))];}
function renderDash(){
  const done=doneList(); const av=getAvatar(current); const mascot=getMascot(current); const cats=categories();
  const visible=COURSES.map((c,i)=>({...c,i})).filter(c=>activeCat==='Todos'||c.cat===activeCat);
  const next=COURSES[unlockedIndex()]||COURSES[COURSES.length-1];
  document.getElementById('dash').innerHTML=`<div class="dashHead"><span class="avatar" style="background:${av.bg}">${av.emoji}</span><div style="flex:1"><h2>Hola, ${USERS[current].name}</h2><p>${pct()}% completado · ${xp()} XP · ${COURSES.length} cursos</p><div class="xp"><i style="width:${pct()}%"></i></div></div></div>
  <div class="stats"><div class="stat"><b>📚 ${done.length}</b><span>Cursos</span></div><div class="stat"><b>⭐ ${xp()}</b><span>XP</span></div><div class="stat"><b>🏆 ${earnedBadges().length}</b><span>Logros</span></div></div>
  <div class="coach-card"><div class="coach-emoji">${mascot.emoji}</div><div><b>${mascot.name}</b><p>${mascot.line}</p></div></div>
  <div class="mission-card"><h3>🎯 Misión de hoy</h3><ul><li>Complete 1 curso: <b>${next.title}</b>.</li><li>Escriba una práctica libre antes de ver la respuesta modelo.</li><li>Use un mensaje aprendido con un cliente real.</li></ul></div>
  <div class="achievement-card"><div class="achievement-title">🏅 Logros de superación</div><div class="badges">${['Primer paso','Disciplina','Agente Pro','Cierre','Renovador','Soporte','Marketing','Caso Pro','Supervisor','Máquina de ventas','Leyenda'].map(b=>`<span class="badge-pill ${earnedBadges().includes(b)?'on':''}">${earnedBadges().includes(b)?'✅':'🔒'} ${b}</span>`).join('')}</div></div>
  <div class="module-filter">${cats.map(c=>`<button type="button" class="filter-btn ${c===activeCat?'on':''}" data-cat="${c}">${c}</button>`).join('')}</div>
  <div class="section">Ruta interactiva · desbloqueo por niveles · ${visible.length} cursos en esta vista</div>
  <div class="path">${visible.map(c=>`<button type="button" class="node ${done.includes(c.i)?'done':''} ${c.i===unlockedIndex()?'current':''} ${c.i>unlockedIndex()?'locked':''}" data-i="${c.i}"><div class="bubble">${done.includes(c.i)?'✅':c.icon}</div><div class="info"><b>${c.title}</b><small>Nivel ${c.i+1} · ${c.subtitle}</small><span class="cat">${c.cat}</span></div></button>`).join('')}</div>
  <button type="button" class="ghost" id="openSettings">⚙️ Ajustes de avatar y mascota</button><button type="button" class="ghost" id="changeAgent">Cambiar agente</button><button type="button" class="ghost" id="backInicio">Volver a inicio</button>`;
  document.querySelectorAll('.filter-btn').forEach(b=>b.addEventListener('click',()=>{activeCat=b.dataset.cat;renderDash();}));
  document.querySelectorAll('.node').forEach(n=>n.addEventListener('click',()=>{const i=Number(n.dataset.i);if(i>unlockedIndex()){toast('Complete el nivel anterior');return;}renderLesson(i);show('lesson');}));
  document.getElementById('openSettings').addEventListener('click',()=>{renderSettings();show('settings');});
  document.getElementById('changeAgent').addEventListener('click',()=>show('select'));
  document.getElementById('backInicio').addEventListener('click',goHome);
}
function renderLesson(i){
  selectedAnswer=null;
  const c=COURSES[i]; const done=doneList().includes(i); const mascot=getMascot(current);
  document.getElementById('lesson').innerHTML=`<div class="lesson"><div class="meta">Nivel ${i+1} · ${c.cat}</div><div class="bigicon">${c.icon}</div><h2>${c.title}</h2><p><b>Objetivo:</b> ${c.goal}</p>
  <div class="coach-card"><div class="coach-emoji">${mascot.emoji}</div><div><b>${mascot.name} dice:</b><p>${mascot.line}</p></div></div>
  <div class="case-card"><h3>📚 Caso Sublicuentas</h3><p>${c.case}</p></div>
  <div class="exercise-card"><h3>✍️ Práctica libre</h3><p>Escriba cómo respondería usted antes de ver el modelo.</p><textarea class="practice" id="practice" placeholder="Ejemplo: Buen día, con gusto le ayudo..."></textarea><button type="button" class="ghost" id="comparePractice">Comparar con respuesta modelo</button><div class="feedback" id="practiceFeedback"></div></div>
  <div class="exercise-card" id="modelBox" style="display:none"><h3>🧠 Respuesta modelo</h3><div class="script">${c.script}</div><p><b>Microacción:</b> ${c.micro}</p></div>
  <div class="exercise-card"><h3>🎯 Reto interactivo</h3><p>${c.quiz}</p><div class="choices">${c.answers.map((a,idx)=>`<button type="button" class="choice" data-answer="${idx}">${idx+1}. ${a}</button>`).join('')}</div><div class="feedback" id="feedback">Seleccione la mejor respuesta para completar el nivel.</div></div>
  <button type="button" class="primary" id="completeLevel" ${done?'':'disabled'}> ${done?'Nivel completado · volver a ruta':'Completar nivel'}</button><button type="button" class="ghost" id="backRoute">Volver a ruta</button></div>`;
  document.getElementById('comparePractice').addEventListener('click',()=>{const v=document.getElementById('practice').value.trim();document.getElementById('modelBox').style.display='block';document.getElementById('practiceFeedback').textContent=v.length>20?'Bien. Ahora compare tono, claridad y cierre con el modelo.':'Escriba una respuesta más completa para practicar mejor.';});
  document.querySelectorAll('.choice').forEach(btn=>btn.addEventListener('click',()=>{const ans=Number(btn.dataset.answer);selectedAnswer=ans;document.querySelectorAll('.choice').forEach(x=>x.classList.remove('good','bad'));if(ans===c.correct){btn.classList.add('good');document.getElementById('feedback').textContent='Correcto. Esta respuesta protege la venta y mantiene tono profesional.';document.getElementById('completeLevel').disabled=false;}else{btn.classList.add('bad');document.querySelector(`.choice[data-answer="${c.correct}"]`).classList.add('good');document.getElementById('feedback').textContent='Casi. Revise la respuesta marcada en verde y complete el aprendizaje.';document.getElementById('completeLevel').disabled=false;}}));
  document.getElementById('completeLevel').addEventListener('click',()=>complete(i));
  document.getElementById('backRoute').addEventListener('click',()=>{renderDash();show('dash');});
}
function renderSettings(){
  const s=ensureSettings(current); const av=getAvatar(current); const mascot=getMascot(current);
  document.getElementById('settings').innerHTML=`<div class="settings-card"><h2>⚙️ Ajustes de ${USERS[current].name}</h2><p>Cambie avatar y mascota coach. Se guarda solo para este agente.</p>
  <div class="coach-card"><div class="coach-emoji">${av.emoji}</div><div><b>Avatar actual</b><p>${av.name} · Coach: ${mascot.name}</p></div></div>
  <div class="option-title">Avatar del agente</div><div class="avatar-grid">${AVATARS.map((a,i)=>`<button type="button" class="avatar-tile ${s.avatar===i?'on':''}" data-avatar="${i}"><span class="av-emoji" style="background:${a.bg}">${a.emoji}</span><small>${a.name}</small></button>`).join('')}</div>
  <div class="option-title">Mascota coach</div><div class="mascot-grid">${MASCOTS.map((m,i)=>`<button type="button" class="mascot-tile ${s.mascot===i?'on':''}" data-mascot="${i}"><span class="mascot-emoji">${m.emoji}</span><small>${m.name}</small></button>`).join('')}</div>
  <button type="button" class="primary" id="saveSettings">Guardar ajustes</button><button type="button" class="ghost" id="settingsBack">Volver a ruta</button></div>`;
  document.querySelectorAll('[data-avatar]').forEach(b=>b.addEventListener('click',()=>{settings[current].avatar=Number(b.dataset.avatar);save();renderSettings();}));
  document.querySelectorAll('[data-mascot]').forEach(b=>b.addEventListener('click',()=>{settings[current].mascot=Number(b.dataset.mascot);save();renderSettings();}));
  document.getElementById('saveSettings').addEventListener('click',()=>{save();renderUsers();toast('Ajustes guardados');renderDash();show('dash');});
  document.getElementById('settingsBack').addEventListener('click',()=>{renderDash();show('dash');});
}
function complete(i){
  progress[current]=progress[current]||[];
  if(!progress[current].includes(i)){progress[current].push(i);progress[current].sort((a,b)=>a-b);save();celebrate();const msg=(i+1)%10===0?'🏆 Logro desbloqueado: '+COURSES[i].badge:'+50 XP · nuevo nivel desbloqueado';toast(msg);}
  renderDash();show('dash');
}
renderUsers();
</script>
</body>
</html>
