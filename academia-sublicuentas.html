<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<title>Aula de ventas</title>
<!-- FIX_AULA_FUNCIONA_VISIBLE_20260608_5 -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;font-family:'Nunito',system-ui,sans-serif;color:#14213D;background:#F4FAFF}
body{background:radial-gradient(520px 330px at 0% 0%,#FFF1A8 0%,transparent 55%),radial-gradient(560px 340px at 100% 0%,#B9F2FF 0%,transparent 60%),linear-gradient(180deg,#FFFFFF,#EEF7FF 60%,#F7F4FF)}
button{font:inherit;border:0;cursor:pointer;background:none;color:inherit}
.app{max-width:540px;margin:0 auto;padding:18px 18px 98px}
.top{display:flex;align-items:center;gap:13px;margin-bottom:16px}
.back{width:58px;height:58px;border-radius:22px;background:#fff;box-shadow:0 12px 0 #DDEAF5,0 20px 34px rgba(31,94,180,.10);font-size:32px;color:#14213D}
.title h1{font-family:'Fredoka';font-size:34px;line-height:.95;letter-spacing:-.8px}
.title p{font-size:15px;color:#6E7D96;font-weight:900;margin-top:5px}
.hero{border-radius:34px;padding:24px 21px;background:linear-gradient(135deg,#126CFF,#24C7FF);box-shadow:0 16px 0 #1186DC,0 28px 50px rgba(18,108,255,.22);color:white;position:relative;overflow:hidden;margin-bottom:17px}
.hero:after{content:'🧠';position:absolute;right:10px;bottom:-23px;font-size:96px;opacity:.18}
.badge{display:inline-flex;background:rgba(255,255,255,.24);border-radius:999px;padding:8px 12px;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.14em}
.hero h2{font-family:'Fredoka';font-size:39px;line-height:.98;margin-top:14px;max-width:335px}
.hero p{font-size:15px;line-height:1.35;font-weight:900;opacity:.95;margin-top:11px;max-width:335px}
.panel{display:none}.panel.active{display:block}
.users{display:grid;gap:14px}
.user{width:100%;display:flex;align-items:center;gap:15px;background:#fff;border-radius:30px;padding:15px;min-height:112px;box-shadow:0 16px 0 rgba(221,234,245,.75),0 28px 48px rgba(31,94,180,.10);text-align:left}
.avatar{width:74px;height:74px;border-radius:26px;display:grid;place-items:center;font-size:42px;box-shadow:inset 0 1px rgba(255,255,255,.5),0 12px 24px rgba(34,67,118,.10)}
.libni .avatar,.libniAvatar{background:linear-gradient(135deg,#FFE66D,#FFB44D)}.naara .avatar,.naaraAvatar{background:linear-gradient(135deg,#8BF5D2,#35D6B2)}
.uinfo{flex:1}.role{font-size:10px;font-weight:900;letter-spacing:.18em;text-transform:uppercase;color:#7B89A2}
.user h3{font-family:'Fredoka';font-size:30px;line-height:1;margin-top:4px}.user small{display:block;color:#70809A;font-size:13.5px;font-weight:900;margin-top:6px}.go{font-size:36px;color:#90A2B9}
.pinbox,.lesson,.dashHead,.stat,.info{background:#fff;box-shadow:0 16px 0 rgba(221,234,245,.75),0 28px 48px rgba(31,94,180,.10)}
.pinbox{border-radius:32px;padding:24px;text-align:center}.pinavatar{width:82px;height:82px;border-radius:29px;margin:0 auto 12px;display:grid;place-items:center;font-size:46px}
.pinbox h2,.dashHead h2,.lesson h2{font-family:'Fredoka';font-size:30px}.pinbox p,.dashHead p{color:#71809A;font-weight:900;margin-top:4px}
.dots{display:flex;justify-content:center;gap:12px;margin:18px 0}.dot{width:16px;height:16px;border-radius:50%;background:#DCE9F6}.dot.on{background:#16A8FF}
.keys{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.keys button{height:58px;border-radius:22px;background:#EFF6FF;color:#14213D;font-family:'Fredoka';font-size:24px;box-shadow:0 7px 0 #DDEAF5}.keys .fn{font-size:13px}
.dashHead{display:flex;align-items:center;gap:13px;border-radius:31px;padding:15px;margin-bottom:15px}.dashHead .avatar{width:66px;height:66px;font-size:38px}
.xp{height:12px;background:#EAF3FC;border-radius:999px;margin-top:9px;overflow:hidden}.xp i{display:block;height:100%;width:0;background:linear-gradient(90deg,#FFE66D,#35D6B2,#24C7FF);border-radius:999px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:15px}.stat{border-radius:25px;padding:14px;text-align:center}.stat b{display:block;font-family:'Fredoka';font-size:24px}.stat span{font-size:11px;font-weight:900;color:#7B89A2}
.section{font-size:13px;font-weight:900;color:#6E7D96;text-transform:uppercase;letter-spacing:.14em;margin:8px 2px 12px}
.path{position:relative;padding:8px 0 18px}.path:before{content:'';position:absolute;left:50%;top:15px;bottom:15px;width:8px;border-radius:999px;background:linear-gradient(#FFE66D,#35D6B2,#24C7FF);opacity:.28;transform:translateX(-50%)}
.node{position:relative;display:flex;align-items:center;min-height:86px;margin:8px 0}.node:nth-child(odd){justify-content:flex-start;padding-right:40%}.node:nth-child(even){justify-content:flex-end;padding-left:40%}
.bubble{width:80px;height:80px;border-radius:30px;display:grid;place-items:center;font-size:35px;background:#fff;box-shadow:0 14px 30px rgba(34,67,118,.12);z-index:2}.done .bubble{background:linear-gradient(135deg,#8BF5D2,#35D6B2)}.locked{opacity:.50}
.info{position:absolute;top:50%;transform:translateY(-50%);width:42%;border-radius:20px;padding:10px}.node:nth-child(odd) .info{left:90px}.node:nth-child(even) .info{right:90px}
.info b{font-size:12.5px;line-height:1.08}.info small{display:block;color:#7B89A2;font-size:10.5px;font-weight:900;margin-top:4px}
.lesson{border-radius:32px;padding:22px}.lesson p{color:#5F6F89;font-weight:800;line-height:1.45;margin:12px 0}
.primary,.ghost{width:100%;min-height:54px;border-radius:22px;font-weight:900;font-size:16px;margin-top:10px}.primary{background:#FF3F6E;color:#fff;box-shadow:0 10px 0 #D92954}.ghost{background:#EFF6FF;color:#14213D;box-shadow:0 8px 0 #DDEAF5}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#14213D;color:#fff;border-radius:999px;padding:12px 18px;font-weight:900;font-size:13px;opacity:0;pointer-events:none;transition:.25s;z-index:20}.toast.show{opacity:1;bottom:34px}
@media(max-width:390px){.app{padding-left:15px;padding-right:15px}.hero h2{font-size:33px}.user h3{font-size:27px}.avatar{width:68px;height:68px}.node:nth-child(odd){padding-right:36%}.node:nth-child(even){padding-left:36%}.bubble{width:74px;height:74px;border-radius:27px}.node:nth-child(odd) .info{left:82px}.node:nth-child(even) .info{right:82px}.info{width:45%;padding:9px}}
</style>
</head>
<body>
<div class="app">
  <div class="top"><button class="back" id="homeBack" type="button">‹</button><div class="title"><h1>Aula de ventas</h1><p>Entrene, practique y suba nivel</p></div></div>
  <section id="select" class="panel active">
    <div class="hero"><span class="badge">Academia Sublicuentas</span><h2>Entrene su mente de ventas</h2><p>30 niveles cortos, retos diarios y práctica comercial para vender más sin aburrirse.</p></div>
    <div class="users">
      <button class="user libni" data-user="libni" type="button"><span class="avatar">👩‍💼</span><span class="uinfo"><span class="role">Agente de ventas</span><h3>Libni</h3><small>Ruta comercial · acceso por PIN</small></span><span class="go">›</span></button>
      <button class="user naara" data-user="naara" type="button"><span class="avatar">👩‍💼</span><span class="uinfo"><span class="role">Agente de ventas</span><h3>Naara</h3><small>Ruta comercial · acceso por PIN</small></span><span class="go">›</span></button>
    </div>
  </section>
  <section id="pin" class="panel"><div class="pinbox"><div class="pinavatar" id="pinAvatar">👩‍💼</div><h2 id="pinName">Libni</h2><p id="pinHelp">Cree su PIN nuevo de 4 dígitos</p><div class="dots" id="dots"><i class="dot"></i><i class="dot"></i><i class="dot"></i><i class="dot"></i></div><div class="keys" id="keys"></div></div></section>
  <section id="dash" class="panel"></section>
  <section id="lesson" class="panel"></section>
</div>
<div class="toast" id="toast"></div>
<script>
const USERS={
  libni:{name:'Libni',emoji:'👩‍💼',bg:'linear-gradient(135deg,#FFE66D,#FFB44D)'},
  naara:{name:'Naara',emoji:'👩‍💼',bg:'linear-gradient(135deg,#8BF5D2,#35D6B2)'}
};
const LESSONS=[["⚡", "Respuesta rápida", "Conteste en menos de 30 segundos con un mensaje corto, claro y vendible."], ["💬", "Cierre por WhatsApp", "Use una frase directa para cerrar venta o renovación sin sonar insistente."], ["🎯", "Objeciones de precio", "Responda cuando el cliente compara precio o pide rebaja."], ["🔥", "Renovaciones del día", "Priorice clientes que vencen hoy para recuperar ventas rápido."], ["🏆", "Cliente VIP", "Dé seguimiento especial a clientes frecuentes y cuide la experiencia."], ["📌", "Primer contacto", "Detecte qué app, dispositivo y plazo necesita el cliente."], ["🧾", "Entrega ordenada", "Entregue correo, clave, perfil, PIN y reglas sin confundir."], ["🔐", "Seguridad de cuentas", "Explique reglas para evitar cambios de contraseña o mal uso."], ["📅", "Control de fechas", "Recuerde renovaciones sin sonar pesado."], ["💵", "Cobro elegante", "Cobre con firmeza, respeto y buena imagen."], ["🎁", "Oferta inteligente", "Ofrezca combos sin regalar margen."], ["📦", "Venta por combo", "Suba ticket promedio con paquetes estratégicos."], ["🎬", "Contenido que vende", "Use estrenos, series y películas para generar deseo."], ["🎮", "Cliente gamer", "Venda recargas y juegos con lenguaje más dinámico."], ["📺", "TV digital", "Explique demo, instalación y beneficios sin prometer de más."], ["🧠", "Memoria comercial", "Recuerde gustos, compras y preferencias de cada cliente."], ["📲", "Mensajes cortos", "Escriba menos texto y venda con más claridad."], ["🤖", "Uso de Subli IA", "Pida apoyo al asistente para cobros y renovaciones."], ["🧩", "Caso difícil", "Responda reclamos sin perder control ni cortesía."], ["🛠️", "Soporte técnico", "Resuelva acceso, códigos, app y dispositivo."], ["🚀", "Venta express", "Cierre una venta en tres mensajes."], ["💎", "Valor percibido", "Justifique precio por soporte, rapidez y seguridad."], ["📣", "Seguimiento", "Recontacte sin presionar cuando el cliente no responde."], ["🌟", "Fidelización", "Convierta compradores en clientes fijos."], ["📊", "Lectura de cartera", "Entienda vencidos, activos y oportunidad diaria."], ["🥇", "Prioridad diaria", "Sepa a quién atender primero para generar más."], ["🧃", "Tono de marca", "Mantenga voz Sublicuentas: amable, clara y segura."], ["⚽", "Cliente deportes", "Venda IPTV y partidos con expectativas claras."], ["🧨", "Errores comunes", "Evite exceso de texto, descuentos flojos y promesas raras."], ["👑", "Nivel Pro", "Rutina diaria para vender, renovar y ordenar cartera."]];
let current=null;
let pin='';
let progress=JSON.parse(localStorage.getItem('aca_focus_progress')||'{}');
let pins=JSON.parse(localStorage.getItem('aca_focus_pins')||'{}');
function save(){localStorage.setItem('aca_focus_progress',JSON.stringify(progress));localStorage.setItem('aca_focus_pins',JSON.stringify(pins));}
function goHome(){sessionStorage.setItem('sublichat_skip_intro','1');window.location.href='./index.html#inicio';}
document.getElementById('homeBack').addEventListener('click',goHome);
function show(id){document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function toast(t){const el=document.getElementById('toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1600);}
document.querySelectorAll('.user').forEach(btn=>btn.addEventListener('click',()=>{
  current=btn.dataset.user; pin='';
  document.getElementById('pinAvatar').textContent=USERS[current].emoji;
  document.getElementById('pinAvatar').style.background=USERS[current].bg;
  document.getElementById('pinName').textContent=USERS[current].name;
  document.getElementById('pinHelp').textContent=pins[current]?'Ingrese su PIN':'Cree su PIN nuevo de 4 dígitos';
  paintDots(); show('pin');
}));
function paintDots(){document.querySelectorAll('#dots .dot').forEach((d,i)=>d.classList.toggle('on',i<pin.length));}
const keys=document.getElementById('keys');
['1','2','3','4','5','6','7','8','9','Borrar','0','Volver'].forEach(k=>{
  const b=document.createElement('button'); b.type='button'; b.textContent=k; b.className=isNaN(k)?'fn':'';
  b.addEventListener('click',()=>press(k)); keys.appendChild(b);
});
function press(k){
  if(k==='Volver'){show('select');return;}
  if(k==='Borrar'){pin=pin.slice(0,-1);paintDots();return;}
  if(pin.length<4){pin+=k;paintDots();}
  if(pin.length===4){
    if(!pins[current]){pins[current]=pin;save();toast('PIN guardado');renderDash();show('dash');}
    else if(pin===pins[current]){renderDash();show('dash');}
    else{pin='';paintDots();toast('PIN incorrecto');}
  }
}
function doneList(){return progress[current]||[];}
function pct(){return Math.round((doneList().length/LESSONS.length)*100);}
function renderDash(){
  const done=doneList();
  document.getElementById('dash').innerHTML=`<div class="dashHead"><span class="avatar" style="background:${USERS[current].bg}">${USERS[current].emoji}</span><div style="flex:1"><h2>Hola, ${USERS[current].name}</h2><p>Agente de ventas · ${pct()}% completado</p><div class="xp"><i style="width:${pct()}%"></i></div></div></div>
  <div class="stats"><div class="stat"><b>🔥 ${done.length}</b><span>Niveles</span></div><div class="stat"><b>⭐ ${done.length*50}</b><span>XP</span></div><div class="stat"><b>🏆 ${Math.floor(done.length/5)}</b><span>Logros</span></div></div>
  <div class="section">Ruta de aprendizaje · 30 niveles</div>
  <div class="path">${LESSONS.map((l,i)=>`<button type="button" class="node ${done.includes(i)?'done':''} ${i>done.length?'locked':''}" data-i="${i}"><div class="bubble">${done.includes(i)?'✅':l[0]}</div><div class="info"><b>${l[1]}</b><small>Nivel ${i+1}</small></div></button>`).join('')}</div>
  <button type="button" class="ghost" id="changeAgent">Cambiar agente</button><button type="button" class="ghost" id="backInicio">Volver a inicio</button>`;
  document.querySelectorAll('.node').forEach(n=>n.addEventListener('click',()=>{
    const i=Number(n.dataset.i);
    if(i>doneList().length){toast('Complete el nivel anterior');return;}
    renderLesson(i);show('lesson');
  }));
  document.getElementById('changeAgent').addEventListener('click',()=>show('select'));
  document.getElementById('backInicio').addEventListener('click',goHome);
}
function renderLesson(i){
  const l=LESSONS[i];
  document.getElementById('lesson').innerHTML=`<div class="lesson"><div style="font-size:56px;margin-bottom:8px">${l[0]}</div><h2>${l[1]}</h2><p>${l[2]}</p><p><b>Práctica:</b> redacte una respuesta clara, amable y directa. Use tono Sublicuentas, precio visible y cierre simple.</p><button type="button" class="primary" id="completeLevel">Completar nivel</button><button type="button" class="ghost" id="backRoute">Volver a ruta</button></div>`;
  document.getElementById('completeLevel').addEventListener('click',()=>complete(i));
  document.getElementById('backRoute').addEventListener('click',()=>{renderDash();show('dash');});
}
function complete(i){
  progress[current]=progress[current]||[];
  if(!progress[current].includes(i)){progress[current].push(i);save();toast('+50 XP');}
  renderDash();show('dash');
}
</script>
</body>
</html>
