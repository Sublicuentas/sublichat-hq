<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<title>Academia Sublicuentas</title>

<!--
  ============================================================================
  ACADEMIA SUBLICUENTAS  ·  módulo de entrenamiento integrable a Sublichat
  ============================================================================

  CÓMO INTEGRARLO A SUBLICHAT (single-file HTML):
  1. Copiá el bloque <style id="academia-style"> ... </style> al <head> de Sublichat.
  2. Copiá el bloque <div id="academia-root"> ... </div> dentro del <body>.
  3. Copiá el <script id="academia-script"> ... </script> al final del <body>.
  4. En tu pantalla de INICIO de Sublichat, agregá la tarjeta (ver "TARJETA DE
     INICIO" abajo) y que su onclick llame a:  Academia.abrir()
  Eso es todo. Usa tu mismo Firebase; solo agrega la colección "academia_progreso".

  CONEXIÓN A TU FIREBASE:
  - Pegá tu config real en firebaseConfig (abajo).
  - Mientras no la pegues, corre en MODO DEMO (guarda en memoria de la sesión)
    para que puedas verla funcionar de una vez.

  PIN DE CADA USUARIO:
  - Cambiá los PIN por defecto en la constante USERS (abajo).
============================================================================
-->

<style id="academia-style">
  @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700&display=swap');

  #academia-root, #academia-root * { box-sizing: border-box; margin: 0; padding: 0; }

  #academia-root {
    --bg:        #0d0f17;
    --bg-2:      #141826;
    --card:      #1a1f30;
    --card-2:    #212740;
    --line:      #2a3150;
    --text:      #eef1fb;
    --muted:     #8b93b5;
    --gold:      #f6b73c;
    --gold-soft: #ffd684;
    --teal:      #2fd6b0;
    --rose:      #ff6b8b;
    --indigo:    #6c7bff;
    --ok:        #2fd6b0;
    --shadow:    0 24px 60px -20px rgba(0,0,0,.7);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    position: fixed; inset: 0;
    z-index: 9999;
    background:
      radial-gradient(900px 500px at 85% -10%, rgba(246,183,60,.10), transparent 60%),
      radial-gradient(800px 600px at -10% 110%, rgba(108,123,255,.14), transparent 55%),
      var(--bg);
    overflow-y: auto;
    display: block;
  }
  #academia-root.open { display: block; }

  #academia-root .wrap { max-width: 920px; margin: 0 auto; padding: 22px 18px 60px; }

  #academia-root h1, #academia-root h2, #academia-root h3, #academia-root .display {
    font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; letter-spacing: -.02em;
  }

  /* top bar */
  #academia-root .topbar {
    display:flex; align-items:center; justify-content:space-between;
    padding: 6px 2px 18px;
  }
  #academia-root .brand { display:flex; align-items:center; gap:11px; }
  #academia-root .brand .glyph {
    width:42px; height:42px; border-radius:13px; display:grid; place-items:center;
    font-size:21px;
    background: linear-gradient(145deg, var(--gold), #d98a1f);
    box-shadow: 0 8px 22px -8px rgba(246,183,60,.7);
  }
  #academia-root .brand b { font-family:'Bricolage Grotesque'; font-size:18px; }
  #academia-root .brand small { display:block; color:var(--muted); font-size:11.5px; margin-top:-1px; }
  #academia-root .btn-ghost {
    background:transparent; border:1px solid var(--line); color:var(--muted);
    padding:9px 14px; border-radius:11px; font-family:'DM Sans'; font-weight:600;
    font-size:13px; cursor:pointer; transition:.18s;
  }
  #academia-root .btn-ghost:hover { color:var(--text); border-color:var(--muted); }

  /* demo banner */
  #academia-root .demo-banner {
    background: rgba(246,183,60,.08); border:1px solid rgba(246,183,60,.3);
    color: var(--gold-soft); border-radius:12px; padding:10px 14px; font-size:12.5px;
    margin-bottom:18px; display:flex; gap:9px; align-items:center;
  }

  /* ---------- USER SELECT ---------- */
  #academia-root .screen { animation: fade .35s ease; }
  @keyframes fade { from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;} }

  #academia-root .hero { text-align:center; padding:34px 0 26px; }
  #academia-root .hero .kicker {
    color:var(--gold); font-weight:700; font-size:12px; letter-spacing:.18em; text-transform:uppercase;
  }
  #academia-root .hero h1 { font-size:clamp(30px,7vw,46px); margin:8px 0 10px; line-height:1.02; }
  #academia-root .hero p { color:var(--muted); max-width:460px; margin:0 auto; font-size:14.5px; }

  #academia-root .user-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:26px; }
  @media(max-width:520px){ #academia-root .user-grid{ grid-template-columns:1fr; } }
  #academia-root .user-card {
    background: linear-gradient(160deg, var(--card), var(--card-2));
    border:1px solid var(--line); border-radius:22px; padding:30px 22px; cursor:pointer;
    text-align:center; transition:.2s; position:relative; overflow:hidden;
  }
  #academia-root .user-card:hover { transform:translateY(-4px); border-color:var(--gold); box-shadow:var(--shadow); }
  #academia-root .user-card .avatar {
    width:78px; height:78px; border-radius:50%; margin:0 auto 14px; display:grid; place-items:center;
    font-family:'Bricolage Grotesque'; font-weight:800; font-size:30px; color:#0d0f17;
  }
  #academia-root .user-card.libni .avatar { background:linear-gradient(145deg,var(--gold),var(--gold-soft)); }
  #academia-root .user-card.naara .avatar { background:linear-gradient(145deg,var(--teal),#86f3da); }
  #academia-root .user-card h3 { font-size:22px; }
  #academia-root .user-card .lvl { color:var(--muted); font-size:13px; margin-top:4px; }

  /* ---------- PIN ---------- */
  #academia-root .pin-box { max-width:340px; margin:30px auto 0; text-align:center; }
  #academia-root .pin-dots { display:flex; justify-content:center; gap:14px; margin:22px 0; }
  #academia-root .pin-dots .dot {
    width:16px; height:16px; border-radius:50%; border:2px solid var(--line); transition:.15s;
  }
  #academia-root .pin-dots .dot.on { background:var(--gold); border-color:var(--gold); transform:scale(1.1); }
  #academia-root .pin-dots.err .dot { border-color:var(--rose); animation:shake .4s; }
  @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-7px);} 75%{transform:translateX(7px);} }
  #academia-root .keypad { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
  #academia-root .keypad button {
    aspect-ratio:1.6; background:var(--card); border:1px solid var(--line); border-radius:14px;
    color:var(--text); font-family:'Bricolage Grotesque'; font-weight:700; font-size:22px; cursor:pointer; transition:.12s;
  }
  #academia-root .keypad button:hover { background:var(--card-2); }
  #academia-root .keypad button:active { transform:scale(.95); }
  #academia-root .keypad button.fn { font-size:14px; font-family:'DM Sans'; color:var(--muted); }
  #academia-root .pin-hint { color:var(--muted); font-size:12px; margin-top:14px; }

  /* ---------- DASHBOARD ---------- */
  #academia-root .greet { display:flex; align-items:center; gap:14px; margin:6px 0 20px; }
  #academia-root .greet .av {
    width:54px; height:54px; border-radius:16px; display:grid; place-items:center;
    font-family:'Bricolage Grotesque'; font-weight:800; font-size:22px; color:#0d0f17;
  }
  #academia-root .greet .av.libni{ background:linear-gradient(145deg,var(--gold),var(--gold-soft)); }
  #academia-root .greet .av.naara{ background:linear-gradient(145deg,var(--teal),#86f3da); }
  #academia-root .greet h2 { font-size:22px; }
  #academia-root .greet .stat { color:var(--muted); font-size:13px; }
  #academia-root .greet .stat b { color:var(--gold); }

  #academia-root .xp-bar { height:9px; background:var(--bg-2); border-radius:99px; overflow:hidden; margin-top:7px; border:1px solid var(--line); }
  #academia-root .xp-bar i { display:block; height:100%; background:linear-gradient(90deg,var(--gold),var(--gold-soft)); border-radius:99px; transition:width .6s; }

  #academia-root .badges-row { display:flex; gap:8px; flex-wrap:wrap; margin:16px 0 26px; }
  #academia-root .badge {
    background:var(--card); border:1px solid var(--line); border-radius:99px; padding:6px 13px;
    font-size:12px; display:flex; gap:6px; align-items:center; color:var(--gold-soft);
  }
  #academia-root .badge.locked { color:var(--muted); opacity:.5; }

  #academia-root .section-title { font-size:13px; color:var(--muted); text-transform:uppercase; letter-spacing:.12em; margin:0 2px 12px; }

  #academia-root .track {
    background:linear-gradient(160deg,var(--card),var(--card-2));
    border:1px solid var(--line); border-radius:20px; padding:20px; margin-bottom:14px; cursor:pointer; transition:.2s;
  }
  #academia-root .track:hover { border-color:var(--track-c); transform:translateY(-2px); }
  #academia-root .track .t-head { display:flex; align-items:center; gap:14px; }
  #academia-root .track .t-ico { width:48px; height:48px; border-radius:14px; display:grid; place-items:center; font-size:24px; background:var(--bg-2); }
  #academia-root .track h3 { font-size:18px; }
  #academia-root .track .t-sub { color:var(--muted); font-size:12.5px; margin-top:2px; }
  #academia-root .track .t-prog { margin-top:14px; display:flex; align-items:center; gap:10px; }
  #academia-root .track .t-prog .bar { flex:1; height:7px; background:var(--bg); border-radius:99px; overflow:hidden; }
  #academia-root .track .t-prog .bar i { display:block; height:100%; background:var(--track-c); transition:width .5s; }
  #academia-root .track .t-prog span { font-size:12px; color:var(--muted); font-weight:600; }

  /* ---------- LEVELS LIST ---------- */
  #academia-root .back { background:none; border:none; color:var(--muted); font-size:13.5px; cursor:pointer; display:flex; gap:6px; align-items:center; padding:4px; margin-bottom:14px; font-family:'DM Sans'; font-weight:600; }
  #academia-root .back:hover{ color:var(--text); }
  #academia-root .track-banner { border-radius:20px; padding:24px; margin-bottom:20px; color:#0d0f17; }
  #academia-root .track-banner h2 { font-size:26px; }
  #academia-root .track-banner p { font-size:13.5px; opacity:.85; margin-top:4px; max-width:520px; }

  #academia-root .level {
    display:flex; align-items:center; gap:15px; background:var(--card);
    border:1px solid var(--line); border-radius:16px; padding:16px 18px; margin-bottom:11px; transition:.18s;
  }
  #academia-root .level.unlocked { cursor:pointer; }
  #academia-root .level.unlocked:hover { border-color:var(--gold); transform:translateX(3px); }
  #academia-root .level.locked { opacity:.5; }
  #academia-root .level .num {
    width:40px; height:40px; border-radius:12px; flex-shrink:0; display:grid; place-items:center;
    font-family:'Bricolage Grotesque'; font-weight:800; font-size:17px; background:var(--bg-2); color:var(--muted);
  }
  #academia-root .level.done .num { background:var(--ok); color:#0d0f17; }
  #academia-root .level .l-info { flex:1; }
  #academia-root .level .l-info h4 { font-size:15.5px; font-weight:700; }
  #academia-root .level .l-info p { color:var(--muted); font-size:12.5px; margin-top:2px; }
  #academia-root .level .l-tag { font-size:11px; padding:4px 9px; border-radius:8px; font-weight:700; }
  #academia-root .level .l-tag.done { background:rgba(47,214,176,.15); color:var(--teal); }
  #academia-root .level .l-tag.lock { background:var(--bg-2); color:var(--muted); }
  #academia-root .level .l-tag.go { background:rgba(246,183,60,.16); color:var(--gold); }

  /* ---------- LESSON ---------- */
  #academia-root .lesson { background:var(--card); border:1px solid var(--line); border-radius:22px; padding:30px 26px; }
  #academia-root .lesson .eyebrow { color:var(--gold); font-size:12px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; }
  #academia-root .lesson h2 { font-size:26px; margin:8px 0 18px; line-height:1.1; }
  #academia-root .lesson .body p { font-size:15px; line-height:1.7; color:#d7dcf2; margin-bottom:15px; }
  #academia-root .lesson .body h4 { font-family:'Bricolage Grotesque'; font-size:16px; margin:20px 0 9px; color:var(--gold-soft); }
  #academia-root .lesson .body ul { margin:0 0 15px 4px; list-style:none; }
  #academia-root .lesson .body li { position:relative; padding-left:24px; margin-bottom:9px; font-size:14.5px; line-height:1.6; color:#d7dcf2; }
  #academia-root .lesson .body li:before { content:'›'; position:absolute; left:6px; color:var(--gold); font-weight:800; font-size:17px; top:-1px; }
  #academia-root .lesson .body .pill { background:var(--bg-2); border-left:3px solid var(--gold); padding:13px 16px; border-radius:10px; font-size:14px; line-height:1.6; margin:6px 0 16px; color:#e7ebfb; }
  #academia-root .lesson .body .pill b{ color:var(--gold-soft); }

  /* ---------- QUIZ ---------- */
  #academia-root .quiz h3 { font-size:20px; margin-bottom:4px; }
  #academia-root .quiz .qsub { color:var(--muted); font-size:13px; margin-bottom:20px; }
  #academia-root .q-card { background:var(--card); border:1px solid var(--line); border-radius:18px; padding:22px; margin-bottom:14px; }
  #academia-root .q-card .qn { font-size:16px; font-weight:700; margin-bottom:14px; line-height:1.4; }
  #academia-root .q-card .opt {
    display:block; width:100%; text-align:left; background:var(--bg-2); border:1.5px solid var(--line);
    border-radius:12px; padding:13px 15px; margin-bottom:9px; color:var(--text); cursor:pointer;
    font-family:'DM Sans'; font-size:14px; transition:.15s;
  }
  #academia-root .q-card .opt:hover { border-color:var(--muted); }
  #academia-root .q-card .opt.sel { border-color:var(--gold); background:rgba(246,183,60,.1); }
  #academia-root .q-card .opt.correct { border-color:var(--ok); background:rgba(47,214,176,.14); }
  #academia-root .q-card .opt.wrong { border-color:var(--rose); background:rgba(255,107,139,.13); }
  #academia-root .q-card .opt:disabled { cursor:default; }

  /* ---------- RESULTS ---------- */
  #academia-root .result { text-align:center; background:var(--card); border:1px solid var(--line); border-radius:22px; padding:40px 26px; }
  #academia-root .result .ring { width:140px; height:140px; margin:0 auto 18px; position:relative; }
  #academia-root .result .ring svg { transform:rotate(-90deg); }
  #academia-root .result .ring .pct { position:absolute; inset:0; display:grid; place-items:center; font-family:'Bricolage Grotesque'; font-weight:800; font-size:34px; }
  #academia-root .result h2 { font-size:25px; margin-bottom:6px; }
  #academia-root .result p { color:var(--muted); font-size:14px; max-width:380px; margin:0 auto 8px; }
  #academia-root .result .xp-won { color:var(--gold); font-weight:700; font-size:15px; margin:14px 0 4px; }

  /* buttons */
  #academia-root .btn {
    background:linear-gradient(145deg,var(--gold),#e0961f); color:#0d0f17; border:none;
    padding:14px 26px; border-radius:13px; font-family:'Bricolage Grotesque'; font-weight:700; font-size:15px;
    cursor:pointer; transition:.18s; box-shadow:0 10px 24px -10px rgba(246,183,60,.7);
  }
  #academia-root .btn:hover{ transform:translateY(-2px); filter:brightness(1.05); }
  #academia-root .btn:disabled{ opacity:.4; cursor:not-allowed; transform:none; box-shadow:none; }
  #academia-root .btn.full{ width:100%; }
  #academia-root .btn.alt{ background:var(--card-2); color:var(--text); box-shadow:none; border:1px solid var(--line); }
  #academia-root .footer-actions{ margin-top:24px; display:flex; gap:12px; }

  /* toast */
  #academia-root .toast {
    position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(20px);
    background:var(--card-2); border:1px solid var(--gold); color:var(--gold-soft);
    padding:13px 22px; border-radius:14px; font-weight:600; font-size:14px; opacity:0; transition:.3s; pointer-events:none; z-index:50;
  }
  #academia-root .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>

<script id="academia-script">
"use strict";
const Academia = (() => {

/* ===========================================================================
   1)  CONFIG  —  pegá acá tu Firebase real y cambiá los PIN
=========================================================================== */
const firebaseConfig = {
  apiKey: "AIzaSyA_b1a0Zo4OIAj4KayD5ChtPWToANQ1nrA",
  authDomain: "sublicuentasbot.firebaseapp.com",
  projectId: "sublicuentasbot",
  storageBucket: "sublicuentasbot.firebasestorage.app",
  messagingSenderId: "17227154881",
  appId: "1:17227154881:web:654a1c94c2c6a331d95b40",
  measurementId: "G-40Z71BGE7E"
};

const USERS = {
  libni: { name: "Libni", color: "libni" },
  naara: { name: "Naara", color: "naara" }
};

const PASS = 0.7;          // 70% para aprobar un nivel
const XP_PER_LEVEL = 100;  // XP base al aprobar

/* ===========================================================================
   2)  CONTENIDO  —  los 3 tracks (editá libremente)
=========================================================================== */
const TRACKS = [
  {
    id:"atencion", name:"Atención al Cliente", icon:"💬", color:"#6c7bff",
    desc:"Cómo tratar al cliente para que vuelva y te recomiende.",
    levels:[
      {
        t:"Primera impresión y tono en WhatsApp",
        d:"El saludo lo es todo",
        lesson:`<p>En Sublicuentas casi todo el contacto pasa por WhatsApp, y ahí el cliente no te ve la cara: <b>solo lee tu texto</b>. Por eso el tono escrito es tu primera impresión, y se forma en los primeros 10 segundos.</p>
        <h4>Las 3 reglas de oro del saludo</h4>
        <ul><li>Respondé rápido. Un "¡Hola! Con gusto te ayudo 🙌" en los primeros minutos vale más que una respuesta perfecta media hora después.</li>
        <li>Usá el nombre del cliente apenas lo sepás. "Claro que sí, Marvin" suena 100% distinto a un "claro".</li>
        <li>Nunca contestés con una sola palabra seca ("sí", "no", "ok"). Suena a que estás molesto.</li></ul>
        <div class="pill">Cliente: <i>"¿Tenés Netflix?"</i><br><b>Mal:</b> "si"<br><b>Bien:</b> "¡Hola! 🙌 Sí tenemos Netflix disponible. ¿Te paso los planes y precios?"</div>
        <p>El cliente que se siente bien atendido desde el "hola" perdona errores después. El que recibe frialdad, al primer problema se va con la competencia.</p>`,
        quiz:[
          {q:"¿Por qué el tono escrito es tan importante en Sublicuentas?", o:["Porque WhatsApp cobra por mensaje","Porque el cliente no te ve y solo lee tu texto","Porque hay que escribir bonito","Porque lo pide Netflix"], a:1},
          {q:"Un cliente escribe '¿tenés Disney?'. ¿Cuál es la mejor respuesta?", o:["si","¡Hola! 🙌 Sí tenemos Disney+. ¿Te paso precios?","ocupado, espere","disponible"], a:1},
          {q:"¿Qué pasa cuando respondés con una sola palabra seca?", o:["Suena profesional","Ahorra tiempo y está bien","Suena a que estás molesto o no te importa","Al cliente le gusta"], a:2},
          {q:"¿Cuál de estas SÍ es regla de oro del saludo?", o:["Responder cuando tengás tiempo","Usar el nombre del cliente apenas lo sepás","Mandar siempre audio","Nunca usar emojis"], a:1}
        ]
      },
      {
        t:"Escucha activa y lenguaje positivo",
        d:"Entender antes de vender",
        lesson:`<p>Escuchar (o leer) bien es la mitad del trabajo. Muchas ventas se pierden porque el reseller contesta algo que el cliente no preguntó, o lo apura.</p>
        <h4>Escucha activa por chat</h4>
        <ul><li>Leé el mensaje completo antes de responder. No contestés a medias.</li>
        <li>Confirmá lo que entendiste: "Entonces buscás Netflix para 1 pantalla, ¿verdad?".</li>
        <li>Hacé preguntas en vez de suponer.</li></ul>
        <h4>Lenguaje positivo</h4>
        <p>Decí lo que <b>sí podés hacer</b>, no lo que no.</p>
        <div class="pill"><b>Negativo:</b> "No, ese plan no lo manejo."<br><b>Positivo:</b> "Ese no lo tengo, pero te recomiendo este que te sirve igual y cuesta menos."</div>

/* ===========================================================================
   3)  ESTADO + FIREBASE (con modo demo / memoria)
=========================================================================== */
let db = null, DB_MODE = "memory";
const memStore = {};            // fallback en memoria
let current = null;             // userId activo
let progress = { xp:0, badges:[], levels:{} };
let pinBuffer = "";
let nav = { view:"users", trackId:null, levelIdx:null };
let quizState = null;

function initFirebase(){
  try {
    if (firebaseConfig.apiKey && !firebaseConfig.apiKey.startsWith("PEGA")) {
      firebase.initializeApp(firebaseConfig);
      db = firebase.firestore();
      DB_MODE = "firestore";
    }
  } catch(e){ console.warn("Academia: Firebase no inició, modo demo.", e); DB_MODE="memory"; }
}

async function loadProgress(userId){
  if (DB_MODE === "firestore"){
    try {
      const snap = await db.collection("academia_progreso").doc(userId).get();
      return snap.exists ? snap.data() : { xp:0, badges:[], levels:{} };
    } catch(e){ console.warn(e); }
  }
  return memStore[userId] ? JSON.parse(JSON.stringify(memStore[userId])) : { xp:0, badges:[], levels:{} };
}

async function saveProgress(userId, data){
  if (DB_MODE === "firestore"){
    try { await db.collection("academia_progreso").doc(userId).set(data, {merge:true}); return; }
    catch(e){ console.warn(e); }
  }
  memStore[userId] = JSON.parse(JSON.stringify(data));
}

// Lee el PIN guardado de un usuario (null si todavía no creó uno)
async function loadUserAuth(userId){
  if (DB_MODE === "firestore"){
    try {
      const snap = await db.collection("academia_progreso").doc(userId).get();
      return snap.exists ? snap.data() : null;
    } catch(e){ console.warn(e); }
  }
  return memStore[userId] || null;
}

// Guarda el PIN del usuario sin tocar su avance
async function savePin(userId, pin){
  if (DB_MODE === "firestore"){
    try { await db.collection("academia_progreso").doc(userId).set({pin}, {merge:true}); return; }
    catch(e){ console.warn(e); }
  }
  memStore[userId] = Object.assign({xp:0,badges:[],levels:{}}, memStore[userId]||{}, {pin});
}

/* ===========================================================================
   4)  HELPERS
=========================================================================== */
const $ = id => document.getElementById(id);
const screen = () => $("aca-screen");
const levelKey = (trackId, idx) => `${trackId}-${idx}`;

function isUnlocked(trackId, idx){
  if (idx === 0) return true;
  return !!(progress.levels[levelKey(trackId, idx-1)]?.completed);
}
function trackDone(trackId){
  const tr = TRACKS.find(t=>t.id===trackId);
  return tr.levels.every((_,i)=> progress.levels[levelKey(trackId,i)]?.completed);
}
function trackProgress(trackId){
  const tr = TRACKS.find(t=>t.id===trackId);
  const done = tr.levels.filter((_,i)=> progress.levels[levelKey(trackId,i)]?.completed).length;
  return { done, total: tr.levels.length, pct: Math.round(done/tr.levels.length*100) };
}
function totalLevels(){ return TRACKS.reduce((s,t)=>s+t.levels.length,0); }

function toast(msg){
  const t=$("aca-toast"); t.textContent=msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 2600);
}

/* ===========================================================================
   5)  RENDER

  if (nav.view==="track") return renderTrack();
  if (nav.view==="lesson")return renderLesson();
  if (nav.view==="quiz")  return renderQuiz();
  if (nav.view==="result")return renderResult();
}

function renderDash(){
  const u = USERS[current];
  const lvlNum = Object.values(progress.levels).filter(l=>l.completed).length;
  const xpPct = Math.min(100, Math.round(progress.xp / (totalLevels()*XP_PER_LEVEL) * 100));
  const allBadges = TRACKS.map(t=>({id:t.id,name:t.name,icon:t.icon}));
  screen().innerHTML = `
   <div class="screen">
    <div class="greet">
      <div class="av ${u.color}">${u.name[0]}</div>
      <div style="flex:1">
        <h2>Hola, ${u.name} 👋</h2>
        <div class="stat"><b>${progress.xp} XP</b> · ${lvlNum}/${totalLevels()} niveles completados</div>
        <div class="xp-bar"><i style="width:${xpPct}%"></i></div>
      </div>
    </div>

    <div class="badges-row">
      ${allBadges.map(b=>{
        const got = progress.badges.includes(b.id);
        return `<div class="badge ${got?'':'locked'}">${got?b.icon:'🔒'} ${b.name}${got?' ✓':''}</div>`;
      }).join("")}
    </div>

    <div class="section-title">Tus rutas de entrenamiento</div>
    ${TRACKS.map(t=>{
      const p = trackProgress(t.id);
      return `
      <div class="track" style="--track-c:${t.color}" onclick="Academia.openTrack('${t.id}')">
        <div class="t-head">
          <div class="t-ico" style="color:${t.color}">${t.icon}</div>
          <div style="flex:1">

            <div class="t-sub">${t.desc}</div>
          </div>
          <div style="color:${t.color};font-size:20px;">→</div>
        </div>
        <div class="t-prog">
          <div class="bar"><i style="width:${p.pct}%;background:${t.color}"></i></div>
          <span>${p.done}/${p.total}</span>
        </div>
      </div>`;
    }).join("")}

    <div class="footer-actions">
      <button class="btn alt" onclick="Academia.logout()">Cambiar de usuario</button>
    </div>
   </div>`;
}

function renderTrack(){
  const t = TRACKS.find(x=>x.id===nav.trackId);
  screen().innerHTML = `
   <div class="screen">
    <button class="back" onclick="Academia.go('dash')">‹ Inicio de Academia</button>
    <div class="track-banner" style="background:linear-gradient(135deg,${t.color},${shade(t.color)})">
      <h2>${t.icon} ${t.name}</h2>
      <p>${t.desc}</p>
    </div>
    ${t.levels.map((lv,i)=>{
      const done = progress.levels[levelKey(t.id,i)]?.completed;
      const unlocked = isUnlocked(t.id,i);
      const cls = done?'level done unlocked' : unlocked?'level unlocked':'level locked';
      const tag = done?`<span class="l-tag done">✓ ${progress.levels[levelKey(t.id,i)].best}%</span>`
                 : unlocked?`<span class="l-tag go">Empezar</span>`
                 : `<span class="l-tag lock">🔒</span>`;
      const onclick = unlocked?`onclick="Academia.openLesson('${t.id}',${i})"`:'';
      return `
      <div class="${cls}" ${onclick}>
        <div class="num">${done?'✓':i+1}</div>
        <div class="l-info"><h4>${lv.t}</h4><p>${lv.d}</p></div>
        ${tag}
      </div>`;
    }).join("")}
   </div>`;
}

function renderLesson(){
  const t = TRACKS.find(x=>x.id===nav.trackId);
  const lv = t.levels[nav.levelIdx];
  screen().innerHTML = `
   <div class="screen">
    <button class="back" onclick="Academia.openTrack('${t.id}')">‹ ${t.name}</button>
    <div class="lesson">
      <div class="eyebrow">${t.icon} Nivel ${nav.levelIdx+1}</div>
      <h2>${lv.t}</h2>
      <div class="body">${lv.lesson}</div>
      <button class="btn full" onclick="Academia.startQuiz()">Hacer el quiz →</button>
    </div>
   </div>`;
}

function renderQuiz(){
  const t = TRACKS.find(x=>x.id===nav.trackId);
  const lv = t.levels[nav.levelIdx];
  const answered = quizState.answers.filter(a=>a!==null).length;
  screen().innerHTML = `
   <div class="screen quiz">
    <button class="back" onclick="Academia.openLesson('${t.id}',${nav.levelIdx})">‹ Repasar la lección</button>
    <h3>Quiz · ${lv.t}</h3>
    <div class="qsub">Necesitás ${Math.round(PASS*100)}% para aprobar y desbloquear el siguiente nivel.</div>
    ${lv.quiz.map((qq,qi)=>`
      <div class="q-card">
        <div class="qn">${qi+1}. ${qq.q}</div>
        ${qq.o.map((op,oi)=>`
          <button class="opt ${quizState.answers[qi]===oi?'sel':''}" onclick="Academia.answer(${qi},${oi})">${op}</button>
        `).join("")}
      </div>`).join("")}
    <button class="btn full" onclick="Academia.submitQuiz()" ${answered<lv.quiz.length?'disabled':''}>
      ${answered<lv.quiz.length?`Respondé las ${lv.quiz.length} preguntas (${answered}/${lv.quiz.length})`:'Enviar respuestas'}
    </button>
   </div>`;
}

function renderResult(){
  const t = TRACKS.find(x=>x.id===nav.trackId);
  const r = quizState.result;
  const passed = r.pct >= PASS*100;
  const circ = 2*Math.PI*60;
  const off = circ*(1-r.pct/100);
  const col = passed? '#2fd6b0':'#ff6b8b';
  screen().innerHTML = `
   <div class="screen">
    <div class="result">
      <div class="ring">
        <svg width="140" height="140">
          <circle cx="70" cy="70" r="60" fill="none" stroke="#212740" stroke-width="11"/>
          <circle cx="70" cy="70" r="60" fill="none" stroke="${col}" stroke-width="11"
            stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${off}"
            style="transition:stroke-dashoffset 1s"/>
        </svg>
        <div class="pct" style="color:${col}">${r.pct}%</div>
      </div>
      <h2>${passed?'¡Nivel aprobado! 🎉':'Casi… probá de nuevo'}</h2>
      <p>${passed
          ? `Acertaste ${r.correct} de ${r.total}. ${nav.levelIdx+1<t.levels.length?'Se desbloqueó el siguiente nivel.':'¡Completaste toda la ruta!'}`
          : `Acertaste ${r.correct} de ${r.total}. Repasá la lección y volvé a intentarlo, ¡lo tenés cerca!`}</p>
      ${passed && r.xpWon>0 ? `<div class="xp-won">+${r.xpWon} XP ganados</div>`:''}
      ${passed && r.badge ? `<div class="xp-won">🏅 Insignia desbloqueada: ${r.badge}</div>`:''}
      <div class="footer-actions" style="justify-content:center">
        ${passed
          ? `<button class="btn" onclick="Academia.afterPass()">Continuar →</button>`
          : `<button class="btn alt" onclick="Academia.openLesson('${t.id}',${nav.levelIdx})">Repasar</button>
             <button class="btn" onclick="Academia.startQuiz()">Reintentar</button>`}
      </div>
    </div>
   </div>`;
}

function shade(hex){ // versión más oscura para el degradado del banner
  const n=parseInt(hex.slice(1),16);
  const r=Math.max(0,(n>>16)-40), g=Math.max(0,((n>>8)&255)-40), b=Math.max(0,(n&255)-40);
  return `#${((r<<16)|(g<<8)|b).toString(16).padStart(6,'0')}`;
}

/* ===========================================================================
   6)  API PÚBLICA
=========================================================================== */
initFirebase();   // intenta conectar a Firebase; si no hay config válida, queda en modo demo

return {
  abrir(){
    $("academia-root").classList.add("open");
    if (DB_MODE==="memory" && document.querySelector("#academia-root .demo-banner")===null && firebaseConfig.apiKey.startsWith("PEGA")){
      // mostramos aviso de demo una vez
    }
    nav = current ? {view:"dash"} : {view:"users"};
    render();
    if (DB_MODE==="memory"){
      const w=document.querySelector("#academia-root .wrap");
      if(!document.getElementById("aca-demo")){
        const d=document.createElement("div");
        d.id="aca-demo"; d.className="demo-banner";
        d.innerHTML="⚙️ Modo demo — pegá tu config de Firebase en el código para guardar el avance de forma permanente.";
        w.insertBefore(d, $("aca-screen"));
      }
    }
  },
  cerrar(){ location.href = "index.html"; },
  go(v){ if(v==='users'){pinBuffer="";} nav={view:v, trackId:nav.trackId, levelIdx:nav.levelIdx}; render(); },

  async pickUser(id){
    pinBuffer="";
    const auth = await loadUserAuth(id);
    if (auth && auth.pin){
      nav = { view:"pin", _pending:id, _mode:"verify", _storedPin:auth.pin };
    } else {
      nav = { view:"pin", _pending:id, _mode:"create", _step:1, _first:null };
    }
    render();
  },
  pinKey(n){
    if(pinBuffer.length>=4) return;
    pinBuffer+=n;
    const dots=$("aca-dots");
    if(dots) dots.innerHTML=[0,1,2,3].map(i=>`<div class="dot ${i<pinBuffer.length?'on':''}"></div>`).join("");
    if(pinBuffer.length===4) setTimeout(()=>this.checkPin(),180);
  },
  pinDel(){
    pinBuffer=pinBuffer.slice(0,-1);
    const dots=$("aca-dots");
    if(dots) dots.innerHTML=[0,1,2,3].map(i=>`<div class="dot ${i<pinBuffer.length?'on':''}"></div>`).join("");
  },
  _pinError(){
    const dots=$("aca-dots");
    if(dots){ dots.classList.add("err"); setTimeout(()=>dots.classList.remove("err"),420); }
    pinBuffer="";
    setTimeout(()=>{ const d=$("aca-dots"); if(d) d.innerHTML=[0,1,2,3].map(()=>`<div class="dot"></div>`).join(""); },200);
  },
  async _entrar(id){
    current=id;
    progress=await loadProgress(id);
    if(!progress || !progress.levels) progress={xp:0,badges:[],levels:{}};
    nav={view:"dash"};
    render();
  },
  async checkPin(){
    const id=nav._pending;
    // MODO CREAR: primer ingreso
    if(nav._mode==="create" && nav._step===1){
      nav._first = pinBuffer;
      nav._step = 2;
      pinBuffer = "";
      render();
      return;
    }
    // MODO CREAR: confirmación
    if(nav._mode==="create" && nav._step===2){
      if(pinBuffer === nav._first){
        await savePin(id, pinBuffer);
        toast("✅ PIN creado");
        await this._entrar(id);
      } else {
        toast("Los PIN no coincidieron, probá de nuevo");
        nav._step = 1; nav._first = null;
        this._pinError();
      }
      return;
    }
    // MODO VERIFICAR
    if(pinBuffer === nav._storedPin){
      await this._entrar(id);
    } else {
      this._pinError();
    }
  },
  logout(){ current=null; progress={xp:0,badges:[],levels:{}}; pinBuffer=""; nav={view:"users"}; render(); },

  openTrack(id){ nav={view:"track", trackId:id}; render(); window.scrollTo(0,0); },
  openLesson(id,i){
    if(!isUnlocked(id,i)){ toast("Completá el nivel anterior primero 🔒"); return; }
    nav={view:"lesson", trackId:id, levelIdx:i}; render(); window.scrollTo(0,0);
  },
  startQuiz(){
    const t=TRACKS.find(x=>x.id===nav.trackId);
    quizState={ answers:new Array(t.levels[nav.levelIdx].quiz.length).fill(null) };
    nav={...nav, view:"quiz"}; render(); window.scrollTo(0,0);
  },
  answer(qi,oi){ quizState.answers[qi]=oi; render(); },
  async submitQuiz(){
    const t=TRACKS.find(x=>x.id===nav.trackId);
    const quiz=t.levels[nav.levelIdx].quiz;
    let correct=0;
    quiz.forEach((qq,qi)=>{ if(quizState.answers[qi]===qq.a) correct++; });
    const pct=Math.round(correct/quiz.length*100);
    const passed=pct>=PASS*100;
    let xpWon=0, badge=null;

    if(passed){
      const key=levelKey(nav.trackId,nav.levelIdx);
      const prev=progress.levels[key];
      const firstTime=!prev?.completed;
      progress.levels[key]={ completed:true, best:Math.max(pct, prev?.best||0) };
      if(firstTime){ xpWon=XP_PER_LEVEL; progress.xp+=XP_PER_LEVEL; }
      // insignia si completó toda la ruta
      if(trackDone(nav.trackId) && !progress.badges.includes(nav.trackId)){
        progress.badges.push(nav.trackId);
        badge=t.name;
      }
      await saveProgress(current, progress);
    }
    quizState.result={ pct, correct, total:quiz.length, xpWon, badge };
    nav={...nav, view:"result"}; render(); window.scrollTo(0,0);
  },
  afterPass(){
    const t=TRACKS.find(x=>x.id===nav.trackId);
    const next=nav.levelIdx+1;
    if(next<t.levels.length){ nav={view:"track", trackId:nav.trackId}; }
    else { nav={view:"dash"}; toast("🏅 ¡Ruta completada, felicidades!"); }
    render(); window.scrollTo(0,0);
  }
};
})();
