      const d=snap.data()||{};
      if(Array.isArray(d.progress)) progress[user]=d.progress;
      if(typeof d.pin==='string'&&d.pin) pins[user]=d.pin;
      settings[user]=settings[user]||{};
      if(typeof d.avatar==='number') settings[user].avatar=d.avatar;
      if(typeof d.mascot==='number') settings[user].mascot=d.mascot;
      localStorage.setItem('aca_focus_progress',JSON.stringify(progress));
      localStorage.setItem('aca_focus_pins',JSON.stringify(pins));
      localStorage.setItem('aca_focus_settings',JSON.stringify(settings));
      return d;
    }
  }catch(e){ console.warn('cloudPull:', e&&e.message); }
  return null;
}
async function cloudPush(user){
  await authReady;
  if(!CLOUD||!_fs||!user) return;
  try{
    const s=settings[user]||{};
    await _fs.setDoc(_fs.doc(_fs.db,ACA_COL,user),{
      pin: pins[user]||null,
      progress: progress[user]||[],
      avatar: (typeof s.avatar==='number'? s.avatar : USERS[user].defaultAvatar),
      mascot: (typeof s.mascot==='number'? s.mascot : 0),
      name: USERS[user].name,
      updatedAt: Date.now()
    },{merge:true});
  }catch(e){ console.warn('cloudPush:', e&&e.message); }
}

"Cómo tratar clientes difíciles", "subtitle": "Lección 2 · El que llega molesto, regateando o sin decidir", "intro": "Tarde o temprano llega un cliente molesto, uno que regatea, uno apurado o uno que no decide. Saber manejarlos sin pelear ni perder la venta es de las habilidades que más dinero le ahorran.", "concept": {"term": "Cliente difícil", "def": "Es el cliente que llega molesto, desconfiado, apurado, indeciso o que regatea. No es un enemigo: casi siempre solo está estresado o tiene miedo de equivocarse. Su trabajo es bajarle la tensión y guiarlo, no ganarle la discusión."}, "sections": [{"h": "Cliente molesto: primero calma, luego solución", "p": "Cuando alguien llega enojado, NO se defienda ni dé excusas largas. Primero baje el tono con una disculpa corta ('le pido disculpas por la espera'), y de una vez pase a la solución. Las excusas empeoran; la acción calma."}, {"h": "Cliente que regatea: defienda el valor", "p": "Bajar el precio de una vez quema su ganancia y lo acostumbra mal. Primero recuerde lo que incluye (soporte, garantía, entrega al momento) y ofrezca MÁS TIEMPO o un combo en vez de descuento."}, {"h": "Cliente indeciso: decida por él con una pregunta", "p": "El indeciso se traba solo. Pregúntele qué ve más o para qué lo quiere, y recomiéndele uno. Darle a elegir entre DOS opciones ('¿el de 1 mes o el de 3?') lo ayuda a decidir."}, {"h": "Cliente apurado: rápido, pero con orden", "p": "Atienda con energía, pero nunca entregue antes de que pague. Velocidad con validación: 'apenas me llegue el comprobante, le activo al toque'."}], "examples": [{"sit": "Cliente: «Llevo media hora esperando y nada!! 😡»", "bien": "Le pido disculpas por la espera 🙏 Ya estoy con usted. Cuénteme qué necesita y lo resolvemos de una.", "mal": "Es que ando ocupada, espérese.", "why": "Disculpa corta + acción inmediata baja la tensión. Las excusas la suben."}, {"sit": "Cliente: «Uy está caro, en otro lado lo vi más barato»", "bien": "Le entiendo. Por ese precio lleva soporte y garantía si algo falla. ¿Le armo un plan de más tiempo para que le salga más conveniente?", "mal": "Bueno, se lo dejo más barato pues.", "why": "Defienda el valor y ofrezca más tiempo/combo; no regale el precio al primer regateo."}, {"sit": "Cliente: «No sé, déjame pensarlo mejor»", "bien": "Claro 😊 Solo le comento que la promo de este precio va hasta el domingo. Si quiere, se lo aparto hoy y me paga cuando pueda. ¿Le parece?", "mal": "Bueno, ahí me avisa.", "why": "Apartar con la promo real empuja la decisión sin presionar ni dejar que se enfríe."}], "scenarios": [{"client": "(Cliente molesto) «Me vendieron una cuenta que no sirve, qué mala atención!»", "options": [{"t": "Lamento mucho lo que pasó 🙏 Vamos a resolverlo ya. ¿Me manda captura de lo que le sale para arreglarlo de una?", "ok": true}, {"t": "Esa cuenta sí servía, usted hizo algo mal.", "ok": false}, {"t": "Ya le dije que no es mi culpa.", "ok": false}], "explain": "Primero empatía y acción; nunca echarle la culpa ni discutir con un cliente molesto."}, {"client": "(Regateador) «Dame los dos por el precio de uno y cerramos ya»", "options": [{"t": "Por ese precio pierdo, pero le propongo algo mejor: el mismo precio y le sumo más tiempo. ¿Le sirve?", "ok": true}, {"t": "Bueno va, los dos por el precio de uno.", "ok": false}, {"t": "No, así no, adiós.", "ok": false}], "explain": "Defienda el margen ofreciendo valor (tiempo), no regalando. Tampoco corte feo al cliente."}], "quiz": [{"q": "Con un cliente molesto, lo PRIMERO es:", "opts": ["Explicar largo por qué pasó", "Disculparse corto y pasar a la solución", "Defenderse"], "correct": 1, "explain": "Calma primero, solución de una."}, {"q": "Frente a «está caro», conviene:", "opts": ["Bajar el precio siempre", "Defender el valor y ofrecer combo o más tiempo", "Discutir con el cliente"], "correct": 1, "explain": "Agregue valor en vez de rebajar."}, {"q": "Para ayudar a un cliente indeciso:", "opts": ["Dejarlo que decida solo", "Hacerle una pregunta y darle dos opciones", "Mandarle todo el catálogo"], "correct": 1, "explain": "Una pregunta concreta + dos opciones lo desbloquea."}, {"q": "Un cliente difícil casi siempre está:", "opts": ["Buscando pelea", "Estresado o con miedo de equivocarse", "Queriendo no pagar"], "correct": 1, "explain": "Entenderlo así le ayuda a tratarlo mejor."}], "tip": "Hoy, si llega un cliente molesto, respire y conteste: disculpa corta + 'lo resolvemos ya', sin excusas."}, {"cat": "Atención al cliente", "icon": "💬", "badge": "Servicio", "title": "Comunicación clara por WhatsApp", "subtitle": "Lección 3 · Que se entienda, se vea pro y venda", "intro": "Casi todo lo vende por WhatsApp. La forma en que escribe (orden, claridad, tono) hace que el cliente confíe o se confunda. Aquí aprende a escribir para vender.", "concept": {"term": "Comunicación efectiva", "def": "Es lograr que el cliente entienda rápido y sin esfuerzo lo que usted le dice, y se sienta bien atendido. En WhatsApp, comunicar bien = mensajes cortos, ordenados, con buen tono y un siguiente paso claro."}, "sections": [{"h": "Mensajes cortos y ordenados", "p": "Evite el párrafo gigante. Use frases cortas, y cuando dé pasos o datos, sepárelos (con números o renglones). Un mensaje ordenado se lee fácil y da imagen de negocio serio."}, {"h": "Siempre cierre con un siguiente paso", "p": "Cada mensaje debe dejar claro qué sigue: 'mándeme su correo', 'le paso los datos de pago', '¿se lo activo?'. Si no, la conversación se queda parada."}, {"h": "Cuide el tono", "p": "Un emoji o un '¡con gusto!' calienta el trato. Pero no exagere ni use palabras técnicas. Hable como le hablaría a un vecino que aprecia."}], "examples": [{"sit": "Entregar una cuenta", "bien": "¡Listo! 🎬 Aquí su acceso:\n📧 Correo: ___\n🔑 Clave: ___\n👤 Perfil: el que dice Sublicuentas\n⚠️ No cambie la clave. ¡Que lo disfrute!", "mal": "ahi va correo y clave", "why": "El bueno va con formato y reglas; el malo tira los datos sueltos y causa errores."}, {"sit": "Pedir el pago", "bien": "Le paso los datos 👇\nBanco: ___\nCuenta: ___\nA nombre de: ___\nCuando transfiera, mándeme la captura y le activo al toque 🙌", "mal": "por transferencia ahí", "why": "Datos completos + el siguiente paso evita idas y vueltas."}], "scenarios": [{"client": "Cliente: «No entendí cómo lo pongo en la tele»", "options": [{"t": "No se preocupe, le explico pasito a pasito: 1) abra la tienda de apps, 2) busque la app, 3) instálela. ¿Vamos?", "ok": true}, {"t": "Solo descárguelo y ya.", "ok": false}, {"t": "Es facilísimo, búsquelo usted.", "ok": false}], "explain": "Pasos cortos y numerados, con paciencia. 'Es fácil, búsquelo' frustra al cliente."}, {"client": "Cliente: (manda un audio de 2 minutos enredado)", "options": [{"t": "Gracias por el audio 🙌 Para ayudarle rápido, confírmeme por texto: 1) qué plataforma, 2) en qué aparato, 3) por cuánto tiempo.", "ok": true}, {"t": "No le entendí nada, repita el audio.", "ok": false}, {"t": "Mejor escríbalo todo otra vez.", "ok": false}], "explain": "Tome el control pidiendo solo los 3 datos clave, sin hacer repetir."}], "quiz": [{"q": "¿Cómo deben ser los mensajes en WhatsApp?", "opts": ["Largos y completos", "Cortos, ordenados y con un siguiente paso", "En mayúsculas"], "correct": 1, "explain": "Cortos, claros y con qué sigue."}, {"q": "Al entregar datos (cuenta o pago) conviene:", "opts": ["Tirarlos sueltos", "Separarlos con renglones o números", "Mandar solo uno"], "correct": 1, "explain": "El formato claro evita errores."}, {"q": "Para un cliente que no sabe instalar:", "opts": ["Decir 'es fácil'", "Dar pasos cortos y numerados", "Mandar un manual largo"], "correct": 1, "explain": "Pasos cortos con paciencia."}, {"q": "Cada mensaje debería terminar con:", "opts": ["Un emoji y ya", "Un siguiente paso claro", "Nada"], "correct": 1, "explain": "Decir qué sigue mantiene la venta viva."}], "tip": "Hoy entregue una cuenta o un dato de pago con formato ordenado (renglones o números)."}, {"cat": "Atención al cliente", "icon": "💬", "badge": "Servicio", "title": "Empatía y escucha activa", "subtitle": "Lección 4 · Entender antes de responder", "intro": "El cliente compra más fácil cuando siente que de verdad lo entienden. La empatía no se finge: se practica escuchando bien antes de hablar.", "concept": {"term": "Escucha activa", "def": "Es prestar atención completa a lo que el cliente dice (y a lo que no dice) para entender lo que de verdad necesita, antes de ofrecer una solución. Escuchar bien evita ofrecer lo que no quiere."}, "sections": [{"h": "Lea lo que el cliente quiere, no solo lo que dice", "p": "Si pregunta '¿sirve en mi tele vieja?', en el fondo teme gastar y que no funcione. Responda esa preocupación, no solo la pregunta literal."}, {"h": "Repita para confirmar", "p": "'Entonces lo quiere para ver novelas en la sala, ¿verdad?'. Repetir demuestra que escuchó y evita malentendidos."}, {"h": "Valide la emoción", "p": "Si está frustrado, reconózcalo: 'le entiendo, es molesto que no le sirva'. Validar baja la tensión y abre la conversación."}], "examples": [{"sit": "Cliente: «¿Esto sí me va a servir? No quiero botar la plata»", "bien": "Le entiendo, nadie quiere gastar en algo que no use. Cuénteme qué ve más y le recomiendo justo lo que va a aprovechar.", "mal": "sí sirve, cómprelo", "why": "Reconoce el miedo a gastar y lo guía; no ignora la emoción."}, {"sit": "Cliente: «Es que no entiendo nada de esto»", "bien": "No se preocupe, para eso estoy yo 😊 Le explico bien fácil, paso a paso. Vamos juntos.", "mal": "es fácil, solo hágalo", "why": "Valida y acompaña; no minimiza la dificultad del cliente."}], "scenarios": [{"client": "Cliente: «Mi mamá quiere algo para ver sus novelas pero no es buena con la tecnología»", "options": [{"t": "Tranquilo, le recomiendo Vix por las novelas y le explico la instalación pasito a pasito para que a su mamá le quede fácil.", "ok": true}, {"t": "Que descargue la app y ya.", "ok": false}, {"t": "Mejor que aprenda a usar el teléfono primero.", "ok": false}], "explain": "Escucha la necesidad real (mamá + novelas + poca tecnología) y responde a las tres cosas."}, {"client": "Cliente: «Ya van dos veces que me falla, estoy cansado»", "options": [{"t": "Le entiendo, es frustrante que vuelva a pasar 🙏 Vamos a resolverlo bien esta vez. ¿Me manda captura?", "ok": true}, {"t": "Otra vez usted, ¿qué hizo ahora?", "ok": false}, {"t": "No es para tanto.", "ok": false}], "explain": "Validar la emoción ('es frustrante') calma; minimizar o culpar empeora."}], "quiz": [{"q": "Escuchar activamente significa:", "opts": ["Responder rápido sin leer bien", "Entender lo que el cliente de verdad necesita", "Hablar más que el cliente"], "correct": 1, "explain": "Entender primero, responder después."}, {"q": "Si el cliente teme gastar mal, usted:", "opts": ["Le dice 'cómprelo y ya'", "Reconoce el miedo y lo guía a lo que aprovechará", "Lo ignora"], "correct": 1, "explain": "Responda la preocupación de fondo."}, {"q": "Repetir lo que el cliente dijo sirve para:", "opts": ["Hacerlo sentir tonto", "Confirmar que entendió y evitar errores", "Perder tiempo"], "correct": 1, "explain": "Confirma y demuestra que escuchó."}], "tip": "Hoy, con un cliente, repítale lo que pidió para confirmar antes de cotizar."}, {"cat": "Atención al cliente", "icon": "💬", "badge": "Servicio", "title": "Manejar reclamos y quejas", "subtitle": "Lección 5 · Convertir un enojo en un cliente fiel", "intro": "Un reclamo bien manejado puede dejar a un cliente MÁS contento que si nada hubiera fallado. Saber recibir quejas es de las mejores inversiones para su negocio.", "concept": {"term": "Manejo de reclamos", "def": "Es la forma de atender a un cliente cuando algo salió mal: escuchar, disculparse, resolver y dar seguimiento. Un buen manejo recupera la confianza; uno malo pierde al cliente y su recomendación."}, "sections": [{"h": "Escuche sin interrumpir ni defenderse", "p": "Deje que el cliente diga todo. Interrumpir o defenderse lo enoja más. Primero escuche, luego responda."}, {"h": "Disculpa + responsabilidad + solución", "p": "'Le pido disculpas, vamos a resolverlo ya.' No busque culpables ni dé excusas largas: enfóquese en arreglarlo."}, {"h": "Dé seguimiento", "p": "Después de resolver, escriba: '¿quedó todo bien?'. Cerrar el círculo convierte el reclamo en una buena experiencia."}], "examples": [{"sit": "Cliente: «Pagué y no me han dado nada, qué es esto!!»", "bien": "Le pido disculpas por el atraso 🙏 Ya lo reviso y le entrego ahorita mismo. Deme un momentito.", "mal": "espérese que ando ocupada", "why": "Disculpa + acción inmediata; la excusa enoja más."}, {"sit": "Cliente: «La cuenta se cayó a los 3 días, esto es una estafa»", "bien": "Lamento que pasara, y no es una estafa: se lo resuelvo ya mismo reactivándolo o dándole otra cuenta. ¿Cuál prefiere?", "mal": "usted hizo algo mal seguro", "why": "Resuelve sin culpar; culpar al cliente molesto lo pierde."}], "scenarios": [{"client": "Cliente muy molesto escribe varios mensajes seguidos quejándose", "options": [{"t": "Le leo todo y le respondo: 'le entiendo, vamos a resolverlo. ¿Me cuenta qué pasó exactamente?'", "ok": true}, {"t": "Le contesto antes de que termine para defenderme.", "ok": false}, {"t": "Lo dejo en visto hasta que se calme.", "ok": false}], "explain": "Escuchar completo y luego resolver baja la tensión; interrumpir o ignorar la sube."}, {"client": "Ya resolvió el problema del cliente. ¿Qué hace después?", "options": [{"t": "Le escribo más tarde: '¿quedó todo funcionando bien?'", "ok": true}, {"t": "Nada, ya quedó.", "ok": false}, {"t": "Le recuerdo que fue su culpa.", "ok": false}], "explain": "El seguimiento convierte el reclamo en buena experiencia."}], "quiz": [{"q": "Lo PRIMERO ante un reclamo es:", "opts": ["Defenderse", "Escuchar sin interrumpir", "Buscar culpables"], "correct": 1, "explain": "Escuche completo primero."}, {"q": "La fórmula para responder un reclamo es:", "opts": ["Excusas largas", "Disculpa + responsabilidad + solución", "Echar la culpa"], "correct": 1, "explain": "Disculpa breve y a resolver."}, {"q": "Después de resolver conviene:", "opts": ["Olvidarlo", "Dar seguimiento ('¿quedó bien?')", "Recordarle su error"], "correct": 1, "explain": "Cerrar el círculo fideliza."}], "tip": "Hoy, si llega un reclamo, escuche todo antes de responder y cierre con 'lo resolvemos ya'."}, {"cat": "Atención al cliente", "icon": "💬", "badge": "Servicio", "title": "Posventa y fidelización", "subtitle": "Lección 6 · Que el cliente vuelva y lo recomiende", "intro": "Conseguir un cliente cuesta; mantenerlo es barato y deja más dinero. La posventa (lo que hace DESPUÉS de vender) es lo que hace que vuelvan y lo recomienden.", "concept": {"term": "Posventa", "def": "Es la atención que da después de la venta: confirmar que todo quedó bien, estar para soporte y mantener el contacto. Un cliente bien cuidado después de comprar vuelve, renueva y trae a otros."}, "sections": [{"h": "Confirme que quedó feliz", "p": "Un día después de vender, pregunte '¿todo bien con su cuenta?'. Muestra que le importa y previene problemas."}, {"h": "Esté presente sin ser pesado", "p": "Avísele de promos que le sirvan, salúdelo de vez en cuando. No lo bombardee; sea útil, no molesto."}, {"h": "Pida y premie las recomendaciones", "p": "'Si le sirvió, recomiéndeme con un amigo 🙌'. Y trate especial a quien llega recomendado. El boca a boca es su mejor publicidad."}], "examples": [{"sit": "Un día después de vender una cuenta nueva", "bien": "¡Hola! ¿Todo bien con su Netflix? Cualquier cosa aquí estoy 😊", "mal": "(no escribe nunca más)", "why": "El seguimiento previene problemas y hace sentir cuidado al cliente."}, {"sit": "Un cliente fiel de un año renueva otra vez", "bien": "¡Gracias por seguir con nosotros todo este tiempo! Por cliente fiel le dejo su renovación con un detallito 💛", "mal": "listo, su renovación", "why": "Reconocer la lealtad amarra al cliente y trae referidos."}], "scenarios": [{"client": "Un cliente nuevo acaba de recibir su cuenta. Al día siguiente usted:", "options": [{"t": "Le escribe para confirmar que todo quedó funcionando bien.", "ok": true}, {"t": "Espera a que él escriba si hay problema.", "ok": false}, {"t": "Le manda promociones cada hora.", "ok": false}], "explain": "El seguimiento amable previene reclamos y fideliza."}, {"client": "Llega un cliente: «Me recomendó mi amiga Karla»", "options": [{"t": "¡Qué bueno que Karla nos recomendó! Bienvenido, le doy la mejor atención por venir de su parte.", "ok": true}, {"t": "Ah, qué desea.", "ok": false}, {"t": "¿Y Karla quién es?", "ok": false}], "explain": "Reconocer la recomendación cuida la relación y motiva más referidos."}], "quiz": [{"q": "La posventa es:", "opts": ["Lo que hace antes de vender", "La atención después de la venta", "Solo cobrar"], "correct": 1, "explain": "Lo que hace DESPUÉS de vender."}, {"q": "Para fidelizar conviene:", "opts": ["Bombardear con mensajes", "Estar presente siendo útil, no pesado", "Olvidarse del cliente"], "correct": 1, "explain": "Útil, no molesto."}, {"q": "Con un cliente recomendado:", "opts": ["Tratarlo igual sin más", "Agradecer la recomendación y atenderlo bien", "Pedirle datos del que recomendó"], "correct": 1, "explain": "Reconocerlo trae más referidos."}], "tip": "Hoy escríbale a un cliente reciente: '¿todo bien con su cuenta?'."}, {"cat": "Técnicas de ventas", "icon": "🎯", "badge": "Ventas", "title": "Cómo cerrar una venta", "subtitle": "Lección 1 · Pasar del 'me interesa' al pago", "intro": "Muchas ventas se pierden no por el precio, sino porque nadie pidió la venta. Cerrar es un paso que se aprende. Aquí aprende a hacerlo con seguridad y sin presionar.", "concept": {"term": "Cerrar una venta", "def": "Cerrar es invitar al cliente a comprar AHORA, una vez que ya mostró interés. No es presionar: es dar el último empujón claro ('¿se lo dejo activo hoy?') para que la conversación termine en una venta y no en un 'ahí le aviso'."}, "sections": [{"h": "Señales de que ya puede cerrar", "p": "Cuando el cliente pregunta el precio, cómo pagar, si sirve en su tele o 'cuánto dura', YA está interesado. Ese es el momento de pedir la venta, no de seguir explicando."}, {"h": "Técnica del resumen + propuesta", "p": "Resuma el beneficio en una línea y proponga la acción: 'Le incluye acceso al momento, soporte y precio fijo. ¿Se lo dejo activo hoy?'. El resumen da seguridad; la propuesta cierra."}, {"h": "Cierre por opción", "p": "En vez de preguntar SI compra, pregunte CÓMO: '¿prefiere el de 1 mes o el de 3?'. Las dos respuestas son una venta."}, {"h": "Después del sí, confirme antes de cobrar", "p": "'Le confirmo: Netflix 1 mes, Lps. 100, entrega al momento. ¿Le paso los datos de pago?'. Así evita reclamos y el cliente paga seguro."}], "examples": [{"sit": "Cliente: «Sí me interesa… déjame pensarlo»", "bien": "¡Perfecto! Para resumirle: acceso al momento, soporte y precio fijo. Si quiere, se lo dejo activo hoy y lo ve esta noche 🎬", "mal": "bueno ahí me avisa", "why": "Cuando ya hay interés, hay que pedir la venta; 'ahí me avisa' la enfría."}, {"sit": "Cliente: «¿Y cómo te pago?»", "bien": "Le paso los datos de una vez 👇 y apenas me llegue el comprobante le activo al toque. ¿Le parece?", "mal": "cuando quiera me paga", "why": "Preguntar cómo pagar ES señal de compra: avance al pago, no lo deje en el aire."}], "scenarios": [{"client": "Cliente: «Está bueno el precio… pero déjame ver»", "options": [{"t": "Claro. Le aparto este precio hoy y me paga cuando pueda esta semana, ¿le sirve?", "ok": true}, {"t": "Bueno, cuando decida me dice.", "ok": false}, {"t": "Apúrese que se acaba (aunque no sea cierto).", "ok": false}], "explain": "Apartar con la promo real cierra sin presionar ni mentir."}, {"client": "Cliente: «¿Cuánto me sale el de 3 meses?»", "options": [{"t": "Le sale Lps. ___, más barato por mes que el mensual. ¿Se lo dejo de 3 entonces?", "ok": true}, {"t": "Ahí está el precio.", "ok": false}, {"t": "Mejor lleve el de 1 mes.", "ok": false}], "explain": "Preguntar por un plan es señal de compra: dé el precio y proponga cerrar."}], "quiz": [{"q": "¿Cuándo es momento de cerrar?", "opts": ["Cuando el cliente pregunta precio, pago o si le sirve", "Nunca, esperar a que él compre solo", "Solo si lo pide tres veces"], "correct": 0, "explain": "Esas preguntas son señales de interés."}, {"q": "La técnica del resumen + propuesta es:", "opts": ["Repetir el precio diez veces", "Resumir el beneficio y proponer activarlo hoy", "Bajar el precio"], "correct": 1, "explain": "Resumen da seguridad, propuesta cierra."}, {"q": "El cierre por opción consiste en:", "opts": ["Preguntar si compra o no", "Dar a elegir entre dos planes", "Mandar todo el catálogo"], "correct": 1, "explain": "Las dos opciones son venta."}, {"q": "Después del «sí», antes de cobrar:", "opts": ["Cobrar de una sin explicar", "Confirmar plan, precio y entrega", "Ofrecer otra cosa"], "correct": 1, "explain": "Confirmar evita reclamos."}], "tip": "Hoy, a un cliente que muestre interés, ciérrele con un resumen + '¿se lo dejo activo hoy?'."}, {"cat": "Técnicas de ventas", "icon": "🎯", "badge": "Ventas", "title": "Manejo de objeciones", "subtitle": "Lección 2 · Qué responder cuando dudan", "intro": "Una objeción ('está caro', 'lo pienso', 'no confío') no es un 'no': es una duda. Saber responder cada una convierte muchos 'no' en ventas. Aquí ve las más comunes y cómo manejarlas.", "concept": {"term": "Objeción", "def": "Una objeción es la duda o el pero que pone el cliente antes de comprar: 'está caro', 'lo voy a pensar', '¿y si no funciona?'. No es un rechazo: es una señal de que casi compra, solo necesita que le quite esa duda."}, "sections": [{"h": "«Está caro» → defienda el valor", "p": "No baje el precio de una. Recuerde lo que incluye (soporte, garantía, entrega al momento) y ofrezca más tiempo o un combo. 'Lo barato sale caro cuando no hay quién responda'."}, {"h": "«Lo voy a pensar» → aparte y dé seguimiento", "p": "Casi siempre significa 'no estoy seguro'. Ofrezca apartar con la promo y dé un seguimiento amable después. No lo deje caer ni lo presione."}, {"h": "«¿Y si no funciona?» → confianza y soporte", "p": "Quite el miedo: 'si algo falla, aquí estamos para resolverlo rápido'. No prometa que nunca falla (eso trae reclamos); prometa soporte real."}, {"h": "«En otro lado es más barato» → diferénciese", "p": "No pelee con la competencia. Resalte su soporte, su rapidez y su garantía: por eso comprarle a usted es distinto."}], "examples": [{"sit": "Cliente: «Está muy caro»", "bien": "Le entiendo. Por ese precio lleva soporte y garantía si algo pasa. ¿Le armo el plan de 3 meses para que le salga más conveniente por mes?", "mal": "bueno se lo bajo", "why": "Defienda valor y ofrezca alternativa; no rebaje al primer 'caro'."}, {"sit": "Cliente: «¿Y si se me cae la cuenta?»", "bien": "Si llega a fallar, aquí estamos para resolverlo rápido — por eso comprar con nosotros es distinto. No le prometo que nunca pase, pero sí que no lo dejamos solo.", "mal": "no se cae tranquilo", "why": "Prometa soporte real, no que 'nunca falla'."}], "scenarios": [{"client": "Cliente: «Lo voy a pensar»", "options": [{"t": "Claro 😊 ¿Le aparto este precio hoy y me paga cuando pueda esta semana?", "ok": true}, {"t": "Bueno, usted sabe.", "ok": false}, {"t": "¿Va a comprar o no?", "ok": false}], "explain": "Apartar mantiene la venta viva; presionar o soltar la pierde."}, {"client": "Cliente: «En el grupo de Facebook lo vi más barato»", "options": [{"t": "Puede ser, pero ahí muchas veces no dan soporte ni garantía. Conmigo, si algo falla, lo resuelvo. Eso vale.", "ok": true}, {"t": "Esos son estafadores.", "ok": false}, {"t": "Bueno, le igualo el precio.", "ok": false}], "explain": "Diferénciese por soporte y confianza, sin hablar mal del otro ni regalar el precio."}], "quiz": [{"q": "Una objeción significa que el cliente:", "opts": ["Ya dijo que no", "Tiene una duda y casi compra", "Quiere pelear"], "correct": 1, "explain": "Es una duda por resolver, no un rechazo."}, {"q": "Frente a «está caro»:", "opts": ["Bajar el precio", "Defender el valor y ofrecer más tiempo/combo", "Ofenderse"], "correct": 1, "explain": "Agregue valor, no rebaje."}, {"q": "Frente a «¿y si no funciona?»:", "opts": ["Jurar que nunca falla", "Ofrecer soporte real si algo pasa", "Decir que es su problema"], "correct": 1, "explain": "Soporte real, sin prometer imposibles."}, {"q": "«Lo voy a pensar» se maneja:", "opts": ["Presionando", "Apartando con promo y dando seguimiento amable", "Olvidándose del cliente"], "correct": 1, "explain": "Apartar + seguimiento recupera la venta."}], "tip": "Hoy, a la próxima objeción, no baje el precio: responda con valor (soporte, garantía o más tiempo)."}, {"cat": "Técnicas de ventas", "icon": "🎯", "badge": "Ventas", "title": "Subir el valor de cada venta", "subtitle": "Lección 3 · Combos, planes largos y que cada cliente deje más", "intro": "Vender más no siempre es conseguir más clientes: muchas veces es lograr que cada cliente deje un poquito más, ofreciéndole lo correcto. Aquí aprende a hacerlo sin sonar insistente.", "concept": {"term": "Subir el valor de la venta", "def": "Es lograr que una misma venta valga más, ofreciéndole al cliente algo que de verdad le conviene: un combo, un plan más largo o una plataforma extra. Bien hecho, no es 'vender de más': es darle más valor por su dinero."}, "sections": [{"h": "El combo como ahorro", "p": "Después del 'sí', ofrezca una segunda plataforma como combo: 'por poquito más le sumo Disney+ y le sale más barato que aparte'. Preséntelo como ahorro, nunca como obligación."}, {"h": "El plan largo como solución", "p": "Si el cliente se queja de renovar cada mes, ofrézcale el plan de 3 meses o anual: paga una vez, le sale más barato y no anda renovando. Usa su molestia a favor de él (y de usted)."}, {"h": "Ofrecer solo lo que le sirve", "p": "Solo ofrezca la mejora cuando de verdad le conviene al cliente (ahorra, menos molestia). Si no, se siente como un consejo, no como vender de más. Eso genera confianza y clientes que vuelven."}, {"h": "El 'si no, tranquilo'", "p": "Cuando ofrezca el extra, deje siempre la puerta abierta: 'si no, igual le dejo lo que pidió'. Así sube la venta sin presionar y mantiene la buena onda."}], "examples": [{"sit": "Cliente (ya aceptó Netflix): «Solo el Netflix»", "bien": "¡Listo el Netflix! Y si quiere, por poquito más le sumo Disney+ para los niños y le sale en combo más barato que aparte. ¿Se lo agrego? Si no, igual se lo dejo así 😊", "mal": "ok va", "why": "Ofrezca el combo como ahorro y deje la puerta abierta; no deje pasar la oportunidad ni obligue."}, {"sit": "Cliente: «Renuévame el mes otra vez»", "bien": "¡Va su mes! Por cierto, si pasa al de 3 meses le sale más barato y no anda renovando tan seguido. ¿Se lo dejo de 3 esta vez?", "mal": "listo otro mes", "why": "Cada renovación es chance de subir al plan largo, presentándolo como ahorro."}], "scenarios": [{"client": "Cliente: «Quiero el plan de 1 mes»", "options": [{"t": "¡Va el de 1 mes! Solo le comento: el de 3 le sale más barato por mes y no renueva tan seguido. ¿Se lo dejo de 3 mejor? Usted decide.", "ok": true}, {"t": "Tiene que llevar el de 3 o no se lo vendo.", "ok": false}, {"t": "Listo, 1 mes y ya.", "ok": false}], "explain": "Ofrezca la mejora solo cuando le ahorra, sin obligar y dejándolo decidir."}, {"client": "Cliente gamer: «Solo la recarga de diamantes»", "options": [{"t": "¡Va tu recarga! Y si querés, te armo combo con Spotify para tus partidas, te sale barato. ¿Le metemos? Si no, tranqui.", "ok": true}, {"t": "No, solo eso.", "ok": false}, {"t": "Tenés que llevar el combo.", "ok": false}], "explain": "Combo relacionado, como ahorro y con buena onda; nunca obligar."}], "quiz": [{"q": "Subir el valor de una venta significa:", "opts": ["Subir el precio sin avisar", "Lograr que cada venta valga más con algo que le sirve al cliente", "Vender a la fuerza"], "correct": 1, "explain": "Más valor por su dinero, no engaño."}, {"q": "El combo se debe ofrecer como:", "opts": ["Una obligación", "Un ahorro, dejando la puerta abierta", "Algo caro"], "correct": 1, "explain": "Ahorro + 'si no, tranquilo'."}, {"q": "¿Cuándo ofrecer el plan largo?", "opts": ["Siempre, aunque no le sirva", "Cuando le ahorra o le evita molestia", "Nunca"], "correct": 1, "explain": "Cuando de verdad le conviene al cliente."}, {"q": "Dejar el 'si no, tranquilo' sirve para:", "opts": ["Perder la venta", "Subir el valor sin presionar", "Confundir"], "correct": 1, "explain": "Mantiene la buena onda y la venta base."}], "tip": "Hoy, a un cliente que ya compró, ofrézcale UN combo o plan largo como ahorro, con 'si no, tranquilo'."}, {"cat": "Técnicas de ventas", "icon": "🎯", "badge": "Ventas", "title": "Detectar la necesidad", "subtitle": "Lección 4 · Preguntar para vender lo correcto", "intro": "La venta empieza por entender qué necesita el cliente. Con buenas preguntas vende lo correcto, evita reclamos y el cliente siente que lo aconsejan, no que le empujan.", "concept": {"term": "Detección de necesidades", "def": "Es averiguar, con preguntas, qué busca el cliente realmente: qué quiere ver, en qué aparato, para cuántas personas y por cuánto tiempo. Quien pregunta bien, vende lo correcto."}, "sections": [{"h": "Las preguntas clave", "p": "¿Qué le gusta ver? ¿En qué aparato? ¿Para cuántas personas? ¿Por cuánto tiempo? Con esas cuatro arma la oferta perfecta."}, {"h": "Pregunte antes de cotizar", "p": "No tire el precio de una. Primero entienda, así no cotiza algo que no le sirve y no tiene que corregir después."}, {"h": "Use lo que le dice", "p": "Si dice 'somos 4 en la casa', ofrézcale el plan de varias pantallas. Use cada dato para recomendar mejor."}], "examples": [{"sit": "Cliente: «Quiero una cuenta»", "bien": "¡Con gusto! Para darle lo correcto: ¿qué le gusta ver, en qué aparato y para cuántas personas?", "mal": "¿cuál cuenta?", "why": "Preguntar primero arma la oferta correcta."}, {"sit": "Cliente: «Somos varios en la casa»", "bien": "Entonces le conviene un plan de varias pantallas para que todos vean sin trabarse. ¿Cuántos serían más o menos?", "mal": "ok, una cuenta", "why": "Usa el dato (varios) para recomendar el plan correcto."}], "scenarios": [{"client": "Cliente: «Quiero algo barato para entretenerme»", "options": [{"t": "¿Qué le gusta ver: series, fútbol o música? Así le digo la opción que más le rinde por su dinero.", "ok": true}, {"t": "Lleve la más barata y ya.", "ok": false}, {"t": "Todo es barato aquí.", "ok": false}], "explain": "Detecta el gusto para recomendar lo que más le sirve, no solo 'lo barato'."}, {"client": "Cliente: «Es para mi negocio, una barbería»", "options": [{"t": "Para una barbería le sirve algo con variedad o deportes para los clientes. ¿Tiene TV o lo pondría en una tablet?", "ok": true}, {"t": "Le vendo Netflix normal.", "ok": false}, {"t": "Eso no lo manejo.", "ok": false}], "explain": "Pregunta por el uso real (negocio, aparato) para acertar."}], "quiz": [{"q": "La venta empieza por:", "opts": ["Tirar el precio", "Detectar qué necesita el cliente", "Ofrecer lo más caro"], "correct": 1, "explain": "Entender primero."}, {"q": "Las preguntas clave incluyen:", "opts": ["Solo el precio", "Qué ve, en qué aparato, cuántas personas, cuánto tiempo", "Su nombre y edad"], "correct": 1, "explain": "Esas cuatro arman la oferta."}, {"q": "Si el cliente dice 'somos 4 en casa':", "opts": ["Le vende una pantalla", "Le ofrece plan de varias pantallas", "No pregunta nada"], "correct": 1, "explain": "Use el dato para recomendar mejor."}], "tip": "Hoy, antes de cotizar, hágale al cliente al menos dos preguntas sobre lo que necesita."}, {"cat": "Técnicas de ventas", "icon": "🎯", "badge": "Ventas", "title": "Crear urgencia honesta", "subtitle": "Lección 5 · Que decida hoy, sin mentir", "intro": "Mucha gente compra 'después'… y después no compra. Crear urgencia honesta ayuda a que decidan hoy, sin inventar mentiras que después le cuesten la confianza.", "concept": {"term": "Urgencia honesta", "def": "Es darle al cliente una razón real para decidir ahora: una promo con fecha de verdad, un cupo limitado real, o apartarle el precio hoy. Honesta porque es cierta; mentir trae reclamos y mala fama."}, "sections": [{"h": "Use promos con fecha real", "p": "'La promo de este precio va hasta el domingo.' Si es verdad, empuja la decisión sin mentir."}, {"h": "Ofrezca apartar", "p": "'Se lo aparto hoy con el precio de promo y me paga esta semana.' Compromete sin presionar."}, {"h": "Nunca invente", "p": "No diga 'es el último' si no lo es. Una mentira descubierta le cuesta la confianza para siempre."}], "examples": [{"sit": "Cliente: «Lo compro la otra semana mejor»", "bien": "Sin problema 😊 Solo le aviso que la promo de este precio va hasta el domingo. ¿Le aparto hoy y me paga esta semana?", "mal": "va, pero ya no hay promo", "why": "Urgencia real (promo con fecha) + apartar; no presiona ni miente."}, {"sit": "Cliente: «Déjame pensarlo unos días»", "bien": "Claro. Le guardo este precio hasta mañana por si lo quiere aprovechar. Cualquier duda aquí estoy.", "mal": "se acaba HOY apúrese (sin ser cierto)", "why": "Apartar con fecha real es honesto; inventar urgencia es riesgoso."}], "scenarios": [{"client": "Cliente: «Tal vez la próxima quincena»", "options": [{"t": "Le aparto el precio de promo y me paga en la quincena, así no lo pierde. ¿Le parece?", "ok": true}, {"t": "Apúrese que se acaban hoy (aunque no sea cierto).", "ok": false}, {"t": "Bueno, adiós.", "ok": false}], "explain": "Apartar con la fecha real cierra sin mentir ni dejar caer la venta."}, {"client": "Cliente pregunta: «¿De verdad se acaba la promo?»", "options": [{"t": "Sí, va hasta el domingo de verdad; después vuelve al precio normal.", "ok": true}, {"t": "Sí, ya casi, mejor compre ya (sin saber si es cierto).", "ok": false}, {"t": "No sé, pero compre.", "ok": false}], "explain": "Diga la verdad sobre la promo; la confianza vale más que una venta."}], "quiz": [{"q": "La urgencia honesta se basa en:", "opts": ["Mentiras que empujen", "Razones reales (promo con fecha, apartar)", "Asustar al cliente"], "correct": 1, "explain": "Real, no inventada."}, {"q": "Si el cliente lo deja para después:", "opts": ["Dejarlo ir", "Ofrecer apartar con el precio de promo", "Mentir que se acaba hoy"], "correct": 1, "explain": "Apartar compromete sin presionar."}, {"q": "Inventar urgencia falsa:", "opts": ["Ayuda a vender siempre", "Le cuesta la confianza si lo descubren", "No tiene consecuencias"], "correct": 1, "explain": "La mentira descubierta pierde al cliente."}], "tip": "Hoy, a quien lo deje para después, ofrézcale apartar con el precio actual, sin inventar urgencia."}, {"cat": "Técnicas de ventas", "icon": "🎯", "badge": "Ventas", "title": "Cerrar la venta por chat", "subtitle": "Lección 6 · Llevar del 'sí' al pago por WhatsApp", "intro": "Casi todas sus ventas se cierran por WhatsApp. Hay una forma de llevar al cliente del interés al pago sin que se enfríe en el camino. Aquí la aprende.", "concept": {"term": "Cierre por chat", "def": "Es la secuencia para terminar una venta por mensaje: detectar el sí, resumir, dar los datos de pago y confirmar la entrega. Cada paso claro evita que el cliente se pierda o se enfríe."}, "sections": [{"h": "No deje huecos", "p": "Después del 'sí', no se quede esperando: resuma y pase al pago de una. Los silencios largos enfrían la venta."}, {"h": "Dé los datos y el siguiente paso juntos", "p": "'Le paso los datos 👇 y apenas me llegue el comprobante le activo al toque.' Así sabe exactamente qué hacer."}, {"h": "Confirme la entrega", "p": "Cuando pague, entregue con formato claro y confirme que entró bien. Cierre redondo = cliente seguro."}], "examples": [{"sit": "Cliente: «Va, lo quiero»", "bien": "¡Excelente! Le confirmo: Netflix 1 mes, Lps. 100, entrega al momento. Le paso los datos de pago 👇", "mal": "ok, cuando quiera me paga", "why": "Tras el sí, resuma y pase al pago de inmediato."}, {"sit": "Cliente acaba de mandar el comprobante", "bien": "¡Recibido, gracias! Aquí su acceso 🎬 (correo, clave, perfil). ¿Le quedó funcionando bien?", "mal": "ya, ahí está", "why": "Entregue con formato y confirme; cierre redondo."}], "scenarios": [{"client": "Cliente: «Sí, me animo» y usted no contesta en 10 minutos", "options": [{"t": "Le respondo de una: 'genial, le paso los datos para dejarlo listo hoy 👇'", "ok": true}, {"t": "Lo dejo para después, ya dijo que sí.", "ok": false}, {"t": "Le mando 5 mensajes seguidos.", "ok": false}], "explain": "El silencio enfría; aproveche el sí de inmediato."}, {"client": "Cliente: «Ya transferí»", "options": [{"t": "¡Gracias! ¿Me manda la captura para confirmar y activarle al toque?", "ok": true}, {"t": "Ok, espéreme.", "ok": false}, {"t": "¿Seguro pagó?", "ok": false}], "explain": "Pida la captura para validar y entregar rápido, con buen trato."}], "quiz": [{"q": "Después del 'sí' del cliente:", "opts": ["Esperar a ver si paga", "Resumir y pasar al pago de una", "Ofrecer otra cosa"], "correct": 1, "explain": "No deje que se enfríe."}, {"q": "Al dar los datos de pago, conviene:", "opts": ["Solo el número", "Datos completos + el siguiente paso", "Pedir que adivine"], "correct": 1, "explain": "Datos + qué hacer juntos."}, {"q": "Un cierre por chat redondo termina con:", "opts": ["Silencio", "Entrega clara + confirmar que entró bien", "Otra venta"], "correct": 1, "explain": "Confirmar deja al cliente seguro."}], "tip": "Hoy, en su próxima venta por chat, tras el 'sí' resuma y pase al pago sin dejar huecos."}, {"cat": "Renovaciones y cobros", "icon": "🔁", "badge": "Cobros", "title": "Cómo cobrar sin incomodar", "subtitle": "Lección 1 · Renovaciones y cobros amables que sí funcionan", "intro": "El dinero más fácil es el del cliente que ya tiene: solo hay que cobrarle bien y a tiempo. Cobrar sin incomodar mantiene la cartera al día y al cliente contento.", "concept": {"term": "Renovación", "def": "Renovar es cobrarle de nuevo al cliente que ya tiene un servicio activo para que siga sin interrupción. Es la base del negocio: un cliente que renueva mes a mes vale mucho más que una venta nueva de una sola vez."}, "sections": [{"h": "Avise ANTES del corte", "p": "Escríbale un par de días antes de que venza, no cuando ya se cortó. Con un gancho: 'renueve antes para que no se le corte y no pierda lo que está viendo'. Avisar a tiempo asegura el pago y evita molestias."}, {"h": "Cobre con un beneficio, no con presión", "p": "En vez de 'págueme', diga 'para que no pierda su servicio'. La gente renueva por no perder algo, no por presión."}, {"h": "Pida el pago claro", "p": "Dé los datos completos (banco, cuenta, nombre) y diga el siguiente paso: 'mándeme la captura y le activo al toque'. Un cobro confuso retrasa todo."}, {"h": "Organice su lista de vencidos", "p": "Revise cada semana quién vence. Si tiene varios atrasados, empiece por los de mayor monto o más fieles: ese es el dinero que más pesa."}], "examples": [{"sit": "Cliente con servicio que vence en 2 días", "bien": "¡Hola! Su Netflix vence en 2 días. Si renueva antes, no se le corta nada y sigue viendo sin interrupción 🎬 ¿Lo renovamos?", "mal": "ya venció, paga o no", "why": "Avisar antes con beneficio funciona; cobrar seco y tarde, no."}, {"sit": "Cliente: «¿Cómo te pago la renovación?»", "bien": "Le paso los datos 👇 Banco ___, Cuenta ___, a nombre de ___. Mándeme la captura y le dejo renovado al toque 🙌", "mal": "por transferencia ahí", "why": "Datos completos + siguiente paso evita idas y vueltas."}], "scenarios": [{"client": "Cliente: «Se me pasó renovar, ya hace días 🙈»", "options": [{"t": "¡No hay problema, esas cosas pasan! Se lo reactivo hoy mismo. ¿Mismo plan o quiere cambiar?", "ok": true}, {"t": "Es que ya venció hace rato.", "ok": false}, {"t": "Por atrasado le cobro más.", "ok": false}], "explain": "Quítele la culpa y ofrezca reactivar; regañar aleja al cliente."}, {"client": "Cliente: «Esta vez creo que ya no renuevo»", "options": [{"t": "¡Lo entiendo! Antes de que se vaya: si renueva hoy le doy [un pequeño detalle]. Me gustaría seguir siendo su tienda 💛 ¿Le animo?", "ok": true}, {"t": "Bueno, usted sabe.", "ok": false}, {"t": "Le regalo 3 meses gratis.", "ok": false}], "explain": "Un incentivo pequeño retiene; ni dejarlo ir sin intentar ni regalar de más."}], "quiz": [{"q": "¿Cuándo avisar de una renovación?", "opts": ["Cuando ya se cortó", "Un par de días antes de vencer", "Nunca"], "correct": 1, "explain": "Antes del corte, con gancho."}, {"q": "La gente renueva más cuando le habla de:", "opts": ["No perder su servicio", "Que le hace un favor a usted", "Lo difícil que es su trabajo"], "correct": 0, "explain": "Renuevan por no perder algo."}, {"q": "Un cliente olvidó renovar. Usted:", "opts": ["Lo regaña", "Le quita culpa y ofrece reactivar hoy", "Le cobra más"], "correct": 1, "explain": "Amable y con solución."}, {"q": "Con varios vencidos, empiece por:", "opts": ["Orden alfabético", "Los de mayor monto o más fieles", "Al azar"], "correct": 1, "explain": "Recupera primero lo que más pesa."}], "tip": "Hoy avise a un cliente que vence pronto, ANTES del corte, con un gancho ('no pierda lo que ve')."}, {"cat": "Renovaciones y cobros", "icon": "🔁", "badge": "Cobros", "title": "Retención: que no se vayan", "subtitle": "Lección 2 · Conservar al cliente que ya tiene", "intro": "Cuesta cinco veces más conseguir un cliente nuevo que conservar uno. Saber retener es de las habilidades que más dinero le ahorran y más estabilidad le dan.", "concept": {"term": "Retención", "def": "Es lograr que el cliente que ya tiene siga comprándole mes a mes, en vez de irse. Se logra con buen servicio, recordatorios a tiempo y un trato que lo haga sentir importante."}, "sections": [{"h": "Adelántese al adiós", "p": "Un cliente no se va de repente: deja de responder, paga tarde, se queja. Si nota señales, escríbale antes de perderlo."}, {"h": "Dé un motivo para quedarse", "p": "Si quiere irse, ofrézcale un detalle o un mejor plan. Retener a un cliente que vale más a largo plazo justifica un pequeño incentivo."}, {"h": "El buen trato retiene más que el precio", "p": "La gente se queda donde la atienden bien. Soporte rápido y trato cálido amarran más que el precio más bajo."}], "examples": [{"sit": "Cliente que antes renovaba puntual y ahora tarda", "bien": "¡Hola! Hace tiempo no sé de usted. ¿Sigue todo bien con su servicio? Si necesita algo, aquí estoy 😊", "mal": "(no le escribe y lo pierde)", "why": "Adelantarse a la fuga conserva al cliente."}, {"sit": "Cliente: «Creo que voy a probar con otro»", "bien": "¡Lo entiendo! Antes de irse, déjeme mejorarle algo: [un detalle o mejor plan]. Me gustaría seguir siendo su tienda 💛", "mal": "bueno, usted decide", "why": "Un motivo para quedarse retiene a un cliente valioso."}], "scenarios": [{"client": "Un buen cliente lleva semanas sin renovar ni responder", "options": [{"t": "Le escribo amable para saber si todo está bien y recordarle que aquí estoy.", "ok": true}, {"t": "Espero a que él regrese solo.", "ok": false}, {"t": "Lo borro de mi lista.", "ok": false}], "explain": "Adelantarse a la fuga conserva al cliente."}, {"client": "Cliente: «En otro lado me dan más barato»", "options": [{"t": "Entiendo. Conmigo tiene soporte rápido y trato directo; déjeme ajustarle algo para que se quede.", "ok": true}, {"t": "Pues váyase con ellos.", "ok": false}, {"t": "Le igualo cualquier precio siempre.", "ok": false}], "explain": "El buen trato + un ajuste retiene; ni rendirse ni regalar siempre."}], "quiz": [{"q": "Retener cuesta __ que conseguir un cliente nuevo:", "opts": ["Más", "Menos", "Igual"], "correct": 1, "explain": "Conservar es más barato."}, {"q": "Un cliente que se va suele primero:", "opts": ["Avisar con tiempo", "Dejar de responder o pagar tarde", "No dar ninguna señal"], "correct": 1, "explain": "Hay señales; adelántese."}, {"q": "Lo que más retiene es:", "opts": ["El precio más bajo", "El buen trato y el soporte", "La suerte"], "correct": 1, "explain": "El trato amarra más que el precio."}], "tip": "Hoy escríbale a un cliente que note medio alejado, antes de perderlo."}, {"cat": "Renovaciones y cobros", "icon": "🔁", "badge": "Cobros", "title": "Recuperar clientes vencidos", "subtitle": "Lección 3 · Traer de vuelta al que dejó de comprar", "intro": "Sus clientes vencidos son ventas casi hechas: ya lo conocen y ya confiaron. Recuperarlos es más fácil y barato que buscar nuevos.", "concept": {"term": "Cliente vencido", "def": "Es el que tenía un servicio activo y lo dejó vencer sin renovar. No es un cliente perdido: muchas veces solo se le pasó. Un mensaje amable lo reactiva."}, "sections": [{"h": "Quítele la culpa", "p": "'Esas cosas pasan, se lo reactivo hoy.' Nada de regaños: la idea es que vuelva, no que se sienta mal."}, {"h": "Hágalo fácil", "p": "Recuérdele su plan y ofrézcale dejarlo listo de una. Mientras menos pasos, más fácil que vuelva."}, {"h": "Ofrezca un empujón si hace falta", "p": "Si duda, un pequeño incentivo o el mismo precio de antes puede ser lo que necesita para volver."}], "examples": [{"sit": "Cliente vencido hace una semana", "bien": "¡Hola! Vi que su servicio venció. Si quiere, se lo reactivo hoy al mismo precio y queda al día 😊", "mal": "ya venció hace rato, ¿va a pagar?", "why": "Amable y fácil; el reclamo aleja."}, {"sit": "Cliente: «Es que se me olvidó renovar»", "bien": "¡No hay problema, pasa! Se lo dejo activo en un momento. ¿Mismo plan o quiere cambiar?", "mal": "siempre se le olvida", "why": "Quitar culpa + facilitar = vuelve."}], "scenarios": [{"client": "Cliente vencido hace un mes, no ha escrito", "options": [{"t": "Le escribo: 'lo extrañamos, si quiere le reactivo su servicio hoy mismo'.", "ok": true}, {"t": "Lo dejo, ya se fue.", "ok": false}, {"t": "Le reclamo por no renovar.", "ok": false}], "explain": "Recuperar al vencido es más fácil que buscar uno nuevo."}, {"client": "Cliente vencido: «Tal vez después»", "options": [{"t": "Le dejo el mismo precio de antes si vuelve esta semana, ¿le animo?", "ok": true}, {"t": "Bueno, cuando quiera.", "ok": false}, {"t": "Le subo el precio por irse.", "ok": false}], "explain": "Un pequeño empujón (mismo precio) puede traerlo de vuelta."}], "quiz": [{"q": "Un cliente vencido es:", "opts": ["Un cliente perdido para siempre", "Una venta casi hecha que puede volver", "Alguien que no sirve"], "correct": 1, "explain": "Ya confió; es fácil recuperarlo."}, {"q": "Al recuperarlo, lo PRIMERO es:", "opts": ["Regañarlo", "Quitarle la culpa y facilitarle volver", "Subirle el precio"], "correct": 1, "explain": "Amable y fácil."}, {"q": "Si el vencido duda en volver:", "opts": ["Insistir mucho", "Ofrecer un pequeño empujón (mismo precio)", "Olvidarlo"], "correct": 1, "explain": "Un incentivo suave ayuda."}], "tip": "Hoy reactive a un cliente vencido con un mensaje amable, sin regañarlo."}, {"cat": "Renovaciones y cobros", "icon": "🔁", "badge": "Cobros", "title": "Organizar la cartera", "subtitle": "Lección 4 · Saber quién vence y cuándo", "intro": "No se puede cobrar bien lo que no se controla. Tener ordenado quién vence y cuándo es lo que mantiene su negocio con dinero entrando todos los días.", "concept": {"term": "Cartera de clientes", "def": "Es el conjunto de todos sus clientes activos con su fecha de vencimiento. Tenerla ordenada le permite cobrar a tiempo, no perder a nadie por olvido y saber cómo va su negocio."}, "sections": [{"h": "Tenga una lista clara", "p": "En el bot, una hoja o el panel: nombre, qué tiene y cuándo vence. Sin lista, se le caen clientes por olvido."}, {"h": "Revise por adelantado", "p": "Cada inicio de semana mire quién vence en los próximos días y avíseles con tiempo."}, {"h": "Priorice por valor", "p": "Si tiene muchos por cobrar, empiece por los de mayor monto o más fieles: ese dinero pesa más."}], "examples": [{"sit": "Empezando la semana", "bien": "Cada lunes reviso quién vence esta semana y les escribo dos días antes; así no se me cae nadie.", "mal": "ya luego reviso", "why": "Revisar por adelantado evita pérdidas."}, {"sit": "Tiene 8 clientes por cobrar hoy", "bien": "Empiezo por los de planes más grandes y los más fieles, así recupero primero lo que más pesa.", "mal": "les escribo a todos al azar", "why": "Priorizar por valor recupera más, más rápido."}], "scenarios": [{"client": "Tiene clientes regados sin control de fechas", "options": [{"t": "Armo una lista con nombre, servicio y vencimiento para no perder a nadie.", "ok": true}, {"t": "Me los aprendo de memoria.", "ok": false}, {"t": "Cobro cuando me acuerde.", "ok": false}], "explain": "Una lista clara evita que se caigan clientes por olvido."}, {"client": "Hoy vencen 10 clientes y tiene poco tiempo", "options": [{"t": "Empiezo por los de mayor monto y más fieles.", "ok": true}, {"t": "Por orden alfabético.", "ok": false}, {"t": "Dejo todo para mañana.", "ok": false}], "explain": "Priorizar por valor recupera primero lo que más pesa."}], "quiz": [{"q": "La cartera de clientes es:", "opts": ["Solo los nuevos", "Todos sus clientes activos con su vencimiento", "Su billetera"], "correct": 1, "explain": "Sus activos y cuándo vencen."}, {"q": "Conviene revisar los vencimientos:", "opts": ["Cuando ya vencieron", "Por adelantado cada semana", "Nunca"], "correct": 1, "explain": "Adelantado, para avisar a tiempo."}, {"q": "Con muchos por cobrar, empiece por:", "opts": ["Los de mayor monto o más fieles", "El azar", "Los más nuevos"], "correct": 0, "explain": "Recupera primero lo que más pesa."}], "tip": "Hoy revise su lista y anote quién vence en los próximos 3 días."}, {"cat": "Renovaciones y cobros", "icon": "🔁", "badge": "Cobros", "title": "Clientes que pagan tarde", "subtitle": "Lección 5 · Firmeza amable con el que se atrasa", "intro": "Siempre hay clientes que pagan tarde. Manejarlos con reglas claras pero amables mantiene su dinero al día sin pelear ni perder al cliente.", "concept": {"term": "Política de pago", "def": "Son las reglas claras de cuándo y cómo se paga (por ejemplo, renovar antes del vencimiento). Tenerlas y explicarlas con amabilidad evita atrasos sin necesidad de pelear."}, "sections": [{"h": "Tenga una regla y comuníquela", "p": "'Para mantener el servicio, la renovación es antes de vencer.' Una regla clara evita malentendidos."}, {"h": "Sea firme pero amable", "p": "Puede esperar un poco, pero recuerde la regla con buena onda. Ni grosera ni alfombra."}, {"h": "Ofrezca ayuda, no regaños", "p": "'Le pongo un recordatorio para que no se le pase.' Ayudar resuelve mejor que reclamar."}], "examples": [{"sit": "Cliente: «Ya casi te pago, espérame» (otra vez)", "bien": "Con gusto le espero 🙏 Solo le recuerdo: para no quedar sin servicio, la renovación es antes de vencer. ¿Le pongo un recordatorio?", "mal": "siempre lo mismo con usted", "why": "Firme con la regla, amable en el trato; el reclamo enfría."}, {"sit": "Cliente atrasado pide reactivar fiado", "bien": "Le reactivo apenas confirme el pago, como con todos 🙌 Es para ser justo con todos mis clientes.", "mal": "bueno va, después me paga", "why": "Mantener la regla protege su dinero, sin maltratar."}], "scenarios": [{"client": "Cliente que SIEMPRE se atrasa: «la próxima sí pago a tiempo»", "options": [{"t": "Le recuerdo amable la regla y le ofrezco un recordatorio para que no se le pase.", "ok": true}, {"t": "Le reclamo que siempre es lo mismo.", "ok": false}, {"t": "Lo dejo pasar sin decir nada otra vez.", "ok": false}], "explain": "Regla clara + ayuda; ni pelear ni ser alfombra."}, {"client": "Cliente quiere el servicio antes de pagar 'porque siempre paga'", "options": [{"t": "Le explico amable que activo al confirmar el pago, igual para todos.", "ok": true}, {"t": "Se lo doy fiado.", "ok": false}, {"t": "Le digo que no confío en él.", "ok": false}], "explain": "Mantener la política protege su negocio con respeto."}], "quiz": [{"q": "Con un cliente que paga tarde conviene:", "opts": ["Pelear", "Reglas claras dichas con amabilidad", "Aguantar siempre callada"], "correct": 1, "explain": "Firme y amable."}, {"q": "Una política de pago sirve para:", "opts": ["Asustar", "Evitar atrasos y malentendidos", "Perder clientes"], "correct": 1, "explain": "Claridad evita problemas."}, {"q": "Lo mejor que puede ofrecer al que se atrasa es:", "opts": ["Un regaño", "Ayuda (un recordatorio)", "Fiado siempre"], "correct": 1, "explain": "Ayudar resuelve mejor."}], "tip": "Hoy, a un cliente que se atrasa, recuérdele la regla con amabilidad y ofrézcale un recordatorio."}, {"cat": "Renovaciones y cobros", "icon": "🔁", "badge": "Cobros", "title": "Devoluciones y reembolsos", "subtitle": "Lección 6 · Resolver sin perder dinero ni fama", "intro": "Tarde o temprano alguien pide que le devuelva su dinero. Manejarlo con una política justa cuida su bolsillo y su reputación al mismo tiempo.", "concept": {"term": "Política de devolución", "def": "Son las reglas de qué pasa si un cliente quiere devolver un servicio. Tenerla clara (por ejemplo, crédito o días en vez de efectivo) le permite resolver justo sin regalar dinero ni quedar mal."}, "sections": [{"h": "Tenga una regla justa", "p": "Decida de antemano: por ejemplo, no devuelve efectivo, pero da crédito o días extra. Así no improvisa bajo presión."}, {"h": "No diga 'no' en seco", "p": "Un 'no hay devoluciones' a secas genera malas reseñas. Explique la política y ofrezca una solución intermedia."}, {"h": "Distinga el caso", "p": "Si fue falla suya, sea más flexible. Si el cliente usó el servicio sin problema y solo se arrepintió, aplique la regla."}], "examples": [{"sit": "Cliente: «Solo lo usé 3 días, devuélveme algo»", "bien": "Entiendo su punto 🙏 Por política no devuelvo efectivo, pero le puedo dar crédito o días extra. ¿Le parece?", "mal": "no hay devoluciones", "why": "Solución intermedia cuida la reputación; el 'no' seco genera quejas."}, {"sit": "Cliente: «La cuenta nunca me sirvió y ya pagué»", "bien": "Lamento que no le sirviera. Como fue una falla, le repongo el servicio o le doy otra cuenta sin costo. ¿Cuál prefiere?", "mal": "ya pagó, es su problema", "why": "Si la falla fue suya, sea flexible; eso salva la relación."}], "scenarios": [{"client": "Cliente que disfrutó el servicio pide reembolso 'porque sí'", "options": [{"t": "Explico que no devuelvo efectivo, pero le ofrezco crédito para su próxima compra.", "ok": true}, {"t": "Le digo 'no hay devoluciones' y corto.", "ok": false}, {"t": "Le devuelvo todo para que no se enoje.", "ok": false}], "explain": "Solución justa, ni 'no' seco ni regalar dinero."}, {"client": "Cliente reclama devolución por una falla real suya", "options": [{"t": "Le repongo el servicio o le doy otra cuenta sin costo.", "ok": true}, {"t": "Le digo que es su problema.", "ok": false}, {"t": "Lo ignoro.", "ok": false}], "explain": "Ante falla propia, sea flexible para salvar la relación."}], "quiz": [{"q": "Una política de devolución sirve para:", "opts": ["Improvisar bajo presión", "Resolver justo sin regalar ni quedar mal", "Pelear"], "correct": 1, "explain": "Tener regla clara de antemano."}, {"q": "Ante una devolución NO conviene:", "opts": ["Ofrecer crédito o días", "Decir 'no hay devoluciones' en seco", "Explicar la política"], "correct": 1, "explain": "El 'no' seco genera quejas."}, {"q": "Si la falla fue suya:", "opts": ["Aplicar la regla estricta", "Ser más flexible y reponer", "Ignorar"], "correct": 1, "explain": "Flexibilidad salva la relación."}], "tip": "Hoy defina su regla de devolución (crédito o días, no efectivo) para tenerla lista."}, {"cat": "Soporte técnico", "icon": "🛠️", "badge": "Soporte", "title": "Soporte ordenado y diagnóstico", "subtitle": "Lección 1 · Resolver fallas sin quemar cuentas", "intro": "Cuando algo falla, el cliente se estresa y usted puede gastar cuentas sin necesidad. Un soporte ordenado resuelve rápido, cuida su inventario y deja al cliente feliz.", "concept": {"term": "Diagnóstico", "def": "Diagnosticar es averiguar QUÉ está pasando antes de actuar. En soporte, significa pedir información clave antes de cambiar la cuenta. Cambiar a lo loco gasta su inventario y muchas veces ni resuelve el problema real."}, "sections": [{"h": "Las 3 preguntas que resuelven casi todo", "p": "Antes de cambiar nada, pregunte: 1) ¿En qué aparato lo usa? 2) ¿Qué mensaje/error le sale? 3) ¿Está en el perfil correcto? Con esas tres se resuelve la mayoría de casos."}, {"h": "Pida la captura como un favor", "p": "'¿Me manda una foto de lo que le sale? Así veo el error exacto.' Pedirla amable y explicar para qué hace que el cliente coopere."}, {"h": "Separe falla real de mal uso", "p": "Si se bloqueó, pregunte si cambió la clave o entró desde otro lado. Muchas 'fallas' son por mal uso. Cambiar y cambiar sin revisar quema sus cuentas."}, {"h": "Cierre confirmando", "p": "Cuando ya entró, confirme: '¿le quedó funcionando todo bien?'. Cerrar bien deja la mejor impresión."}], "examples": [{"sit": "Cliente: «No me deja entrar!!»", "bien": "Vamos a revisarlo 🙌 Mándeme: 1) captura de lo que le sale, 2) en qué aparato intenta entrar, 3) confirme que usa el perfil de Sublicuentas. Con eso lo arreglo rápido.", "mal": "le cambio la cuenta", "why": "Diagnostique antes de cambiar; casi siempre se resuelve sin gastar cuenta."}, {"sit": "Cliente: «Me pide un código que mandaron a un correo»", "bien": "Tranquilo, eso es normal 😊 Es la confirmación de dispositivo de Netflix. Deme un momentito, saco el código y se lo paso para que entre.", "mal": "ya se dañó, le cambio", "why": "Es el código de hogar: explíquelo con calma y consígalo, no cambie la cuenta."}], "scenarios": [{"client": "Cliente: «No sirve, así nomás» (sin más datos)", "options": [{"t": "Para ayudarle rápido, ¿me manda una foto de lo que le sale en pantalla? 📸 Así veo el error exacto.", "ok": true}, {"t": "Mándeme captura pues.", "ok": false}, {"t": "Pues intente otra vez.", "ok": false}], "explain": "Pida la captura como favor explicando para qué; así coopera."}, {"client": "Cliente: «Se bloqueó la cuenta!»", "options": [{"t": "Vamos a ver qué pasó: ¿cambió la clave o entró desde otro lado? Mándeme captura y reviso si la reactivo o le doy otra.", "ok": true}, {"t": "Ya se dañó, le cambio de una.", "ok": false}, {"t": "Usted hizo algo mal.", "ok": false}], "explain": "Revise la causa antes de cambiar; cambiar a ciegas quema inventario."}], "quiz": [{"q": "¿Qué hacer ANTES de cambiar una cuenta?", "opts": ["Cambiarla de una", "Diagnosticar: aparato, error y perfil", "Decir que es culpa del cliente"], "correct": 1, "explain": "Diagnostique primero."}, {"q": "Las 3 preguntas clave son:", "opts": ["Nombre, edad, dirección", "Aparato, mensaje de error, perfil", "Ninguna"], "correct": 1, "explain": "Resuelven la mayoría de casos."}, {"q": "Si Netflix pide un código, usted:", "opts": ["Dice que se dañó", "Explica que es normal y consigue el código", "Cambia la cuenta"], "correct": 1, "explain": "Es el código de hogar, normal."}, {"q": "Para que el cliente mande la captura:", "opts": ["Exigirla seco", "Pedirla como favor y explicar para qué", "No pedirla"], "correct": 1, "explain": "Amable y explicando coopera."}], "tip": "Hoy, ante cualquier falla, pida primero las 3 cosas: aparato, error y perfil, antes de cambiar nada."}, {"cat": "Soporte técnico", "icon": "🛠️", "badge": "Soporte", "title": "Entregar la cuenta y reglas", "subtitle": "Lección 2 · Que el cliente empiece sin errores", "intro": "La mayoría de los problemas nacen de una mala entrega. Entregar la cuenta con orden y explicar las reglas evita reclamos y cuentas caídas.", "concept": {"term": "Entrega de cuenta", "def": "Es el momento de darle al cliente su acceso (correo, clave, perfil) y las reglas de uso. Una entrega ordenada y con reglas claras evita que el cliente se equivoque o haga caer la cuenta."}, "sections": [{"h": "Entregue con formato", "p": "Correo, clave, perfil y reglas, cada cosa en su renglón. Tirar los datos sueltos causa errores."}, {"h": "Explique las reglas como beneficio", "p": "'No cambie la clave ni meta más gente, así la cuenta no se le cae.' Es para protegerlo a él, no un capricho."}, {"h": "Indique el perfil exacto", "p": "Dígale cuál perfil usar. Si entra al de otro, se cruzan y se daña la experiencia de todos."}], "examples": [{"sit": "Entregar una cuenta recién pagada", "bien": "¡Listo! 🎬\n📧 Correo: ___\n🔑 Clave: ___\n👤 Perfil: el que dice Sublicuentas\n⚠️ No cambie la clave. ¡Que lo disfrute!", "mal": "ahí va correo y clave", "why": "Formato + reglas evita errores; datos sueltos los causan."}, {"sit": "Cliente: «¿Por qué tantas reglas?»", "bien": "Son para protegerle a usted: si no cambia la clave ni mete más gente, la cuenta le dura sin caerse 🙌", "mal": "son las reglas y ya", "why": "Explicar el porqué hace que el cliente coopere."}], "scenarios": [{"client": "Va a entregar una cuenta. ¿Cómo lo hace?", "options": [{"t": "Con formato claro: correo, clave, perfil y reglas.", "ok": true}, {"t": "Tiro el correo y la clave sueltos.", "ok": false}, {"t": "Solo el correo, la clave que la adivine.", "ok": false}], "explain": "El formato claro previene errores y reclamos."}, {"client": "Cliente: «Hay varios perfiles, ¿cuál es el mío?»", "options": [{"t": "El que dice Sublicuentas; por favor use solo ese para que no se crucen.", "ok": true}, {"t": "El que sea.", "ok": false}, {"t": "Entre a cualquiera.", "ok": false}], "explain": "Indicar el perfil exacto evita que se dañe la experiencia de otros."}], "quiz": [{"q": "Al entregar una cuenta conviene:", "opts": ["Datos sueltos", "Formato claro con reglas", "Solo el correo"], "correct": 1, "explain": "Orden evita errores."}, {"q": "Las reglas se explican mejor como:", "opts": ["'Son las reglas y ya'", "Un beneficio: que no se le caiga", "Un castigo"], "correct": 1, "explain": "El porqué hace cooperar."}, {"q": "Indicar el perfil exacto evita:", "opts": ["Nada", "Que se crucen y se dañe la cuenta", "Vender más"], "correct": 1, "explain": "Orden = menos reclamos."}], "tip": "Hoy entregue una cuenta con formato (renglones) y explique una regla como beneficio."}, {"cat": "Soporte técnico", "icon": "🛠️", "badge": "Soporte", "title": "Instalación paso a paso", "subtitle": "Lección 3 · Guiar en TV, Box y celular", "intro": "Muchos clientes no saben instalar. Guiarlos con paciencia y pasos claros según su aparato evita frustración y reclamos, y los hace sentir bien atendidos.", "concept": {"term": "Instalación guiada", "def": "Es acompañar al cliente, paso a paso, para que instale y entre a su servicio en su aparato (Smart TV, TV Box o celular). Pedir la marca y dar pasos cortos hace la diferencia entre un cliente feliz y uno frustrado."}, "sections": [{"h": "Pregunte el aparato primero", "p": "Smart TV, TV Box o celular: cada uno tiene su forma. Pida marca/modelo para dar los pasos correctos."}, {"h": "Pasos cortos y numerados", "p": "1) Abra la tienda de apps. 2) Busque la app. 3) Instálela. 4) Entre con sus datos. Confirme dónde va el cliente en cada paso."}, {"h": "Tenga un plan B", "p": "Si la app no aparece (común en TV Box), use el instalador (Downloader). Esté listo para esa opción."}], "examples": [{"sit": "Cliente: «¿Cómo lo pongo en mi tele Samsung?»", "bien": "En su Samsung: 1) abra la tienda de apps, 2) busque la app, 3) instálela, 4) entre con los datos. Le voy guiando, ¿ya está en el inicio?", "mal": "búsquelo en la tele", "why": "Pasos según la marca + acompañar; 'búsquelo' no ayuda."}, {"sit": "Cliente: «Tengo una cajita Android»", "bien": "¡Fácil! Abra la Play Store, busque la app e instálela. Si no aparece, le paso el Downloader. ¿Le sale la Play Store?", "mal": "igual que la tele", "why": "Confirmar la tienda de apps y tener plan B ahorra tiempo."}], "scenarios": [{"client": "Cliente: «No me aparece la app en el TV Box»", "options": [{"t": "Tranquilo, usamos el Downloader: le paso el paso a paso para instalarla así.", "ok": true}, {"t": "Entonces no se puede.", "ok": false}, {"t": "Devuelva la cajita.", "ok": false}], "explain": "Tener plan B (Downloader) resuelve cuando la tienda no la tiene."}, {"client": "Cliente mayor: «no entiendo, hijo»", "options": [{"t": "No se preocupe, vamos despacito: dígame qué ve en la pantalla y le indico el siguiente paso.", "ok": true}, {"t": "Es facilísimo, solo descárguela.", "ok": false}, {"t": "Mejor que le ayude un joven.", "ok": false}], "explain": "Paciencia y pasos cortos; nunca minimizar ni mandarlo con otro."}], "quiz": [{"q": "Antes de guiar la instalación, pregunte:", "opts": ["Nada, mande todo", "El aparato (TV, Box o celular) y la marca", "La edad del cliente"], "correct": 1, "explain": "Cada aparato tiene su forma."}, {"q": "Los pasos deben ser:", "opts": ["Un párrafo largo", "Cortos, numerados y confirmando dónde va", "En inglés"], "correct": 1, "explain": "Cortos y acompañados."}, {"q": "Si la app no aparece en el TV Box:", "opts": ["Decir que no se puede", "Usar el Downloader como plan B", "Culpar al cliente"], "correct": 1, "explain": "Tenga siempre un plan B."}], "tip": "Hoy guíe una instalación preguntando primero el aparato y dando pasos cortos numerados."}, {"cat": "Soporte técnico", "icon": "🛠️", "badge": "Soporte", "title": "El código de hogar de Netflix", "subtitle": "Lección 4 · Resolver el código sin asustar al cliente", "intro": "El código de hogar de Netflix asusta a muchos clientes. Saber explicarlo con calma y resolverlo rápido evita reclamos y demuestra que usted sabe lo que hace.", "concept": {"term": "Código de hogar", "def": "Es un código que Netflix manda al correo de la cuenta para confirmar un dispositivo nuevo. Es normal, no es una falla. Si la cuenta lo pide, usted saca el código del correo y se lo pasa al cliente para que entre."}, "sections": [{"h": "Explique que es normal", "p": "'Eso es normal, Netflix a veces confirma el dispositivo.' Calmar al cliente es el primer paso."}, {"h": "Consiga el código rápido", "p": "Entre al correo de la cuenta, busque el mensaje de Netflix y pásele el código al cliente al momento."}, {"h": "No cambie la cuenta por esto", "p": "Es un proceso normal, no un daño. Cambiar la cuenta sin necesidad le quema inventario."}], "examples": [{"sit": "Cliente: «Me pide un código que mandaron a un correo»", "bien": "Tranquilo, es normal 😊 Netflix confirma el dispositivo. Deme un momentito, saco el código y se lo paso.", "mal": "se dañó la cuenta", "why": "Explicar que es normal calma; decir que se dañó asusta."}, {"sit": "Cliente: «Salió un mensaje raro de Netflix Hogar»", "bien": "No se preocupe, eso lo manejo yo. En un momentito le paso el código para que entre sin problema.", "mal": "ya no sirve, le cambio", "why": "Es proceso normal; no cambie la cuenta por esto."}], "scenarios": [{"client": "Cliente asustado: «Me está pidiendo verificar el hogar, ¿se dañó?»", "options": [{"t": "Para nada, es normal de Netflix. Ya le saco el código y entra sin problema.", "ok": true}, {"t": "Sí, se dañó, le cambio la cuenta.", "ok": false}, {"t": "No sé qué será eso.", "ok": false}], "explain": "Calma + conseguir el código; ni asustar ni cambiar de más."}, {"client": "La cuenta pide código y usted tiene acceso al correo", "options": [{"t": "Entro al correo, copio el código de Netflix y se lo paso al cliente.", "ok": true}, {"t": "Le cambio la cuenta de una.", "ok": false}, {"t": "Le digo que espere a ver si se arregla solo.", "ok": false}], "explain": "Sacar el código resuelve al momento sin gastar cuentas."}], "quiz": [{"q": "El código de hogar de Netflix es:", "opts": ["Una falla grave", "Algo normal para confirmar el dispositivo", "Una estafa"], "correct": 1, "explain": "Es normal, no un daño."}, {"q": "Si la cuenta pide el código, usted:", "opts": ["Cambia la cuenta", "Saca el código del correo y se lo pasa", "Le dice que se dañó"], "correct": 1, "explain": "Conseguir el código resuelve."}, {"q": "Ante el código, lo primero con el cliente es:", "opts": ["Asustarlo", "Calmarlo diciendo que es normal", "Ignorarlo"], "correct": 1, "explain": "Calma primero."}], "tip": "Hoy, si a un cliente le pide código de hogar, explíquele que es normal y consígalo de una."}, {"cat": "Soporte técnico", "icon": "🛠️", "badge": "Soporte", "title": "Cuentas caídas o bloqueadas", "subtitle": "Lección 5 · Diagnosticar antes de reponer", "intro": "Cuando una cuenta se cae, lo fácil es cambiarla… y así se queman cuentas sin necesidad. Diagnosticar primero ahorra inventario y resuelve de verdad.", "concept": {"term": "Cuenta caída", "def": "Es cuando el cliente ya no puede entrar a su servicio. Puede ser por una falla real o por mal uso (cambió la clave, metió a otros). Diagnosticar la causa decide si se reactiva o se repone, sin desperdiciar cuentas."}, "sections": [{"h": "Pregunte qué pasó", "p": "¿Cambió la clave? ¿Entró desde otro lado? ¿Metió a más gente? Muchas 'caídas' son por mal uso."}, {"h": "Pida la captura", "p": "Ver el mensaje exacto le dice si es falla real o algo que se arregla sin cambiar nada."}, {"h": "Reponga solo si hace falta", "p": "Si de verdad falló, reactive o dé otra cuenta. Si fue mal uso, recuérdele las reglas. Cambiar a ciegas le cuesta dinero."}], "examples": [{"sit": "Cliente: «Se bloqueó la cuenta!»", "bien": "Vamos a ver qué pasó: ¿cambió la clave o entró desde otro lado? Mándeme captura y reviso si la reactivo o le doy otra.", "mal": "ya se dañó, le cambio", "why": "Diagnostique la causa antes de cambiar."}, {"sit": "Cliente: «No me deja entrar desde ayer»", "bien": "Mándeme captura de lo que le sale y en qué aparato; con eso veo si es falla o algo del perfil y lo resuelvo.", "mal": "le mando otra cuenta de una", "why": "La captura evita cambiar cuentas sin necesidad."}], "scenarios": [{"client": "Cuenta bloqueada y el cliente admite que cambió la clave", "options": [{"t": "Le explico que por eso se bloqueó, lo reactivo y le recuerdo no cambiar la clave.", "ok": true}, {"t": "Le doy otra cuenta sin decir nada.", "ok": false}, {"t": "Lo regaño fuerte.", "ok": false}], "explain": "Si fue mal uso, reactive y recuerde reglas; no queme otra cuenta."}, {"client": "Cuenta caída y el cliente no hizo nada raro (falla real)", "options": [{"t": "La reactivo o le doy otra cuenta de inmediato.", "ok": true}, {"t": "Le digo que es su culpa.", "ok": false}, {"t": "Lo dejo esperando.", "ok": false}], "explain": "Ante falla real, reponga rápido."}], "quiz": [{"q": "Cuando una cuenta se cae, primero:", "opts": ["Cambiarla de una", "Diagnosticar la causa", "Culpar al cliente"], "correct": 1, "explain": "Diagnostique antes de reponer."}, {"q": "Muchas caídas se deben a:", "opts": ["Mala suerte", "Mal uso (cambió clave, metió gente)", "El clima"], "correct": 1, "explain": "Por eso hay que preguntar."}, {"q": "Cambiar cuentas sin diagnosticar:", "opts": ["No tiene costo", "Le quema inventario", "Es lo mejor"], "correct": 1, "explain": "Diagnosticar ahorra cuentas."}], "tip": "Hoy, ante una cuenta caída, pida la captura y pregunte qué pasó antes de reponer."}, {"cat": "Soporte técnico", "icon": "🛠️", "badge": "Soporte", "title": "Soporte con paciencia", "subtitle": "Lección 6 · El cliente que no entiende de tecnología", "intro": "Muchos de sus clientes no son buenos con la tecnología, y son igual de valiosos. Saber atenderlos con paciencia le gana a toda la familia como clientes.", "concept": {"term": "Soporte paciente", "def": "Es atender con calma y palabras simples a quien no maneja bien la tecnología, guiándolo paso a paso sin hacerlo sentir tonto. La paciencia con una persona suele traer a toda su familia como clientes."}, "sections": [{"h": "Hable simple, sin palabras técnicas", "p": "Nada de 'servidor', 'caché' o 'interfaz'. Diga 'la pantalla', 'el botón', 'la app'. Que cualquiera entienda."}, {"h": "Pasos de a uno", "p": "Dé un paso, espere que lo haga, y siga. No mande todo junto a quien se confunde fácil."}, {"h": "Nunca lo haga sentir tonto", "p": "Paciencia siempre. 'No se preocupe, vamos despacito' vale oro y fideliza."}], "examples": [{"sit": "Cliente mayor: «no sé dónde está eso que dice»", "bien": "No se preocupe, despacito 😊 ¿Ve la pantalla principal? Dígame qué dibujitos ve y le indico cuál tocar.", "mal": "ahí mismo, búsquelo", "why": "Guía concreta y paciente; 'búsquelo' frustra."}, {"sit": "Cliente: «me perdí, no entendí»", "bien": "Tranquilo, empezamos de nuevo juntos. Paso 1: encienda la tele. ¿Ya? Bien, ahora el paso 2…", "mal": "ya le expliqué", "why": "Reiniciar con paciencia retiene; el reproche aleja."}], "scenarios": [{"client": "Cliente confundido manda: «no me sale nada de lo que dijo»", "options": [{"t": "Vamos de a poquito: dígame exactamente qué ve en la pantalla ahorita.", "ok": true}, {"t": "Es que no sigue las instrucciones.", "ok": false}, {"t": "Pídale a alguien joven que le ayude.", "ok": false}], "explain": "Paciencia y un paso a la vez; no culpar ni mandarlo con otro."}, {"client": "Cliente: «perdón por preguntar tanto»", "options": [{"t": "¡Para nada! Para eso estoy, pregunte con confianza 😊", "ok": true}, {"t": "Sí, pregunta mucho.", "ok": false}, {"t": "Apúrese que tengo otros clientes.", "ok": false}], "explain": "Hacerlo sentir cómodo fideliza a él y a su familia."}], "quiz": [{"q": "Con un cliente que no sabe de tecnología, hable:", "opts": ["Con palabras técnicas", "Simple, sin palabras raras", "Rápido para terminar"], "correct": 1, "explain": "Que cualquiera entienda."}, {"q": "Los pasos para él deben ir:", "opts": ["Todos juntos", "De a uno, esperando que los haga", "Sin explicar"], "correct": 1, "explain": "Uno a la vez."}, {"q": "La paciencia con un cliente así:", "opts": ["Pierde tiempo", "Lo fideliza a él y a su familia", "No sirve"], "correct": 1, "explain": "Trae a toda la familia."}], "tip": "Hoy, con un cliente que no entiende, déle un paso a la vez y dígale 'vamos despacito'."}, {"cat": "Contenido y recomendaciones", "icon": "🎬", "badge": "Contenido", "title": "Recomendar la plataforma correcta", "subtitle": "Lección única · Vender lo que el cliente sí va a usar", "intro": "Un cliente que paga por algo que sí usa, vuelve y recomienda. Recomendar bien según el gusto es de las formas más fáciles de vender más y tener clientes contentos.", "concept": {"term": "Venta por recomendación", "def": "Es recomendarle al cliente la plataforma que de verdad encaja con su gusto y su uso, en vez de venderle 'la más cara' o 'la de siempre'. Recomendar bien es vender como quien aconseja, y eso genera confianza."}, "sections": [{"h": "No hay una 'mejor', hay la mejor para cada quien", "p": "Pregunte qué ve más y recomiende según eso: series/películas → Netflix; novelas en español → Vix; anime → Crunchyroll; fútbol → IPTV; música → Spotify; trabajo/diseño → Canva."}, {"h": "Venda por el uso, no por la app", "p": "A una familia con niños: Disney+ por el contenido sano y que lo ven varios. A quien quiere música: Spotify porque se usa todos los días. El beneficio cierra la venta."}, {"h": "Use los estrenos como gancho", "p": "'Acaba de salir [estreno] que está pegando, con su Netflix lo ve hoy.' Un estreno concreto crea deseo y un motivo para comprar ya."}, {"h": "Sea honesto con lo que sí hay", "p": "Para deportes no prometa 'todos los partidos del mundo'. Diga 'muchos canales y los más vistos'. La honestidad evita reclamos."}], "examples": [{"sit": "Cliente: «¿Cuál plataforma es la mejor?»", "bien": "Depende de su gusto 😊 ¿Qué ve más: series, novelas, anime o fútbol? Con eso le digo cuál le saca más jugo.", "mal": "Netflix la mejor", "why": "Recomiende según el gusto; no hay una mejor para todos."}, {"sit": "Cliente: «Algo bueno para los niños»", "bien": "¡Disney+ es perfecto! Tiene Disney, Pixar, Marvel, contenido sano, y lo pueden ver varios en la casa. ¿Se lo dejo listo?", "mal": "Disney está bueno", "why": "Venda por el uso (sano, familiar, varios a la vez)."}], "scenarios": [{"client": "Cliente: «Quiero ver anime»", "options": [{"t": "Para anime lo mejor es Crunchyroll: tiene los capítulos casi al tiempo que en Japón. ¿Se lo activo?", "ok": true}, {"t": "Creo que en Netflix hay algo.", "ok": false}, {"t": "El anime no se ve aquí.", "ok": false}], "explain": "Hable el lenguaje del fan y recomiende la plataforma correcta."}, {"client": "Cliente: «Quiero ver los partidos de la selección»", "options": [{"t": "Con la IPTV ve los partidos en vivo y canales de deportes. ¿Le hago una demo para que vea cómo se mira?", "ok": true}, {"t": "Sí, en la IPTV.", "ok": false}, {"t": "El fútbol no se puede.", "ok": false}], "explain": "Conecte el deseo (fútbol) con la solución (IPTV) y ofrezca demo."}], "quiz": [{"q": "Para recomendar bien, primero:", "opts": ["Ofrecer la más cara", "Preguntar qué ve más y recomendar según eso", "Mandar todo el catálogo"], "correct": 1, "explain": "Según el gusto real."}, {"q": "A una familia con niños conviene:", "opts": ["Netflix sin más", "Disney+, por contenido sano y familiar", "Lo más caro"], "correct": 1, "explain": "Venda por el uso."}, {"q": "Para vender deportes hay que:", "opts": ["Prometer todos los partidos del mundo", "Ser honesto: muchos canales y los más vistos", "No venderlo"], "correct": 1, "explain": "Honestidad evita reclamos."}, {"q": "Un estreno concreto sirve para:", "opts": ["Aburrir al cliente", "Crear deseo y un motivo de comprar hoy", "Nada"], "correct": 1, "explain": "El estreno es gancho de venta."}], "tip": "Hoy, antes de recomendar, pregúntele al cliente qué ve más y recomiende según su gusto."}, {"cat": "Contenido y recomendaciones", "icon": "🎬", "badge": "Contenido", "title": "Conozca su catálogo", "subtitle": "Lección 2 · Qué ofrece cada plataforma", "intro": "No puede recomendar bien lo que no conoce. Saber qué tiene cada plataforma le permite encajar al cliente con lo que de verdad va a disfrutar.", "concept": {"term": "Catálogo", "def": "Es todo lo que ofrece cada plataforma: tipo de contenido, para quién es y qué la hace especial. Conocer su catálogo lo convierte en un asesor de confianza, no solo en alguien que vende cuentas."}, "sections": [{"h": "Lo fuerte de cada una", "p": "Netflix: series y películas variadas. Disney+: familiar (Disney, Pixar, Marvel). Vix: novelas y contenido la
