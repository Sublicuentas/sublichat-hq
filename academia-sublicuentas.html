const ACA_COL='academia_progreso';
let _fs=null, CLOUD=false, _user=null;
let _resolveAuth; const authReady=new Promise(r=>{_resolveAuth=r;});
(async()=>{

    const { initializeApp, getApps, getApp } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");

eno el precio… pero déjame ver»", "options": [{"t": "Claro. Le aparto este precio hoy y me paga cuando pueda esta semana, ¿le sirve?", "ok": true}, {"t": "Bueno, cuando decida me dice.", "ok": false}, {"t": "Apúrese que se acaba (aunque no sea cierto).", "ok": false}], "explain": "Apartar con la promo real cierra sin presionar ni mentir."}, {"client": "Cliente: «¿Cuánto me sale el de 3 meses?»", "options": [{"t": "Le sale Lps. ___, más barato por mes que el mensual. ¿Se lo dejo de 3 entonces?", "ok": true}, {"t": "Ahí está el precio.", "ok": false}, {"t": "Mejor lleve el de 1 mes.", "ok": false}], "explain": "Preguntar por un plan es señal de compra: dé el precio y proponga cerrar."}], "quiz": [{"q": "¿Cuándo es momento de cerrar?", "opts": ["Cuando el cliente pregunta precio, pago o si le sirve", "Nunca, esperar a que él compre solo", "Solo si lo pide tres veces"], "correct": 0, "explain": "Esas preguntas son señales de interés."}, {"q": "La técnica del resumen + propuesta es:", "opts": ["Repetir el precio diez veces", "Resumir el beneficio y proponer activarlo hoy", "Bajar el precio"], "correct": 1, "explain": "Resumen da seguridad, propuesta cierra."}, {"q": "El cierre por opción consiste en:", "opts": ["Preguntar si compra o no", "Dar a elegir entre dos planes", "Mandar todo el catálogo"], "correct": 1, "explain": "Las dos opciones son venta."}, {"q": "Después del «sí», antes de cobrar:", "opts": ["Cobrar de una sin explicar", "Confirmar plan, precio y entrega", "Ofrecer otra cosa"], "correct": 1, "explain": "Confirmar evita reclamos."}], "tip": "Hoy, a un cliente que muestre interés, ciérrele con un resumen + '¿se lo dejo activo hoy?'."}, {"cat": "Técnicas de ventas", "icon": "🎯", "badge": "Ventas", "title": "Manejo de objeciones", "subtitle": "Lección 2 · Qué responder cuando dudan", "intro": "Una objeción ('está caro', 'lo pienso', 'no confío') no es un 'no': es una duda. Saber responder cada una convierte muchos 'no' en ventas. Aquí ve las más comunes y cómo soltar la pierde."}, {"client": "Cliente: «En el grupo de Facebook lo vi más barato»", "options": [{"t": "Puede ser, pero ahí muchas veces no dan soporte ni garantía. Conmigo, si algo falla, lo resuelvo. Eso vale.", "ok": true}, {"t": "Esos son estafadores.", "ok": false}, {"t": "Bueno, le igualo el precio.", "ok": false}], "explain": "Diferénciese por soporte y confianza, sin hablar mal del otro ni regalar el precio."}], "quiz": [{"q": "Una objeción significa que el cliente:", "opts": ["Ya dijo que no", "Tiene una duda y casi compra", "Quiere pelear"], "correct": 1, "explain": "Es una duda por resolver, no un rechazo."}, {"q": "Frente a «está caro»:", "opts": ["Bajar el precio", "Defender el valor y ofrecer más tiempo/combo", "Ofenderse"], "correct": 1, "explain": "Agregue valor, no rebaje."}, {"q": "Frente a «¿y si no funciona?»:", "opts": ["Jurar que nunca falla", "Ofrecer soporte real si algo pasa", "Decir que es su problema"], "correct": 1, "explain": "Soporte real, sin prometer imposibles."}, {"q": "«Lo voy a pensar» se maneja:", "opts": ["Presionando", "Apartando con promo y dando seguimiento amable", "Olvidándose del cliente"], "correct": 1, "explain": "Apartar + seguimiento recupera la venta."}], "tip": "Hoy, a la próxima objeción, no baje el precio: responda con valor (soporte, garantía o más tiempo)."}, {"cat": "Técnicas de ventas", "icon": "🎯", "badge": "Ventas", "title": "Subir el valor de cada venta", "subtitle": "Lección 3 · Combos, planes largos y que cada cliente deje más", "intro": "Vender más no siempre es conseguir más clientes: muchas veces es lograr que cada cliente deje un poquito más, ofreciéndole lo correcto. Aquí aprende a hacerlo sin sonar insistente.", "concept": {"term": "Subir el valor de la venta", "def": "Es lograr que una misma venta valga más, ofreciéndole al cliente algo que de verdad le conviene: un combo, un plan más largo o una plataforma extra. Bien hecho, no es 'vender de más': es darle más valor por su dinero."}, "sections": [{"h": "El combo como ahorro", "p": "Después del 'sí', ofrezca una segunda plataforma como combo: 'por poquito más le sumo Disney+ y le sale más barato que aparte'. Preséntelo como ahorro, nunca como obligación."}, {"h": "El plan largo como solución", "p": "Si el cliente se queja de renovar cada mes, ofrézcale el plan de 3 meses o anual: paga una vez, le sale más barato y no anda renovando. Usa su molestia a favor de él (y de usted)."}, {"h": "Ofrecer solo lo que le sirve", "p": "Solo ofrezca la mejora cuando de verdad le conviene al cliente (ahorra, menos molestia). Si no, se siente como un consejo, no como vender de más. Eso genera confianza y clientes que vuelven."}, {"h": "El 'si no, tranquilo'", "p": "Cuando ofrezca el extra, deje siempre la puerta abierta: 'si no, igual le dejo lo que pidió'. Así sube la venta sin presionar y mantiene la buena onda."}], "examples": [{"sit": "Cliente (ya aceptó Netflix): «Solo el Netflix»", "bien": "¡Listo el Netflix! Y si quiere, por poquito más le sumo Disney+ para los niños y le sale en combo más barato que aparte. ¿Se lo agrego? Si no, igual se lo dejo así 😊", "mal": "ok va", "why": "Ofrezca el combo como ahorro y deje la puerta abierta; no deje pasar la oportunidad ni obligue."}, {"sit": "Cliente: «Renuévame el mes otra vez»", "bien": "¡Va su mes! Por cierto, si pasa al de 3 meses le sale más barato y no anda renovando tan seguido. ¿Se lo dejo de 3 esta vez?", "mal": "listo otro mes", "why": "Cada renovación es chance de subir al plan largo, presentándolo como ahorro."}], "scenarios": [{"client": "Cliente: «Quiero el plan de 1 mes»", "options": [{"t": "¡Va el de 1 mes! Solo le comento: el de 3 le sale más barato por mes y no renueva tan seguido. ¿Se lo dejo de 3 mejor? Usted decide.", "ok": true}, {"t": "Tiene que llevar el de 3 o no se lo vendo.", "ok": false}, {"t": "Listo, 1 mes y ya.", "ok": false}], "explain": "Ofrezca la mejora solo cuando le ahorra, sin obligar y dejándolo decidir."}, {"client": "Cliente gamer: «Solo la recarga de diamantes»", "options": [{"t": "¡Va tu recarga! Y si querés, te armo combo con Spotify para tus partidas, te sale barato. ¿Le metemos? Si no, tranqui.", "ok": true}, {"t": "No, solo eso.", "ok": false}, {"t": "Tenés que llevar el combo.", "ok": false}], "explain": "Combo relacionado, como ahorro y con buena onda; nunca obligar."}], "quiz": [{"q": "Subir el valor de una venta significa:", "opts": ["Subir el precio sin avisar", "Lograr que cada venta valga más con algo que le sirve al cliente", "Vender a la fuerza"], "correct": 1, "explain": "Más valor por su dinero, no engaño."}, {"q": "El combo se debe ofrecer como:", "opts": ["Una obligación", "Un ahorro, dejando la puerta abierta", "Algo caro"], "correct": 1, "explain": "Ahorro + 'si no, tranquilo'."}, {"q": "¿Cuándo ofrecer el plan largo?", "opts": ["Siempre, aunque no le sirva", "Cuando le ahorra o le evita molestia", "Nunca"], "correct": 1, "explain": "Cuando de verdad le conviene al cliente."}, {"q": "Dejar el 'si no, tranquilo' sirve para:", "opts": ["Perder la venta", "Subir el valor sin presionar", "Confundir"], "correct": 1, "explain": "Mantiene la buena onda y la venta base."}], "tip": "Hoy, a un cliente que ya compró, ofrézcale UN combo o plan largo como ahorro, con 'si no, tranquilo'."}, {"cat": "Renovaciones y cobros", "icon": "🔁", "badge": "Cobros", "title": "Cómo cobrar sin incomodar", "subtitle": "Lección 1 · Renovaciones y cobros amables que sí funcionan", "intro": "El dinero más fácil es el del cliente que ya tiene: solo hay que cobrarle bien y a tiempo. Cobrar sin incomodar mantiene la cartera al día y al cliente contento.", "concept": {"term": "Renovación", "def": "Renovar es cobrarle de nuevo al cliente que ya tiene un servicio activo para que siga sin interrupción. Es la base del negocio: un cliente que renueva mes a mes vale mucho más que una venta nueva de una sola vez."}, "sections": [{"h": "Avise ANTES del corte", "p": "Escríbale un par de días antes de que venza, no cuando ya se cortó. Con un gancho: 'renueve antes para que no se le corte y no pierda lo que está viendo'. Avisar a tiempo asegura el pago y evita molestias."}, {"h": "Cobre con un beneficio, no con presión", "p": "En vez de 'págueme', diga 'para que no pierda su servicio'. La gente renueva por no perder algo, no por presión."}, {"h": "Pida el pago claro", "p": "Dé los datos completos (banco, cuenta, nombre) y diga el siguiente paso: 'mándeme la captura y le activo al toque'. Un cobro confuso retrasa todo."}, {"h": "Organice su lista de vencidos", "p": "Revise cada semana quién vence. Si tiene varios atrasados, empiece por los de mayor monto o más fieles: ese es el dinero que más pesa."}], "examples": [{"sit": "Cliente con servicio que vence en 2 días", "bien": "¡Hola! Su Netflix vence en 2 días. Si renueva antes, no se le corta nada y sigue viendo sin interrupción 🎬 ¿Lo renovamos?", "mal": "ya venció, paga o no", "why": "Avisar antes con beneficio funciona; cobrar seco y tarde, no."}, {"sit": "Cliente: «¿Cómo te pago la renovación?»", "bien": "Le paso los datos 👇 Banco ___, Cuenta ___, a nombre de ___. Mándeme la captura y le dejo renovado al toque 🙌", "mal": "por transferencia ahí", "why": "Datos completos + siguiente paso evita idas y vueltas."}], "scenarios": [{"client": "Cliente: «Se me pasó renovar, ya hace días 🙈»", "options": [{"t": "¡No hay problema, esas cosas pasan! Se lo reactivo hoy mismo. ¿Mismo plan o quiere cambiar?", "ok": true}, {"t": "Es que ya venció hace rato.", "ok": false}, {"t": "Por atrasado le cobro más.", "ok": false}], "explain": "Quítele la culpa y ofrezca reactivar; regañar aleja al cliente."}, {"client": "Cliente: «Esta vez creo que ya no renuevo»", "options": [{"t": "¡Lo entiendo! Antes de que se vaya: si renueva hoy le doy [un pequeño detalle]. Me gustaría seguir siendo su tienda 💛 ¿Le animo?", "ok": true}, {"t": "Bueno, usted sabe.", "ok": false}, {"t": "Le regalo 3 meses gratis.", "ok": false}], "explain": "Un incentivo pequeño retiene; ni dejarlo ir sin intentar ni regalar de más."}], "quiz": [{"q": "¿Cuándo avisar de una renovación?", "opts": ["Cuando ya se cortó", "Un par de días antes de vencer", "Nunca"], "correct": 1, "explain": "Antes del corte, con gancho."}, {"q": "La gente renueva más cuando le habla de:", "opts": ["No perder su servicio", "Que le hace un favor a usted", "Lo difícil que es su trabajo"], "correct": 0, "explain": "Renuevan por no perder algo."}, {"q": "Un cliente olvidó renovar. Usted:", "opts": ["Lo regaña", "Le quita culpa y ofrece reactivar hoy", "Le cobra más"], "correct": 1, "explain": "Amable y con solución."}, {"q": "Con varios vencidos, empiece por:", "opts": ["Orden alfabético", "Los de mayor monto o más fieles", "Al azar"], "correct": 1, "explain": "Recupera primero lo que más pesa."}], "tip": "Hoy avise a un cliente que vence pronto, ANTES del corte, con un gancho ('no pierda lo que ve')."}, {"cat": "Soporte técnico", "icon": "🛠️", "badge": "Soporte", "title": "Soporte ordenado y diagnóstico", "subtitle": "Lección 1 · Resolver fallas sin quemar cuentas", "intro": "Cuando algo falla, el cliente se estresa y usted puede gastar cuentas sin necesidad. Un soporte ordenado resuelve rápido, cuida su inventario y deja al cliente feliz.", "concept": {"term": "Diagnóstico", "def": "Diagnosticar es averiguar QUÉ está pasando antes de actuar. En soporte, significa pedir información clave antes de cambiar la cuenta. Cambiar a lo loco gasta su inventario y muchas veces ni resuelve el problema real."}, "sections": [{"h": "Las 3 preguntas que resuelven casi todo", "p": "Antes de cambiar nada, pregunte: 1) ¿En qué aparato lo usa? 2) ¿Qué mensaje/error le sale? 3) ¿Está en el perfil correcto? Con esas tres se resuelve la mayoría de casos."}, {"h": "Pida la captura como un favor", "p": "'¿Me manda una foto de lo que le sale? Así veo el error exacto.' Pedirla amable y explicar para qué hace que el cliente coopere."}, {"h": "Separe falla real de mal uso", "p": "Si se bloqueó, pregunte si cambió la clave o entró desde otro lado. Muchas 'fallas' son por mal uso. Cambiar y cambiar sin revisar quema sus cuentas."}, {"h": "Cierre confirmando", "p": "Cuando ya entró, confirme: '¿le quedó funcionando todo bien?'. Cerrar bien deja la mejor impresión."}], "examples": [{"sit": "Cliente: «No me deja entrar!!»", "bien": "Vamos a revisarlo 🙌 Mándeme: 1) captura de lo que le sale, 2) en qué aparato intenta entrar, 3) confirme que usa el perfil de Sublicuentas. Con eso lo arreglo rápido.", "mal": "le cambio la cuenta", "why": "Diagnostique antes de cambiar; casi siempre se resuelve sin gastar cuenta."}, {"sit": "Cliente: «Me pide un código que mandaron a un correo»", "bien": "Tranquilo, eso es normal 😊 Es la confirmación de dispositivo de Netflix. Deme un momentito, saco el código y se lo paso para que entre.", "mal": "ya se dañó, le cambio", "why": "Es el código de hogar: explíquelo con calma y consígalo, no cambie la cuenta."}], "scenarios": [{"client": "Cliente: «No sirve, así nomás» (sin más datos)", "options": [{"t": "Para ayudarle rápido, ¿me manda una foto de lo que le sale en pantalla? 📸 Así veo el error exacto.", "ok": true}, {"t": "Mándeme captura pues.", "ok": false}, {"t": "Pues intente otra vez.", "ok": false}], "explain": "Pida la captura como favor explicando para qué; así coopera."}, {"client": "Cliente: «Se bloqueó la cuenta!»", "options": [{"t": "Vamos a ver qué pasó: ¿cambió la clave o entró desde otro lado? Mándeme captura y reviso si la reactivo o le doy otra.", "ok": true}, {"t": "Ya se dañó, le cambio de una.", "ok": false}, {"t": "Usted hizo algo mal.", "ok": false}], "explain": "Revise la causa antes de cambiar; cambiar a ciegas quema inventario."}], "quiz": [{"q": "¿Qué hacer ANTES de cambiar una cuenta?", "opts": ["Cambiarla de una", "Diagnosticar: aparato, error y perfil", "Decir que es culpa del cliente"], "correct": 1, "explain": "Diagnostique primero."}, {"q": "Las 3 preguntas clave son:", "opts": ["Nombre, edad, dirección", "Aparato, mensaje de error, perfil", "Ninguna"], "correct": 1, "explain": "Resuelven la mayoría de casos."}, {"q": "Si Netflix pide un código, usted:", "opts": ["Dice que se dañó", "Explica que es normal y consigue el código", "Cambia la cuenta"], "correct": 1, "explain": "Es el código de hogar, normal."}, {"q": "Para que el cliente mande la captura:", "opts": ["Exigirla seco", "Pedirla como favor y explicar para qué", "No pedirla"], "correct": 1, "explain": "Amable y explicando coopera."}], "tip": "Hoy, ante cualquier falla, pida primero las 3 cosas: aparato, error y perfil, antes de cambiar nada."}, {"cat": "Contenido y recomendaciones", "icon": "🎬", "badge": "Contenido", "title": "Recomendar la plataforma correcta", "subtitle": "Lección única · Vender lo que el cliente sí va a usar", "intro": "Un cliente que paga por algo que sí usa, vuelve y recomienda. Recomendar bien según el gusto es de las formas más fáciles de vender más y tener clientes contentos.", "concept": {"term": "Venta por recomendación", "def": "Es recomendarle al cliente la plataforma que de verdad encaja con su gusto y su uso, en vez de venderle 'la más cara' o 'la de siempre'. Recomendar bien es vender como quien aconseja, y eso genera confianza."}, "sections": [{"h": "No hay una 'mejor', hay la mejor para cada quien", "p": "Pregunte qué ve más y recomiende según eso: series/películas → Netflix; novelas en español → Vix; anime → Crunchyroll; fútbol → IPTV; música → Spotify; trabajo/diseño → Canva."}, {"h": "Venda por el uso, no por la app", "p": "A una familia con niños: Disney+ por el contenido sano y que lo ven varios. A quien quiere música: Spotify porque se usa todos los días. El beneficio cierra la venta."}, {"h": "Use los estrenos como gancho", "p": "'Acaba de salir [estreno] que está pegando, con su Netflix lo ve hoy.' Un estreno concreto crea deseo y un motivo para comprar ya."}, {"h": "Sea honesto con lo que sí hay", "p": "Para deportes no prometa 'todos los partidos del mundo'. Diga 'muchos canales y los más vistos'. La honestidad evita reclamos."}], "examples": [{"sit": "Cliente: «¿Cuál plataforma es la mejor?»", "bien": "Depende de su gusto 😊 ¿Qué ve más: series, novelas, anime o fútbol? Con eso le digo cuál le saca más jugo.", "mal": "Netflix la mejor", "why": "Recomiende según el gusto; no hay una mejor para todos."}, {"sit": "Cliente: «Algo bueno para los niños»", "bien": "¡Disney+ es perfecto! Tiene Disney, Pixar, Marvel, contenido sano, y lo pueden ver varios en la casa. ¿Se lo dejo listo?", "mal": "Disney está bueno", "why": "Venda por el uso (sano, familiar, varios a la vez)."}], "scenarios": [{"client": "Cliente: «Quiero ver anime»", "options": [{"t": "Para anime lo mejor es Crunchyroll: tiene los capítulos casi al tiempo que en Japón. ¿Se lo activo?", "ok": true}, {"t": "Creo que en Netflix hay algo.", "ok": false}, {"t": "El anime no se ve aquí.", "ok": false}], "explain": "Hable el lenguaje del fan y recomiende la plataforma correcta."}, {"client": "Cliente: «Quiero ver los partidos de la selección»", "options": [{"t": "Con la IPTV ve los partidos en vivo y canales de deportes. ¿Le hago una demo para que vea cómo se mira?", "ok": true}, {"t": "Sí, en la IPTV.", "ok": false}, {"t": "El fútbol no se puede.", "ok": false}], "explain": "Conecte el deseo (fútbol) con la solución (IPTV) y ofrezca demo."}], "quiz": [{"q": "Para recomendar bien, primero:", "opts": ["Ofrecer la más cara", "Preguntar qué ve más y recomendar según eso", "Mandar todo el catálogo"], "correct": 1, "explain": "Según el gusto real."}, {"q": "A una familia con niños conviene:", "opts": ["Netflix sin más", "Disney+, por contenido sano y familiar", "Lo más caro"], "correct": 1, "explain": "Venda por el uso."}, {"q": "Para vender deportes hay que:", "opts": ["Prometer todos los partidos del mundo", "Ser honesto: muchos canales y los más vistos", "No venderlo"], "correct": 1, "explain": "Honestidad evita reclamos."}, {"q": "Un estreno concreto sirve para:", "opts": ["Aburrir al cliente", "Crear deseo y un motivo de comprar hoy", "Nada"], "correct": 1, "explain": "El estreno es gancho de venta."}], "tip": "Hoy, antes de recomendar, pregúntele al cliente qué ve más y recomiende según su gusto."}, {"cat": "IPTV y dispositivos", "icon": "📺", "badge": "IPTV", "title": "Vender y dar soporte de IPTV", "subtitle": "Lección única · TV digital: confianza, instalación y plan correcto", "intro": "La IPTV es un buen negocio, pero el cliente desconfía y a veces falla la instalación. Saber vender con demo, pedir el aparato y elegir el plan correcto evita reclamos y vende más.", "concept": {"term": "IPTV", "def": "IPTV es televisión por internet: canales en vivo, deportes y películas a través de una app. Se vende por suscripción y necesita una app instalada en la tele o aparato del cliente, con usuario y clave."}, "sections": [{"h": "La demo quita el miedo", "p": "El cliente de IPTV desconfía ('¿y si no sirve?'). En vez de jurar que sí, ofrézcale una demo: un acceso de prueba para que vea los canales funcionando en SU aparato. Ver vende más que prometer."}, {"h": "Pregunte marca y modelo", "p": "No prometa 'sirve en todas'. Pida la marca y modelo de la tele o aparato para darle los pasos exactos y la app correcta, y evitar fallas de instalación."}, {"h": "Venda el plan correcto", "p": "Pregunte en cuántas pantallas lo verán a la vez. Si son varias, ofrezca el plan de varias pantallas; con una sola se traba y le reclaman."}, {"h": "Antes de culpar al servicio, revise el internet", "p": "Muchas trabas son del internet del cliente, no de la app. Pregunte si otras apps (YouTube) también se traban antes de cambiar servidores."}], "examples": [{"sit": "Cliente: «¿Y cómo sé que sí funciona?»", "bien": "Buena pregunta 🙌 Le hago una demo gratis para que vea los canales funcionando en su aparato. Si le gusta, lo activamos completo.", "mal": "funciona tranquilo", "why": "Demo > promesa: ver funcionando da confianza."}, {"sit": "Cliente: «Lo vamos a ver en 3 teles a la vez»", "bien": "¡Gracias por avisar! Le conviene el plan de varias pantallas; con una sola se traba. Le armo el de 3 para que todos vean tranquilos. ¿Va?", "mal": "con un plan basta", "why": "Vender el plan correcto evita reclamos y es mejor servicio."}], "scenarios": [{"client": "Cliente: «Me sirve en mi tele Samsung?»", "options": [{"t": "Casi seguro que sí. ¿De qué modelo es? Así le digo exactamente qué app instalar y no tenemos sorpresas.", "ok": true}, {"t": "Sí, en todas sirve.", "ok": false}, {"t": "Solo en teles caras.", "ok": false}], "explain": "Pida modelo para dar pasos exactos y evitar fallas."}, {"client": "Cliente: «Se ve trabado todo el rato»", "options": [{"t": "Vamos a revisar: ¿otras apps como YouTube también se traban? Pruebe acercarse al wifi y me cuenta.", "ok": true}, {"t": "Le cambio el servidor de una.", "ok": false}, {"t": "El servicio es así, aguante.", "ok": false}], "explain": "Revise el internet antes de culpar a la IPTV o cambiar servidor."}], "quiz": [{"q": "El cliente duda si la IPTV funciona. Usted:", "opts": ["Le jura que sí", "Le ofrece una demo", "Se molesta"], "correct": 1, "explain": "La demo convierte la duda en venta."}, {"q": "Antes de prometer que se instala en su tele:", "opts": ["Dice 'en todas sirve'", "Pide marca y modelo", "Le dice que su tele no sirve"], "correct": 1, "explain": "El modelo permite pasos exactos."}, {"q": "Si lo verán en 3 teles a la vez:", "opts": ["Vende una pantalla", "Ofrece el plan de varias pantallas", "Dice que no se puede"], "correct": 1, "explain": "El plan correcto evita reclamos."}, {"q": "Si la IPTV se traba, primero revise:", "opts": ["Cambiar servidor", "El internet del cliente", "Echarle la culpa al cliente"], "correct": 1, "explain": "Muchas trabas son de la señal."}], "tip": "Hoy, a un cliente interesado en IPTV, ofrézcale una demo en vez de solo jurar que funciona."}, {"cat": "Gaming y recargas", "icon": "🎮", "badge": "Gamer", "title": "Recargas seguras", "subtitle": "Lección única · Diamantes, Robux y recargas sin errores", "intro": "En recargas el error se paga caro: si manda a la cuenta equivocada, no hay devolución. Un proceso seguro protege su dinero y le da fama de confiable entre los gamers.", "concept": {"term": "Recarga segura", "def": "Una recarga segura es la que se hace confirmando bien el ID/usuario y el monto, y cobrando ANTES de aplicar. Es la regla de oro del gaming: un solo error de ID puede costarle la recarga completa, porque no se recupera."}, "sections": [{"h": "Confirme el ID (repítalo)", "p": "Antes de procesar, repita el ID o usuario completo y pida que confirme: '¿es correcto?'. El error de ID es el más común y el más caro."}, {"h": "Cobre antes de aplicar", "p": "Aunque el cliente esté apurado, nunca aplique antes de que pague. Velocidad sí, pero con el comprobante en mano."}, {"h": "Con menores, hable con el adulto", "p": "Si quien pide es un niño, confirme con el adulto que paga. Protege a la tienda y evita pagos sin permiso."}, {"h": "Convierta la recarga en cliente fijo", "p": "Después de recargar, ofrezca avisarle de promos y guardar su ID. Así una recarga ocasional se vuelve cliente frecuente."}], "examples": [{"sit": "Cliente: «Recárgame 110 diamantes»", "bien": "¡De una! 💎 Mándeme su ID de Free Fire y confirmamos: 110 diamantes. Apenas valide el pago, le caen al toque.", "mal": "va, mándeme el pago", "why": "Confirme ID y monto antes de cobrar."}, {"sit": "Cliente: «URGENTE, me queda poco de la promo!!»", "bien": "¡Vamos contra el reloj! ⚡ Pásame tu ID y el comprobante y te lo aplico en minutos.", "mal": "ya va, te lo aplico, después me pagás", "why": "Rápido sí, pero nunca aplicar antes del pago."}], "scenarios": [{"client": "Cliente da su ID: «28xxxxxxx»", "options": [{"t": "Confirmo su ID: 28xxxxxxx ¿es correcto? Dígame 'sí' y lo aplico apenas valide el pago.", "ok": true}, {"t": "Ok, ya está.", "ok": false}, {"t": "Listo, se lo aplico.", "ok": false}], "explain": "Repetir el ID y confirmar evita el error más caro: recargar a la cuenta equivocada."}, {"client": "Escribe un niño: «Soy yo, tengo 12, mi mami me da permiso»", "options": [{"t": "¡Qué bien que juegues! Para la recarga necesito confirmarlo con tu mamá, que hace el pago. ¿Le pasas el teléfono?", "ok": true}, {"t": "Va, recárgale.", "ok": false}, {"t": "No te atiendo por ser menor.", "ok": false}], "explain": "Con menores, confirme con el adulto que paga."}], "quiz": [{"q": "Antes de procesar una recarga:", "opts": ["Aplicar de una", "Repetir el ID y pedir confirmación", "Confiar en que está bien"], "correct": 1, "explain": "El error de ID no se recupera."}, {"q": "¿Cuándo se aplica la recarga?", "opts": ["Antes de pagar, por confianza", "Después de confirmar el pago", "A medias"], "correct": 1, "explain": "Siempre cobre antes de aplicar."}, {"q": "Si quien pide es un menor:", "opts": ["Recargar de una", "Confirmar con el adulto que paga", "Ignorarlo"], "correct": 1, "explain": "Protege a todos."}, {"q": "Tras una recarga, para fidelizar:", "opts": ["Decir 'de nada' y ya", "Ofrecer avisarle de promos y guardar su ID", "Nada"], "correct": 1, "explain": "Lo vuelve cliente frecuente."}], "tip": "Hoy, en su próxima recarga, repita el ID completo y pida confirmación antes de aplicar."}, {"cat": "Marketing y WhatsApp", "icon": "📣", "badge": "Marketing", "title": "Publicar para vender", "subtitle": "Lección única · Estados, canal e imagen de marca que traen clientes", "intro": "Publicar bien hace que los clientes le escriban solos. Aquí aprende a hacer estados, ofertas e imagen de marca que sí generan mensajes, sin parecer spam.", "concept": {"term": "Marketing", "def": "Marketing es todo lo que hace para que la gente lo conozca, confíe y le compre, sin que usted tenga que perseguirla. En WhatsApp son sus estados, su canal, sus ofertas y la imagen de su marca."}, "sections": [{"h": "Beneficio claro + llamado a la acción", "p": "Una publicación vende cuando dice un beneficio claro y le dice a la gente QUÉ HACER: 'escríbeme'. Sin ese 'escríbeme', la gente ve y no actúa."}, {"h": "Una oferta protagonista, no una lista", "p": "Publique UNA oferta clara, no 20 plataformas amontonadas. Lo claro se actúa; lo amontonado nadie lo lee."}, {"h": "Mezcle contenido útil con ofertas", "p": "En el estado o canal, suba también cosas útiles: estrenos, tips, 'recomendación del día'. La gente lo sigue porque le sirve, y de paso compra."}, {"h": "Imagen limpia y letra legible", "p": "Una imagen con sus colores, su logo y poco texto se ve seria. Letra grande para que hasta una persona mayor la lea. Si no se lee, no vende."}], "examples": [{"sit": "Anunciar Netflix en el estado", "bien": "🎬 Netflix desde Lps. ___ · entrega al toque · ¿lo querés hoy? Escribime 👇", "mal": "NETFLIX DISPONIBLE PRECIOS BARATOS", "why": "Beneficio claro + 'escríbeme'; las mayúsculas frías no enganchan."}, {"sit": "Un cliente quedó feliz con la IPTV", "bien": "Don Marco no sabía ver el fútbol y le instalamos la IPTV; ahora no se pierde un partido ⚽ ¿Querés lo mismo? Escribime.", "mal": "(no hace nada con eso)", "why": "Una historia real de cliente feliz vende sola; desaprovecharla es perder marketing gratis."}], "scenarios": [{"client": "Quiere subir algo al estado para vender. ¿Qué conviene?", "options": [{"t": "Una recomendación del día con un 'escríbeme si la querés ver hoy'.", "ok": true}, {"t": "La lista de 20 precios todos los días.", "ok": false}, {"t": "Nada, esperar que escriban.", "ok": false}], "explain": "Contenido útil + llamado a escribir genera mensajes."}, {"client": "Va a hacer una promo. ¿Cómo la publica?", "options": [{"t": "Una oferta protagonista clara: 'Combo Netflix + Disney Lps. ___'.", "ok": true}, {"t": "Las 20 plataformas con todos los precios juntos.", "ok": false}, {"t": "Puro texto en mayúsculas.", "ok": false}], "explain": "Una oferta clara vende más que una lista enorme."}], "quiz": [{"q": "¿Qué hace que una publicación venda?", "opts": ["Muchos colores", "Beneficio claro y un 'escríbeme'", "Mayúsculas"], "correct": 1, "explain": "Beneficio + llamado a la acción."}, {"q": "Lo mejor en una publicación es:", "opts": ["20 ofertas juntas", "Una oferta protagonista clara", "Solo el precio"], "correct": 1, "explain": "Lo claro se actúa."}, {"q": "Para mantener vivo el canal/estado:", "opts": ["Solo precios", "Mezclar contenido útil con ofertas", "No subir nada"], "correct": 1, "explain": "Contenido útil atrae y retiene."}, {"q": "La imagen de marca debe ser:", "opts": ["Llena de fotos y colores", "Limpia, con sus colores y letra legible", "Sin logo"], "correct": 1, "explain": "Limpia y legible da confianza."}], "tip": "Hoy publique un estado con un beneficio claro y un 'escríbeme', no solo la lista de precios."}, {"cat": "Motivación y mentalidad", "icon": "🚀", "badge": "Mentalidad", "title": "Mentalidad de vendedor", "subtitle": "Lección 1 · Constancia, actitud y verse como empresa", "intro": "Vender bien no es solo técnica: es mentalidad. La forma en que usted piensa y se ve a sí misma se nota en cómo vende. Aquí trabaja la cabeza, que es donde empieza todo.", "concept": {"term": "Mentalidad de crecimiento", "def": "Es creer que sus resultados pueden mejorar con esfuerzo y constancia, no que 'ya es lo que es'. Un vendedor con esta mentalidad ve los días flojos y los 'no' como parte del juego, no como fracasos."}, "sections": [{"h": "La constancia vence al talento", "p": "Vender es de constancia, no de suerte. En los días flojos es cuando más importa hacer la rutina: revisar vencimientos, escribir a unos clientes, subir un estado. Lo que se hace todos los días sostiene el negocio."}, {"h": "Verse como empresa, no como 'algo chiquito'", "p": "Cómo se ve a sí misma se nota al vender. Pensar 'es solo cuentitas' la hace vender barato y disculparse por cobrar. Verse como Sublicuentas —con clientes, soporte y sistema propio— la hace cobrar lo justo con seguridad."}, {"h": "El 'no' no es personal", "p": "Un cliente que dice no hoy puede comprar mañana. No se lo tome personal: siga, dé seguimiento amable, y enfóquese en el siguiente."}, {"h": "Aprenda de cada reclamo", "p": "Una queja bien vista es información gratis: le dice qué arreglar para que no vuelva a pasar. Molestarse con quien reclama desperdicia esa lección."}], "examples": [{"sit": "Día lento, pocas ventas", "bien": "Aunque esté flojo, hago mi rutina: reviso vencimientos, escribo a 5 clientes y subo un estado.", "mal": "hoy no se vendió, ni modo", "why": "La rutina en días flojos es lo que sostiene el negocio."}, {"sit": "Pensando en el negocio", "bien": "Somos Sublicuentas, con 800 clientes y soporte de verdad; cobro lo justo con seguridad.", "mal": "es que esto es chiquito", "why": "Verse como empresa la hace vender con valor."}], "scenarios": [{"client": "Es un día lento y no ha vendido nada. ¿Qué hace?", "options": [{"t": "Hago mi rutina igual: vencimientos, contactos y un estado.", "ok": true}, {"t": "Me rindo por hoy.", "ok": false}, {"t": "Espero a que mañana sea mejor.", "ok": false}], "explain": "La constancia diaria, aunque sea poquito, gana a largo plazo."}, {"client": "Un cliente le dice que no. ¿Qué actitud conviene?", "options": [{"t": "No tomarlo personal, dar seguimiento amable y seguir.", "ok": true}, {"t": "Sentirse mal todo el día.", "ok": false}, {"t": "Reclamarle por no comprar.", "ok": false}], "explain": "El 'no' es parte del juego; mañana puede ser sí."}], "quiz": [{"q": "¿Qué sostiene el negocio en días flojos?", "opts": ["La suerte", "Hacer la rutina igual", "No hacer nada"], "correct": 1, "explain": "Constancia."}, {"q": "Verse como empresa (no 'cuentitas') ayuda a:", "opts": ["Vender barato", "Cobrar lo justo con seguridad", "Disculparse por cobrar"], "correct": 1, "explain": "La seguridad vende."}, {"q": "Un 'no' del cliente significa:", "opts": ["Que usted falló como persona", "Que hoy no, quizá mañana sí", "Que debe rendirse"], "correct": 1, "explain": "No es personal."}, {"q": "Una queja, bien vista, es:", "opts": ["Un ataque", "Información gratis para mejorar", "Algo que ignorar"], "correct": 1, "explain": "Le dice qué arreglar."}], "tip": "Hoy haga su rutina completa (vencimientos, contactos, un estado) aunque el día esté flojo."}, {"cat": "Motivación y mentalidad", "icon": "🚀", "badge": "Mentalidad", "title": "Crisis y reputación", "subtitle": "Lección 2 · Mantener la cabeza fría y cuidar el nombre", "intro": "Cuando algo falla o un cliente reclama en público, su reacción define si pierde o gana. Aquí aprende a manejar crisis con calma y a cuidar la reputación, que es su mejor negocio.", "concept": {"term": "Reputación", "def": "Es lo que la gente dice y piensa de su negocio. Se construye con clientes contentos y se daña con un mal manejo de un problema. En un negocio de clientes que vuelven y recomiendan, la reputación vale más que una venta."}, "sections": [{"h": "En crisis, su calma calma", "p": "Cuando se cae un servidor y llueven reclamos, respire y vaya por orden: avise a todos que hay falla, atienda de a uno con calma, resuelva lo que sí puede ya. El cliente se calma cuando lo ve tranquila y con un plan."}, {"h": "Comunique en las fallas generales", "p": "Si Netflix o la IPTV se cae para todos, avise con calma: 'es una falla general, ya estamos al tanto'. El silencio multiplica el pánico."}, {"h": "Las quejas públicas se llevan a privado", "p": "Si comentan algo feo en su página, responda calmado y lleve el problema a privado. Pelear en público hace que todos vean el drama."}, {"h": "La confianza por encima de la venta rápida", "p": "No venda algo que sabe que va a fallar, aunque gane hoy. Un cliente engañado le cuesta muchos mañana."}], "examples": [{"sit": "Se cayó un servidor y llueven reclamos", "bien": "Respiro y aviso a todos: hay una falla general, ya la estamos atendiendo y les aviso apenas se normalice. Gracias por la paciencia 🙏", "mal": "(me estreso y respondo mal)", "why": "La calma y un plan calman a los clientes; el estrés empeora todo."}, {"sit": "Comentan en su página: «esta tienda es una estafa»", "bien": "Lamento su mala experiencia 🙏 No tengo registro de su caso, escríbame al privado y lo resolvemos de una.", "mal": "usted está mintiendo", "why": "En público calma; el problema se arregla en privado."}], "scenarios": [{"client": "Cliente VIP de 2 años, molesto: «me fallaste, ya no compro»", "options": [{"t": "Usted es de mis clientes más importantes y me duele que pasara. Permítame arreglarlo ya y le dejo un detalle por la molestia.", "ok": true}, {"t": "Bueno, usted decide.", "ok": false}, {"t": "Le regalo todo gratis de por vida.", "ok": false}], "explain": "A un cliente valioso: reconocer, resolver y un detalle; ni dejarlo ir ni regalar todo."}, {"client": "Su proveedor de IPTV está caído hace horas", "options": [{"t": "Aviso a los clientes que hay falla, compenso con días si tarda y busco un proveedor de respaldo.", "ok": true}, {"t": "Les digo que aguanten y ya.", "ok": false}, {"t": "Apago el teléfono.", "ok": false}], "explain": "Comunicar, compensar y buscar respaldo cuida la reputación."}], "quiz": [{"q": "En una crisis con muchos reclamos:", "opts": ["Estresarse y responder mal", "Mantener la calma, avisar y resolver por orden", "Apagar el teléfono"], "correct": 1, "explain": "Su calma calma a los clientes."}, {"q": "Una queja pública fuerte se maneja:", "opts": ["Discutiendo en público", "Con calma y llevándola a privado", "Borrando y bloqueando"], "correct": 1, "explain": "Privado para resolver, público con calma."}, {"q": "¿Qué cuida el negocio a largo plazo?", "opts": ["Vender lo que sea hoy", "Priorizar la confianza del cliente", "No pensar en mañana"], "correct": 1, "explain": "La reputación es el negocio."}, {"q": "Si su proveedor falla por horas:", "opts": ["Solo decir 'aguanten'", "Avisar, compensar y buscar respaldo", "Ignorar a todos"], "correct": 1, "explain": "Comunicar y respaldar cuida el nombre."}], "tip": "Hoy, si algo falla, antes de responder respire y piense: aviso, atiendo por orden, resuelvo lo que sí puedo."}, {"cat": "Herramientas e IA", "icon": "🤖", "badge": "Herramientas", "title": "Usar la IA y tus herramientas", "subtitle": "Lección única · Ahorrar tiempo sin romper lo que funciona", "intro": "Las herramientas (IA, bot, panel) son para ayudarle a vender más rápido y con menos esfuerzo. Aquí aprende a usarlas a su favor y a no romper lo que ya funciona.", "concept": {"term": "Automatización", "def": "Automatizar es dejar que una herramienta haga sola las tareas repetidas (recordatorios, respuestas comunes, resúmenes), para que usted dedique su tiempo a vender y atender lo importante. La herramienta acelera; el criterio lo pone usted."}, "sections": [{"h": "La IA para lo repetido", "p": "Use la IA para lo que se repite: armar recordatorios de cobro, responder preguntas comunes, resumir sus números. Usted revisa y manda. No para reemplazar su criterio, sino para ir más rápido."}, {"h": "Cuide los datos de sus clientes", "p": "Nunca deje su base de datos abierta a cualquiera ni pegue las claves a la vista 'para que jale rápido'. Eso es como dejar la tienda sin llave. Las reglas de seguridad protegen a sus clientes."}, {"h": "No rompa lo que funciona", "p": "Si solo va a cambiar un color o algo de cómo se ve, toque únicamente eso, no la lógica que hace el cobro o la entrega. Pruebe los cambios antes de publicar."}, {"h": "Use su panel para decidir", "p": "Un panel donde ve dinero, clientes y vencimientos de un vistazo le ayuda a decidir el día sin adivinar. Lo que se mide, se mejora."}], "examples": [{"sit": "Tiene que mandar 15 recordatorios de cobro", "bien": "Le pido a la IA un recordatorio amable de renovación, le cambio el nombre y lo mando. En minutos.", "mal": "escribo cada uno desde cero", "why": "La IA acelera lo repetido; usted personaliza y manda."}, {"sit": "Quiere que la web funcione rápido", "bien": "Pongo reglas para que solo entre quien debe, sin dejar claves a la vista.", "mal": "pongo todo abierto para que jale", "why": "Abierto = i let current=null;
let pin='';
let activeCat='Todos';
let selectedAnswer=null;
let progress=JSON.parse(localStorage.getItem('aca_focus_progress')||'{}');
let pins=JSON.parse(localStorage.getItem('aca_focus_pins')||'{}');
let settings=JSON.parse(localStorage.getItem('aca_focus_settings')||'{}');
function save(){localStorage.setItem('aca_focus_progress',JSON.stringify(progress));localStorage.setItem('aca_focus_pins',JSON.stringify(pins));localStorage.setItem('aca_focus_settings',JSON.stringify(settings));if(current)cloudPush(current);}
function ensureSettings(user){settings[user]=settings[user]||{avatar:USERS[user].defaultAvatar,mascot:0};return settings[user];}
function getAvatar(user){const s=ensureSettings(user);return AVATARS[s.avatar]||AVATARS[USERS[user].defaultAvatar];}
function getMascot(user){const s=ensureSettings(user);return MASCOTS[s.mascot]||MASCOTS[0];}
function goHome(){sessionStorage.setItem('sublichat_skip_intro','1');window.location.href='./index.html#inicio';}
function show(id){document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');document.getElementById('topSettings').style.display=(id==='dash'||id==='lesson'||id==='settings')?'grid':'none';window.scrollTo(0,0);}
function toast(t){const el=document.getElementById('toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1800);}
function celebrate(){const c=document.getElementById('confetti');c.innerHTML='';['⭐','💎','🎉','🚀','🏆','✨'].forEach((e,idx)=>{for(let i=0;i<5;i++){const s=document.createElement('i');s.textContent=e;s.style.left=(Math.random()*100)+'%';s.style.fontSize=(18+Math.random()*18)+'px';s.style.animationDelay=(Math.random()*0.4)+'s';c.appendChild(s);}});setTimeout(()=>c.innerHTML='',2100);}
function renderUsers(){
  const wrap=document.getElementById('usersList');
  wrap.innerHTML=Object.keys(USERS).map(id=>{const av=getAvatar(id);return `<button class="user" data-user="${id}" type="button"><span class="avatar" style="background:${av.bg}">${av.emoji}</span><span class="uinfo"><span class="role">Agente de ventas</span><h3>${USERS[id].name}</h3><small>Ruta comercial · avatar personal · acceso por PIN</small></span><span class="go">›</span></button>`;}).join('');
  wrap.querySelectorAll('.user').forEach(btn=>btn.addEventListener('click',()=>selectUser(btn.dataset.user)));
}
async function selectUser(user){current=user;pin='';let av=getAvatar(current);document.getElementById('pinAvatar').textContent=av.emoji;document.getElementById('pinAvatar').style.background=av.bg;document.getElementById('pinName').textContent=USERS[current].name;document.getElementById('pinHelp').textContent='Verificando…';paintDots();show('pin');await cloudPull(current);av=getAvatar(current);document.getElementById('pinAvatar').textContent=av.emoji;document.getElementById('pinAvatar').style.background=av.bg;document.getElementById('pinHelp').textContent=pins[current]?'Ingrese su PIN':'Cree su PIN nuevo de 4 dígitos';}
document.getElementById('homeBack').addEventListener('click',()=>{if(document.getElementById('select').classList.contains('active')||document.getElementById('dash').classList.contains('active'))goHome();else if(document.getElementById('pin').classList.contains('active'))show('select');else{renderDash();show('dash');}});
document.getElementById('topSettings').addEventListener('click',()=>{renderSettings();show('settings');});
function paintDots(){document.querySelectorAll('#dots .dot').forEach((d,i)=>d.classList.toggle('on',i<pin.length));}
const keys=document.getElementById('keys');
['1','2','3','4','5','6','7','8','9','Borrar','0','Volver'].forEach(k=>{const b=document.createElement('button'); b.type='button'; b.textContent=k; b.className=isNaN(k)?'fn':'';b.addEventListener('click',()=>press(k)); keys.appendChild(b);});
function press(k){if(k==='Volver'){show('select');return;}if(k==='Borrar'){pin=pin.slice(0,-1);paintDots();return;}if(pin.length<4){pin+=k;paintDots();}if(pin.length===4){if(!pins[current]){pins[current]=pin;save();toast('PIN guardado');renderDash();show('dash');}else if(pin===pins[current]){renderDash();show('dash');}else{pin='';paintDots();toast('PIN incorrecto');}}}
function doneList(){return progress[current]||[];}
function pct(){return Math.round((doneList().length/COURSES.length)*100);}
function unlockedIndex(){return doneList().length;}
function xp(){return doneList().length*50;}
function earnedBadges(){const done=doneList();const base=[];if(done.length>=1)base.push('Primer paso');if(done.length>=5)base.push('Disciplina');if(done.length>=12)base.push('Agente Pro');if(done.length>=25)base.push('Cierre');if(done.length>=50)base.push('Supervisor');if(done.length>=80)base.push('Máquina de ventas');if(done.length>=COURSES.length)base.push('Leyenda');return [...new Set([...base,...COURSES.filter((c,i)=>done.includes(i)&&((i+1)%10===0)).map(c=>c.badge)])];}
function categories(){return ['Todos',...Array.from(new Set(COURSES.map(c=>c.cat)))];}
function renderDash(){
  const done=doneList(); const av=getAvatar(current); const mascot=getMascot(current); const cats=categories();
  const visible=COURSES.map((c,i)=>({...c,i})).filter(c=>activeCat==='Todos'||c.cat===activeCat);
  const next=COURSES[unlockedIndex()]||COURSES[COURSES.length-1];
  document.getElementById('dash').innerHTML=`<div class="dashHead"><span class="avatar" style="background:${av.bg}">${av.emoji}</span><div style="flex:1"><h2>Hola, ${USERS[current].name}</h2><p>${pct()}% completado · ${xp()} XP · ${COURSES.length} cursos</p><div class="xp"><i style="width:${pct()}%"></i></div></div></div>
  <div class="stats"><div class="stat"><b>📚 ${done.length}</b><span>Cursos</span></div><div class="stat"><b>⭐ ${xp()}</b><span>XP</span></div><div class="stat"><b>🏆 ${earnedBadges().length}</b><span>Logros</span></div></div>
  <div class="coach-card"><div class="coach-emoji">${mascot.emoji}</div><div><b>${mascot.name}</b><p>${mascot.line}</p></div></div>
  <div class="mission-card"><h3>🎯 Misión de hoy</h3><ul><li>Complete 1 curso: <b>${next.title}</b>.</li><li>Escriba una práctica libre antes de ver la respuesta modelo.</li><li>Use un mensaje aprendido con un cliente real.</li></ul></div>
  <div class="achievement-card"><div class="achievement-title">🏅 Logros de superación</div><div class="badges">${['Primer paso','Disciplina','Agente Pro','Cierre','Renovador','Soporte','Marketing','Caso Pro','Supervisor','Máquina de ventas','Leyenda'].map(b=>`<span class="badge-pill ${earnedBadges().includes(b)?'on':''}">${earnedBadges().includes(b)?'✅':'🔒'} ${b}</span>`).join('')}</div></div>
  <div class="module-filter">${cats.map(c=>`<button type="button" class="filter-btn ${c===activeCat?'on':''}" data-cat="${c}">${c}</button>`).join('')}</div>
  <div class="section">Ruta interactiva · desbloqueo por niveles · ${visible.length} cursos en esta vista</div>
  <div class="path">${visible.map(c=>`<button type="button" class="node ${done.includes(c.i)?'done':''} ${c.i===unlockedIndex()?'current':''} ${c.i>unlockedIndex()?'locked':''}" data-i="${c.i}"><div class="bubble">${done.includes(c.i)?'✅':c.icon}</div><div class="info"><b>${c.title}</b><small>Nivel ${c.i+1} · ${c.subtitle}</small><span class="cat">${c.cat}</span></div></button>`).join('')}</div>
  <button type="button" class="ghost" id="openSettings">⚙️ Ajustes de avatar y mascota</button><button type="button" class="ghost" id="changeAgent">Cambiar agente</button><button type="button" class="ghost" id="backInicio">Volver a inicio</button>`;
  document.querySelectorAll('.filter-btn').forEach(b=>b.addEventListener('click',()=>{activeCat=b.dataset.cat;renderDash();}));
  document.querySelectorAll('.node').forEach(n=>n.addEventListener('click',()=>{const i=Number(n.dataset.i);if(i>unlockedIndex()){toast('Complete el nivel anterior');return;}renderLesson(i);show('lesson');}));
  document.getElementById('openSettings').addEventListener('click',()=>{renderSettings();show('settings');});
  document.getElementById('changeAgent').addEventListener('click',()=>show('select'));
  document.getElementById('backInicio').addEventListener('click',goHome);
}
function enableComplete(){const b=document.getElementById('completeLevel');if(b)b.disabled=false;}
function renderLesson(i){
  const c=COURSES[i]; const done=doneList().includes(i); const mascot=getMascot(current);
  const br=s=>String(s).replace(/\n/g,'<br>');
  document.getElementById('lesson').innerHTML=`<div class="lesson"><div class="meta">Nivel ${i+1} · ${c.cat}</div><div class="bigicon">${c.icon}</div><h2>${c.title}</h2><div class="type-tag">${c.subtitle}</div>
    <div class="coach-card"><div class="coach-emoji">${mascot.emoji}</div><div><b>${mascot.name} dice:</b><p>${mascot.line}</p></div></div>
    <div class="why-card"><b>📌 Por qué importa:</b> ${c.intro}</div>
    <div class="exercise-card"><h3>📖 ¿Qué es ${c.concept.term}?</h3><div class="concept">${c.concept.def}</div></div>
    <div class="exercise-card"><h3>📚 Cómo se hace</h3>${c.sections.map(s=>`<div class="sec"><h4>${s.h}</h4><p>${br(s.p)}</p></div>`).join('')}</div>
    <div class="exercise-card"><h3>💬 Ejemplos reales</h3>${c.examples.map(e=>`<div class="exmp"><div class="exmp-sit">${e.sit}</div><div class="ex-good"><span class="ex-tag">✅ Así sí</span><div>${e.bien}</div></div><div class="ex-bad"><span class="ex-tag">❌ Así no</span><div>${e.mal}</div></div><div class="why-line">💡 ${e.why}</div></div>`).join('')}</div>
    <div class="exercise-card"><h3>🎮 ¿Cómo responderías?</h3><p>Le escribe un cliente. Toque la mejor respuesta.</p>${c.scenarios.map((s,si)=>`<div class="scn" data-si="${si}"><div class="bubble-cli2">${s.client}</div><div class="choices">${s.options.map((o,oi)=>`<button type="button" class="choice" data-si="${si}" data-oi="${oi}">${o.t}</button>`).join('')}</div><div class="scn-exp" id="scnexp${si}"></div></div>`).join('')}</div>
    <div class="exercise-card"><h3>🧠 Quiz del nivel</h3>${c.quiz.map((q,qi)=>`<div class="q-item" data-qi="${qi}"><p class="q-text">${qi+1}. ${q.q}</p><div class="choices">${q.opts.map((o,oi)=>`<button type="button" class="choice" data-qi="${qi}" data-oi="${oi}">${o}</button>`).join('')}</div><div class="q-exp" id="qexp${qi}"></div></div>`).join('')}<div class="feedback" id="quizfb">Conteste las ${c.quiz.length} preguntas para completar el nivel.</div></div>
    <div class="recuerda"><b>💡 Consejo para hoy:</b> ${c.tip}</div>
    <button type="button" class="primary" id="completeLevel" ${done?'':'disabled'}> ${done?'Nivel completado · volver a ruta':'Completar nivel'}</button>
    <button type="button" class="ghost" id="backRoute">Volver a ruta</button></div>`;
  if(done) enableComplete();
  // Escenarios (práctica)
  c.scenarios.forEach((s,si)=>{
    let ans=false;
    document.querySelectorAll('.scn[data-si="'+si+'"] .choice').forEach(btn=>{
      btn.addEventListener('click',()=>{
        if(ans)return; ans=true; const oi=+btn.dataset.oi;
        document.querySelectorAll('.scn[data-si="'+si+'"] .choice').forEach((x,xi)=>{x.disabled=true; if(s.options[xi].ok)x.classList.add('good');});
        if(!s.options[oi].ok) btn.classList.add('bad');
        document.getElementById('scnexp'+si).innerHTML=(s.options[oi].ok?'✅ ¡Bien! ':'❌ ')+s.explain;
      });
    });
  });
  // Quiz (completa el nivel)
  const total=c.quiz.length; let answered=0, correct=0;
  c.quiz.forEach((q,qi)=>{
    let ans=false;
    document.querySelectorAll('.q-item[data-qi="'+qi+'"] .choice').forEach(btn=>{
      btn.addEventListener('click',()=>{
        if(ans)return; ans=true; const oi=+btn.dataset.oi; const ok=oi===q.correct;
        document.querySelectorAll('.q-item[data-qi="'+qi+'"] .choice').forEach((x,xi)=>{x.disabled=true; if(xi===q.correct)x.classList.add('good');});
        if(!ok) btn.classList.add('bad');
        document.getElementById('qexp'+qi).innerHTML=(ok?'✅ ':'❌ ')+q.explain;
        answered++; if(ok)correct++;
        if(answered>=total){
          const pct=Math.round(correct/total*100);
          document.getElementById('quizfb').innerHTML='<div class="grade-box">'+(pct>=70?'🏆':'📚')+' Nota: '+correct+'/'+total+' ('+pct+'%). '+(pct>=70?'¡Aprobado! Ya puede completar el nivel.':'Puede completar igual, pero repáselo para dominarlo.')+'</div>';
          enableComplete(); if(pct>=70)celebrate();
        } else { document.getElementById('quizfb').textContent='Va '+answered+'/'+total+'…'; }
      });
    });
  });
  document.getElementById('completeLevel').addEventListener('click',()=>complete(i));
  document.getElementById('backRoute').addEventListener('click',()=>{renderDash();show('dash');});
}
function renderSettings(){
  const s=ensureSettings(current); const av=getAvatar(current); const mascot=getMascot(current);
  document.getElementById('settings').innerHTML=`<div class="settings-card"><h2>⚙️ Ajustes de ${USERS[current].name}</h2><p>Cambie avatar y mascota coach. Se guarda solo para este agente.</p>
  <div class="coach-card"><div class="coach-emoji">${av.emoji}</div><div><b>Avatar actual</b><p>${av.name} · Coach: ${mascot.name}</p></div></div>
  <div class="option-title">Avatar del agente</div><div class="avatar-grid">${AVATARS.map((a,i)=>`<button type="button" class="avatar-tile ${s.avatar===i?'on':''}" data-avatar="${i}"><span class="av-emoji" style="background:${a.bg}">${a.emoji}</span><small>${a.name}</small></button>`).join('')}</div>
  <div class="option-title">Mascota coach</div><div class="mascot-grid">${MASCOTS.map((m,i)=>`<button type="button" class="mascot-tile ${s.mascot===i?'on':''}" data-mascot="${i}"><span class="mascot-emoji">${m.emoji}</span><small>${m.name}</small></button>`).join('')}</div>
  <button type="button" class="primary" id="saveSettings">Guardar ajustes</button><button type="button" class="ghost" id="settingsBack">Volver a ruta</button></div>`;
  document.querySelectorAll('[data-avatar]').forEach(b=>b.addEventListener('click',()=>{settings[current].avatar=Number(b.dataset.avatar);save();renderSettings();}));
  document.querySelectorAll('[data-mascot]').forEach(b=>b.addEventListener('click',()=>{settings[current].mascot=Number(b.dataset.mascot);save();renderSettings();}));
  document.getElementById('saveSettings').addEventListener('click',()=>{save();renderUsers();toast('Ajustes guardados');renderDash();show('dash');});
  document.getElementById('settingsBack').addEventListener('click',()=>{renderDash();show('dash');});
}
function complete(i){
  progress[current]=progress[current]||[];
  if(!progress[current].includes(i)){progress[current].push(i);progress[current].sort((a,b)=>a-b);save();celebrate();const msg=(i+1)%10===0?'🏆 Logro desbloqueado: '+COURSES[i].badge:'+50 XP · nuevo nivel desbloqueado';toast(msg);}
  renderDash();show('dash');
}
renderUsers();
</script>
</body>
