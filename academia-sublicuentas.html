<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"><title>Aula de ventas</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet"><style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}html,body{min-height:100%;font-family:'Nunito',system-ui,sans-serif;color:#14213D;background:#F3F8FF}body{background:radial-gradient(520px 330px at 0% 0%,#FFF1A8 0%,transparent 55%),radial-gradient(560px 340px at 100% 0%,#B9F2FF 0%,transparent 60%),linear-gradient(180deg,#F5FCFF,#F7F4FF 64%,#F0F8FF)}button{font:inherit;border:0;cursor:pointer}.app{max-width:520px;margin:0 auto;padding:16px 18px 96px}.top{display:flex;align-items:center;gap:12px;margin-bottom:15px}.back{width:50px;height:50px;border-radius:18px;background:#fff;box-shadow:0 12px 28px rgba(34,67,118,.12);font-size:28px;color:#14213D}.title h1{font-family:'Fredoka';font-size:29px;line-height:1;letter-spacing:-.7px}.title p{font-size:14px;color:#6E7D96;font-weight:900;margin-top:4px}.hero{border-radius:32px;padding:21px 20px;background:linear-gradient(135deg,#126CFF,#24C7FF);box-shadow:0 18px 42px rgba(18,108,255,.22);color:white;position:relative;overflow:hidden;margin-bottom:15px}.hero:after{content:'🧠';position:absolute;right:12px;bottom:-18px;font-size:92px;opacity:.18}.badge{display:inline-flex;background:rgba(255,255,255,.22);border-radius:999px;padding:7px 11px;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.12em}.hero h2{font-family:'Fredoka';font-size:35px;line-height:.98;margin-top:13px;max-width:310px}.hero p{font-size:14px;line-height:1.35;font-weight:800;opacity:.92;margin-top:10px;max-width:320px}.users{display:grid;gap:13px}.user{display:flex;align-items:center;gap:14px;background:#fff;border-radius:28px;padding:14px;min-height:108px;box-shadow:0 16px 36px rgba(34,67,118,.10)}.avatar{width:72px;height:72px;border-radius:26px;display:grid;place-items:center;font-size:42px;box-shadow:inset 0 1px rgba(255,255,255,.5),0 10px 24px rgba(34,67,118,.10)}.libni .avatar{background:linear-gradient(135deg,#FFE66D,#FFB44D)}.naara .avatar{background:linear-gradient(135deg,#8BF5D2,#35D6B2)}.uinfo{flex:1}.role{font-size:10px;font-weight:900;letter-spacing:.16em;text-transform:uppercase;color:#7B89A2}.user h3{font-family:'Fredoka';font-size:27px;line-height:1;margin-top:4px}.user small{display:block;color:#70809A;font-size:13px;font-weight:900;margin-top:6px}.go{font-size:32px;color:#90A2B9}.panel{display:none}.panel.active{display:block}.pinbox{background:#fff;border-radius:30px;padding:22px;box-shadow:0 16px 36px rgba(34,67,118,.10);text-align:center}.pinavatar{width:80px;height:80px;border-radius:28px;margin:0 auto 12px;display:grid;place-items:center;font-size:44px;background:linear-gradient(135deg,#FFE66D,#FFB44D)}.pinbox h2{font-family:'Fredoka';font-size:28px}.pinbox p{color:#71809A;font-weight:900;margin-top:4px}.dots{display:flex;justify-content:center;gap:12px;margin:18px 0}.dot{width:16px;height:16px;border-radius:50%;background:#DCE9F6}.dot.on{background:#16A8FF}.keys{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.keys button{height:58px;border-radius:21px;background:#EFF6FF;color:#14213D;font-family:'Fredoka';font-size:24px}.keys .fn{font-size:13px}.dashHead{display:flex;align-items:center;gap:13px;background:#fff;border-radius:30px;padding:15px;box-shadow:0 16px 36px rgba(34,67,118,.10);margin-bottom:14px}.dashHead .avatar{width:64px;height:64px;font-size:36px}.dashHead h2{font-family:'Fredoka';font-size:26px}.xp{height:12px;background:#EAF3FC;border-radius:999px;margin-top:8px;overflow:hidden}.xp i{display:block;height:100%;width:0;background:linear-gradient(90deg,#FFE66D,#35D6B2);border-radius:999px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:15px}.stat{background:#fff;border-radius:24px;padding:13px;text-align:center;box-shadow:0 13px 30px rgba(34,67,118,.08)}.stat b{display:block;font-family:'Fredoka';font-size:24px}.stat span{font-size:11px;font-weight:900;color:#7B89A2}.section{font-size:13px;font-weight:900;color:#6E7D96;text-transform:uppercase;letter-spacing:.14em;margin:8px 2px 12px}.path{position:relative;padding:8px 0 18px}.path:before{content:'';position:absolute;left:50%;top:15px;bottom:15px;width:8px;border-radius:999px;background:linear-gradient(#FFE66D,#35D6B2,#24C7FF);opacity:.25;transform:translateX(-50%)}.node{position:relative;display:flex;align-items:center;min-height:82px;margin:8px 0}.node:nth-child(odd){justify-content:flex-start;padding-right:40%}.node:nth-child(even){justify-content:flex-end;padding-left:40%}.bubble{width:78px;height:78px;border-radius:29px;display:grid;place-items:center;font-size:34px;background:#fff;box-shadow:0 14px 30px rgba(34,67,118,.12);z-index:2}.done .bubble{background:linear-gradient(135deg,#8BF5D2,#35D6B2)}.locked{opacity:.46}.info{position:absolute;top:50%;transform:translateY(-50%);width:42%;background:#fff;border-radius:20px;padding:10px;box-shadow:0 10px 24px rgba(34,67,118,.08)}.node:nth-child(odd) .info{left:88px}.node:nth-child(even) .info{right:88px}.info b{font-size:12.5px;line-height:1.08}.info small{display:block;color:#7B89A2;font-size:10.5px;font-weight:900;margin-top:4px}.lesson{background:#fff;border-radius:30px;padding:20px;box-shadow:0 16px 36px rgba(34,67,118,.10)}.lesson h2{font-family:'Fredoka';font-size:29px;margin-bottom:10px}.lesson p{color:#5F6F89;font-weight:800;line-height:1.45;margin-bottom:12px}.primary{width:100%;min-height:54px;border-radius:22px;background:#FF3F6E;color:#fff;font-weight:900;font-size:16px;margin-top:10px;box-shadow:0 12px 28px rgba(255,63,110,.22)}.ghost{width:100%;min-height:52px;border-radius:22px;background:#EFF6FF;color:#14213D;font-weight:900;font-size:16px;margin-top:9px}.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#14213D;color:#fff;border-radius:999px;padding:12px 18px;font-weight:900;font-size:13px;opacity:0;pointer-events:none;transition:.25s;z-index:20}.toast.show{opacity:1;bottom:34px}@media(max-width:390px){.app{padding-left:15px;padding-right:15px}.hero h2{font-size:31px}.user h3{font-size:25px}.avatar{width:68px;height:68px}.stats{gap:8px}.node:nth-child(odd){padding-right:36%}.node:nth-child(even){padding-left:36%}.bubble{width:74px;height:74px;border-radius:27px}.node:nth-child(odd) .info{left:82px}.node:nth-child(even) .info{right:82px}.info{width:45%;padding:9px}}
</style></head><body><div class="app"><div class="top"><button class="back" id="homeBack">‹</button><div class="title"><h1>Aula de ventas</h1><p>Entrene, practique y suba nivel</p></div></div><section id="select" class="panel active"><div class="hero"><span class="badge">Academia Sublicuentas</span><h2>Entrene su mente de ventas</h2><p>30 niveles cortos, retos diarios y práctica comercial para vender más sin aburrirse.</p></div><div class="users"><button class="user libni" data-user="libni"><span class="avatar">👩‍💼</span><span class="uinfo"><span class="role">Agente de ventas</span><h3>Libni</h3><small>Ruta comercial · acceso por PIN</small></span><span class="go">›</span></button><button class="user naara" data-user="naara"><span class="avatar">👩‍💼</span><span class="uinfo"><span class="role">Agente de ventas</span><h3>Naara</h3><small>Ruta comercial · acceso por PIN</small></span><span class="go">›</span></button></div></section><section id="pin" class="panel"><div class="pinbox"><div class="pinavatar" id="pinAvatar">👩‍💼</div><h2 id="pinName">Libni</h2><p id="pinHelp">Cree su PIN nuevo de 4 dígitos</p><div class="dots" id="dots"><i class="dot"></i><i class="dot"></i><i class="dot"></i><i class="dot"></i></div><div class="keys" id="keys"></div></div></section><section id="dash" class="panel"></section><section id="lesson" class="panel"></section></div><div class="toast" id="toast"></div><script>
const USERS={libni:{name:'Libni',emoji:'👩‍💼'},naara:{name:'Naara',emoji:'👩‍💼'}};
const LESSONS=[
  ['⚡','Respuesta rápida','Cómo responder en menos de 30 segundos sin sonar robótico.'],
  ['💬','Cierre por WhatsApp','Frases cortas para cobrar y renovar sin presión.'],
  ['🎯','Objeciones de precio','Qué decir cuando el cliente pide rebaja o compara precios.'],
  ['🔥','Renovaciones del día','Cómo recuperar clientes vencidos y subir recompra.'],
  ['🏆','Cliente VIP','Atención premium para clientes frecuentes.'],
  ['📌','Primer contacto','Cómo saludar y detectar qué necesita el cliente.'],
  ['🧾','Orden de entrega','Cómo entregar cuenta, perfil, PIN y reglas sin confundir.'],
  ['🔐','Seguridad de cuentas','Qué decir para evitar cambios de clave o uso indebido.'],
  ['📅','Control de fechas','Cómo hablar de renovación y evitar olvidos.'],
  ['💵','Cobro elegante','Cómo cobrar sin sonar pesado ni desesperado.'],
  ['🎁','Oferta inteligente','Cómo ofrecer combos sin regalar margen.'],
  ['📦','Venta por combo','Cómo subir ticket promedio con Netflix + Prime + Max.'],
  ['🎬','Recomendación de contenido','Cómo vender usando películas, series y estrenos.'],
  ['🎮','Cliente gamer','Cómo hablar con compradores de recargas y juegos.'],
  ['📺','TV digital','Cómo explicar instalación, demo y beneficios.'],
  ['🧠','Memoria de clientes','Cómo recordar preferencias y compras frecuentes.'],
  ['📲','Respuesta corta','Mensajes breves que venden por WhatsApp.'],
  ['🤖','Uso de Subli IA','Cómo pedir ayuda al asistente para cobros y renovaciones.'],
  ['🧩','Caso difícil','Qué hacer cuando el cliente reclama o está molesto.'],
  ['🛠️','Soporte técnico','Guía para resolver acceso, código temporal y app.'],
  ['🚀','Venta express','Cómo cerrar una venta en 3 mensajes.'],
  ['💎','Valor percibido','Cómo justificar precio sin entrar en discusión.'],
  ['📣','Seguimiento','Cómo escribir después de que el cliente no responde.'],
  ['🌟','Fidelización','Cómo convertir compradores en clientes fijos.'],
  ['📊','Lectura de cartera','Cómo entender vencidos, activos y oportunidad diaria.'],
  ['🥇','Prioridad diaria','Qué clientes atender primero para generar más ingresos.'],
  ['🧃','Tono de marca','Cómo sonar como Sublicuentas: claro, amable y seguro.'],
  ['⚽','Cliente deportes','Cómo vender IPTV y partidos sin prometer de más.'],
  ['🧨','Errores que no debe cometer','Qué evitar: exceso de texto, promesas raras y descuentos débiles.'],
  ['👑','Nivel Pro','Rutina diaria para vender, renovar y mantener orden.']
];
let current=null,pin='',progress=JSON.parse(localStorage.getItem('aca_focus_progress')||'{}'),pins=JSON.parse(localStorage.getItem('aca_focus_pins')||'{}');
function save(){localStorage.setItem('aca_focus_progress',JSON.stringify(progress));localStorage.setItem('aca_focus_pins',JSON.stringify(pins))}
function goHome(){sessionStorage.setItem('sublichat_skip_intro','1');location.href='index.html#inicio'}
document.getElementById('homeBack').onclick=goHome;
function show(id){document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');scrollTo(0,0)}
function toast(t){let el=document.getElementById('toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1500)}
document.querySelectorAll('.user').forEach(b=>b.onclick=()=>{current=b.dataset.user;pin='';document.getElementById('pinAvatar').textContent=USERS[current].emoji;document.getElementById('pinAvatar').style.background=current==='naara'?'linear-gradient(135deg,#8BF5D2,#35D6B2)':'linear-gradient(135deg,#FFE66D,#FFB44D)';document.getElementById('pinName').textContent=USERS[current].name;document.getElementById('pinHelp').textContent=pins[current]?'Ingrese su PIN':'Cree su PIN nuevo de 4 dígitos';paintDots();show('pin')});
function paintDots(){document.querySelectorAll('#dots .dot').forEach((d,i)=>d.classList.toggle('on',i<pin.length))}
const keys=document.getElementById('keys');['1','2','3','4','5','6','7','8','9','Borrar','0','Volver'].forEach(k=>{let b=document.createElement('button');b.textContent=k;b.className=isNaN(k)?'fn':'';b.onclick=()=>press(k);keys.appendChild(b)});
function press(k){if(k==='Volver'){show('select');return}if(k==='Borrar'){pin=pin.slice(0,-1);paintDots();return}if(pin.length<4){pin+=k;paintDots()}if(pin.length===4){if(!pins[current]){pins[current]=pin;save();toast('PIN guardado');renderDash();show('dash')}else if(pin===pins[current]){renderDash();show('dash')}else{pin='';paintDots();toast('PIN incorrecto')}}
function pct(){let done=(progress[current]||[]).length;return Math.round((done/LESSONS.length)*100)}
function renderDash(){let done=progress[current]||[];document.getElementById('dash').innerHTML=`<div class="dashHead"><span class="avatar ${current==='naara'?'naara':'libni'}">${USERS[current].emoji}</span><div style="flex:1"><h2>Hola, ${USERS[current].name}</h2><p style="color:#71809A;font-weight:900;font-size:13px">Agente de ventas · ${pct()}% completado</p><div class="xp"><i style="width:${pct()}%"></i></div></div></div><div class="stats"><div class="stat"><b>🔥 ${done.length}</b><span>Racha</span></div><div class="stat"><b>⭐ ${done.length*50}</b><span>XP</span></div><div class="stat"><b>🏆 ${done.length}</b><span>Logros</span></div></div><div class="section">Ruta de aprendizaje · 30 niveles</div><div class="path">${LESSONS.map((l,i)=>`<div class="node ${done.includes(i)?'done':''} ${i>done.length?'locked':''}" data-i="${i}"><div class="bubble">${done.includes(i)?'✅':l[0]}</div><div class="info"><b>${l[1]}</b><small>Nivel ${i+1}</small></div></div>`).join('')}</div><button class="ghost" onclick="show('select')">Cambiar agente</button><button class="ghost" onclick="goHome()">Volver a inicio</button>`;document.querySelectorAll('.node').forEach(n=>n.onclick=()=>{let i=+n.dataset.i;if(i>(progress[current]||[]).length){toast('Complete el nivel anterior');return}renderLesson(i);show('lesson')})}
function renderLesson(i){let l=LESSONS[i];document.getElementById('lesson').innerHTML=`<div class="lesson"><div style="font-size:48px;margin-bottom:8px">${l[0]}</div><h2>${l[1]}</h2><p>${l[2]}</p><p><b>Práctica:</b> escriba una respuesta clara, amable y directa. Use tono de Sublicuentas, precio visible y cierre simple.</p><button class="primary" onclick="complete(${i})">Completar nivel</button><button class="ghost" onclick="renderDash();show('dash')">Volver a ruta</button></div>`}
function complete(i){progress[current]=progress[current]||[];if(!progress[current].includes(i)){progress[current].push(i);save();toast('+50 XP')}renderDash();show('dash')}
</script></body></html>
