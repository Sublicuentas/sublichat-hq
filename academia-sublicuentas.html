function save(){localStorage.setItem('aca_focus_progress',JSON.stringify(progress));localStorage.setItem('aca_focus_pins',JSON.stringify(pins));localStorage.setItem('aca_focus_profiles',JSON.stringify(profiles));}
function avatarObj(user){const p=ensureProfile(user);return AVATARS.find(a=>a.id===p.avatar)||AVATARS[0];}
function mascotObj(user){const p=ensureProfile(user);return MASCOTS.find(m=>m.id===p.mascot)||MASCOTS[0];}
function todayKey(){return new Date().toISOString().slice(0,10)}
function goHome(){sessionStorage.setItem('sublichat_skip_intro','1');window.location.href='./index.html#inicio';}
function activePanel(){return Array.from(document.querySelectorAll('.panel')).find(p=>p.classList.contains('active'))?.id||'select'}
function smartBack(){const p=activePanel(); if(p==='lesson'||p==='settings'){renderDash();show('dash');} else if(p==='pin') show('select'); else goHome();}
document.getElementById('homeBack').addEventListener('click',smartBack);
document.getElementById('topSettings').addEventListener('click',()=>{renderSettings();show('settings');});
function show(id){document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');document.getElementById('topSettings').style.display=(current && (id==='dash'||id==='lesson'||id==='settings'))?'grid':'none';window.scrollTo(0,0);}
function toast(t){const el=document.getElementById('toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1800);}
function renderUsers(){
  document.getElementById('userList').innerHTML=Object.keys(BASE_USERS).map(id=>{const u=BASE_USERS[id], a=avatarObj(id); return `<button class="user" data-user="${id}" type="button"><span class="avatar" style="background:${a.bg}">${a.emoji}</span><span class="uinfo"><span class="role">Agente de ventas</span><h3>${u.name}</h3><small>Ruta comercial · avatar personal · acceso por PIN</small></span><span class="go">›</span></button>`;}).join('');
  document.querySelectorAll('.user').forEach(btn=>btn.addEventListener('click',()=>{
    current=btn.dataset.user; pin='';
    const a=avatarObj(current);
    document.getElementById('pinAvatar').textContent=a.emoji;
    document.getElementById('pinAvatar').style.background=a.bg;
    document.getElementById('pinName').textContent=BASE_USERS[current].name;
    document.getElementById('pinHelp').textContent=pins[current]?'Ingrese su PIN':'Cree su PIN nuevo de 4 dígitos';
    paintDots(); show('pin');
  }));
}
renderUsers();
function paintDots(){document.querySelectorAll('#dots .dot').forEach((d,i)=>d.classList.toggle('on',i<pin.length));}
const keys=document.getElementById('keys');
['1','2','3','4','5','6','7','8','9','Borrar','0','Volver'].forEach(k=>{
  const b=document.createElement('button'); b.type='button'; b.textContent=k; b.className=isNaN(k)?'fn':'';
  b.addEventListener('click',()=>press(k)); keys.appendChild(b);
});
function press(k){
  if(k==='Volver'){show('select');return;}
  if(k==='Borrar'){pin=pin.slice(0,-1);paintDots();return;}
  if(pin.length<4){pin+=k;paintDots();}
  if(pin.length===4){
    if(!pins[current]){pins[current]=pin;save();toast('PIN guardado');renderDash();show('dash');}
    else if(pin===pins[current]){renderDash();show('dash');}
    else{pin='';paintDots();toast('PIN incorrecto');}
  }
}
function doneList(){return progress[current]||[];}
function pct(){return Math.round((doneList().length/COURSES.length)*100);}
function unlockedIndex(){return doneList().length;}
function xp(){return doneList().length*50;}
function categories(){return ['Todos',...Array.from(new Set(COURSES.map(c=>c.cat)))];}
function catCounts(){const out={}; COURSES.forEach(c=>out[c.cat]=(out[c.cat]||0)+1); return out;}
function earnedBadges(){
  const done=doneList();
  const badges=[];
  if(done.length>=1) badges.push('Primer paso');
  if(done.length>=5) badges.push('Velocidad');
  if(done.length>=10) badges.push('Cierre');
  if(done.length>=20) badges.push('Renovador');
  if(done.length>=35) badges.push('Caso Pro');
  if(done.length>=50) badges.push('Marca');
  if(done.length>=COURSES.length) badges.push('Nivel Pro');
  return badges;
}
function missionText(){
  const done=doneList().length;
  if(done===0) return 'Complete su primer curso y active el modo agente pro.';
  if(done<5) return 'Complete 2 cursos de atención al cliente para ganar ritmo.';
  if(done<20) return 'Suba una sección completa y desbloquee un nuevo logro.';
  return 'Practique un caso avanzado y mejore cierres de renovación.';
}
function renderDash(){
  const done=doneList();
  const cats=categories();
  const counts=catCounts();
  const visible=COURSES.map((c,i)=>({...c,i})).filter(c=>activeCat==='Todos'||c.cat===activeCat);
  const a=avatarObj(current), m=mascotObj(current), badges=earnedBadges();
  document.getElementById('dash').innerHTML=`
  <div class="dashHead"><span class="avatar" style="background:${a.bg}">${a.emoji}</span><div style="flex:1"><h2>Hola, ${BASE_USERS[current].name}</h2><p>Agente de ventas · ${pct()}% completado · ${xp()} XP</p><div class="xp"><i style="width:${pct()}%"></i></div></div><button class="settings-btn" id="dashSettings" type="button">⚙️</button></div>
  <div class="coach-card"><div class="coach-emoji">${m.emoji}</div><div><b>${m.label}</b><span>${m.line}</span></div></div>
  <div class="daily-card"><h3>🎯 Misión de hoy</h3><p>${missionText()}</p><div class="mission-row"><span class="mission-chip">${COURSES.length} cursos</span><span class="mission-chip">${categories().length-1} secciones</span><span class="mission-chip">${badges.length} logros</span></div></div>
  <div class="stats"><div class="stat"><b>📚 ${done.length}</b><span>Cursos</span></div><div class="stat"><b>⭐ ${xp()}</b><span>XP</span></div><div class="stat"><b>🏆 ${badges.length}</b><span>Logros</span></div></div>
  <div class="achievement-card"><div class="achievement-title">🏅 Logros de superación</div><div class="badges">${['Primer paso','Velocidad','Cierre','Renovador','Caso Pro','Marca','Nivel Pro'].map(b=>`<span class="badge-pill ${badges.includes(b)?'on':''}">${badges.includes(b)?'✅':'🔒'} ${b}</span>`).join('')}</div></div>
  <div class="module-filter">${cats.map(c=>`<button type="button" class="filter-btn ${c===activeCat?'on':''}" data-cat="${c}">${c} ${c==='Todos'?`<span class="category-count">${COURSES.length}</span>`:`<span class="category-count">${counts[c]||0}</span>`}</button>`).join('')}</div>
  <div class="section">Ruta interactiva · desbloqueo por niveles</div>
  <div class="path">${visible.map(c=>`<button type="button" class="node ${done.includes(c.i)?'done':''} ${c.i===unlockedIndex()?'current':''} ${c.i>unlockedIndex()?'locked':''}" data-i="${c.i}"><div class="bubble">${done.includes(c.i)?'✅':c.icon}</div><div class="info"><b>${c.title}</b><small>Nivel ${c.i+1} · ${c.subtitle}</small><span class="cat">${c.cat}</span></div></button>`).join('')}</div>
  <button type="button" class="ghost" id="changeAgent">Cambiar agente</button><button type="button" class="ghost" id="backInicio">Volver a inicio</button>`;
  document.getElementById('dashSettings').addEventListener('click',()=>{renderSettings();show('settings');});
  document.querySelectorAll('.filter-btn').forEach(b=>b.addEventListener('click',()=>{activeCat=b.dataset.cat;renderDash();}));
  document.querySelectorAll('.node').forEach(n=>n.addEventListener('click',()=>{
    const i=Number(n.dataset.i);
    if(i>unlockedIndex()){toast('Complete el nivel anterior');return;}
    renderLesson(i);show('lesson');
  }));
  document.getElementById('changeAgent').addEventListener('click',()=>{renderUsers();show('select');});
  document.getElementById('backInicio').addEventListener('click',goHome);
}
function renderLesson(i){
  selectedAnswer=null;
  const c=COURSES[i], done=doneList().includes(i), m=mascotObj(current);
  document.getElementById('lesson').innerHTML=`<div class="lesson"><div class="meta">Nivel ${i+1} de ${COURSES.length} · ${c.cat}</div><div class="bigicon">${c.icon}</div><h2>${c.title}</h2><div class="lesson-coach"><div class="coach-emoji">${m.emoji}</div><p><b>${m.label}:</b> Lea el caso, escriba su respuesta y luego compare con el modelo antes de contestar el reto.</p></div><p><b>Objetivo:</b> ${c.goal}</p>
  <div class="case-card"><h3>📚 Caso Sublicuentas</h3><p>${c.case}</p></div>
  <div class="exercise-card"><h3>✍️ Práctica libre</h3><p>Escriba cómo respondería usted al cliente:</p><textarea class="practice-area" id="practiceText" placeholder="Ejemplo: Buen día, con gusto le ayudo..."></textarea><button type="button" class="ghost" id="comparePractice">Comparar con modelo</button><div class="practice-result" id="practiceResult">✅ Revise que su respuesta tenga: saludo, solución clara, siguiente paso y tono profesional.</div></div>
  <div class="exercise-card"><h3>🧠 Respuesta modelo</h3><div class="script">${c.script}</div></div>
  <div class="exercise-card"><h3>🎯 Reto interactivo</h3><p>${c.quiz}</p><div class="choices">${c.answers.map((answer,idx)=>`<button type="button" class="choice" data-answer="${idx}">${idx+1}. ${answer}</button>`).join('')}</div><div class="feedback" id="feedback">Seleccione la mejor respuesta para activar el botón de completar.</div></div>
  <button type="button" class="primary" id="completeLevel" ${done?'':'disabled'}> ${done?'Nivel completado · volver a ruta':'Completar nivel'}</button><button type="button" class="ghost" id="backRoute">Volver a ruta</button></div>`;
  document.getElementById('comparePractice').addEventListener('click',()=>{document.getElementById('practiceResult').classList.add('show');toast('Práctica revisada');});
  document.querySelectorAll('.choice').forEach(btn=>btn.addEventListener('click',()=>{
    const ans=Number(btn.dataset.answer); selectedAnswer=ans;
    document.querySelectorAll('.choice').forEach(x=>x.classList.remove('good','bad'));
    if(ans===c.correct){btn.classList.add('good');document.getElementById('feedback').textContent='Correcto. Esta respuesta protege la venta y mantiene tono profesional.';}
    else{btn.classList.add('bad');document.querySelector(`.choice[data-answer="${c.correct}"]`).classList.add('good');document.getElementById('feedback').textContent='Casi. Revise la respuesta marcada en verde y complete el aprendizaje.';}
    document.getElementById('completeLevel').disabled=false;
  }));
  document.getElementById('completeLevel').addEventListener('click',()=>complete(i));
  document.getElementById('backRoute').addEventListener('click',()=>{renderDash();show('dash');});
}
function renderSettings(){
  const a=avatarObj(current), m=mascotObj(current);
  document.getElementById('settings').innerHTML=`<div class="settings-panel"><h2>⚙️ Ajustes de agente</h2><p>Cambie avatar, mascota coach y estilo de aprendizaje de ${BASE_USERS[current].name}.</p>
  <div class="coach-card"><div class="coach-emoji" style="background:${a.bg}">${a.emoji}</div><div><b>${BASE_USERS[current].name}</b><span>Avatar actual · ${a.label}</span></div></div>
  <div class="setting-title">Avatar del agente</div><div class="mini-note">No usamos imágenes oficiales; son avatares 2D inspirados en fantasía, superhéroes, magia, aventura y mascota.</div>
  <div class="avatar-grid">${AVATARS.map(x=>`<button type="button" class="avatar-option ${x.id===a.id?'on':''}" data-avatar="${x.id}"><span class="avbig" style="background:${x.bg}">${x.emoji}</span><span>${x.label}</span></button>`).join('')}</div>
  <div class="setting-title">Mascota coach</div><div class="mini-note">La mascota aparece dentro de las clases como guía, estilo app de aprendizaje.</div>
  <div class="avatar-grid">${MASCOTS.map(x=>`<button type="button" class="avatar-option ${x.id===m.id?'on':''}" data-mascot="${x.id}"><span class="avbig">${x.emoji}</span><span>${x.label}</span></button>`).join('')}</div>
  <div class="reset-row"><button type="button" class="ghost success" id="saveSettings">Guardar cambios</button><button type="button" class="ghost danger" id="resetPin">Cambiar PIN</button></div>
  <button type="button" class="ghost" id="backDash">Volver a la ruta</button></div>`;
  document.querySelectorAll('[data-avatar]').forEach(b=>b.addEventListener('click',()=>{ensureProfile(current).avatar=b.dataset.avatar;save();renderSettings();renderUsers();toast('Avatar actualizado');}));
  document.querySelectorAll('[data-mascot]').forEach(b=>b.addEventListener('click',()=>{ensureProfile(current).mascot=b.dataset.mascot;save();renderSettings();toast('Mascota actualizada');}));
  document.getElementById('saveSettings').addEventListener('click',()=>{renderDash();show('dash');});
  document.getElementById('resetPin').addEventListener('click',()=>{if(confirm('¿Cambiar PIN de este agente? Se pedirá crear uno nuevo.')){delete pins[current]; save(); toast('PIN eliminado'); pin=''; paintDots(); document.getElementById('pinName').textContent=BASE_USERS[current].name; const av=avatarObj(current); document.getElementById('pinAvatar').textContent=av.emoji; document.getElementById('pinAvatar').style.background=av.bg; document.getElementById('pinHelp').textContent='Cree su PIN nuevo de 4 dígitos'; show('pin');}});
  document.getElementById('backDash').addEventListener('click',()=>{renderDash();show('dash');});
}
function confetti(){['✨','⭐','💎','🏆','🎉','⚡'].forEach((e,i)=>{const s=document.createElement('span');s.className='confetti';s.textContent=e;s.style.left='50%';s.style.top='52%';s.style.setProperty('--x',`${(Math.random()*260-130)}px`);s.style.setProperty('--y',`${(Math.random()*-240-60)}px`);document.body.appendChild(s);setTimeout(()=>s.remove(),1200);});}
function complete(i){
  progress[current]=progress[current]||[];
  if(!progress[current].includes(i)){
    progress[current].push(i);progress[current].sort((a,b)=>a-b);
    const p=ensureProfile(current); const tk=todayKey(); if(p.lastDay!==tk){p.streak=(p.lastDay?((new Date(tk)-new Date(p.lastDay))/(86400000)===1?p.streak+1:1):1);p.lastDay=tk;}
    save(); confetti();
    const msg=(progress[current].length%8===0) ? '🏆 Sección dominada · logro desbloqueado' : '+50 XP · nuevo nivel desbloqueado';
    toast(msg);
  }
  renderDash();show('dash');
}
</script>
</body>
</html>
