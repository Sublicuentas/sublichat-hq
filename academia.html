<style id="academia-style">
  @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700&display=swap');

  #academia-root, #academia-root * { box-sizing: border-box; margin: 0; padding: 0; }

  #academia-root {
    --bg:        #0d0f17;
    --bg-2:      #141826;
    --card:      #1a1f30;
    --card-2:    #212740;
    --line:      #2a3150;
    --text:      #eef1fb;
    --muted:     #8b93b5;
    --gold:      #f6b73c;
    --gold-soft: #ffd684;
    --teal:      #2fd6b0;
    --rose:      #ff6b8b;
    --indigo:    #6c7bff;
    --ok:        #2fd6b0;
    --shadow:    0 24px 60px -20px rgba(0,0,0,.7);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    position: fixed; inset: 0;
    z-index: 9999;
    background:
      radial-gradient(900px 500px at 85% -10%, rgba(246,183,60,.10), transparent 60%),
      radial-gradient(800px 600px at -10% 110%, rgba(108,123,255,.14), transparent 55%),
      var(--bg);
    overflow-y: auto;
    display: block;
  }
  #academia-root.open { display: block; }

  #academia-root .wrap { max-width: 920px; margin: 0 auto; padding: 22px 18px 60px; }

  #academia-root h1, #academia-root h2, #academia-root h3, #academia-root .display {
    font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; letter-spacing: -.02em;
  }

  /* top bar */
  #academia-root .topbar {
    display:flex; align-items:center; justify-content:space-between;
    padding: 6px 2px 18px;
  }
  #academia-root .brand { display:flex; align-items:center; gap:11px; }
  #academia-root .brand .glyph {
    width:42px; height:42px; border-radius:13px; display:grid; place-items:center;
    font-size:21px;
    background: linear-gradient(145deg, var(--gold), #d98a1f);
    box-shadow: 0 8px 22px -8px rgba(246,183,60,.7);
  }
  #academia-root .brand b { font-family:'Bricolage Grotesque'; font-size:18px; }
  #academia-root .brand small { display:block; color:var(--muted); font-size:11.5px; margin-top:-1px; }
  #academia-root .btn-ghost {
    background:transparent; border:1px solid var(--line); color:var(--muted);
    padding:9px 14px; border-radius:11px; font-family:'DM Sans'; font-weight:600;
    font-size:13px; cursor:pointer; transition:.18s;
  }
  #academia-root .btn-ghost:hover { color:var(--text); border-color:var(--muted); }

  /* demo banner */
  #academia-root .demo-banner {
    background: rgba(246,183,60,.08); border:1px solid rgba(246,183,60,.3);
    color: var(--gold-soft); border-radius:12px; padding:10px 14px; font-size:12.5px;
    margin-bottom:18px; display:flex; gap:9px; align-items:center;
  }

  /* ---------- USER SELECT ---------- */
  #academia-root .screen { animation: fade .35s ease; }
  @keyframes fade { from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;} }

  #academia-root .hero { text-align:center; padding:34px 0 26px; }
  #academia-root .hero .kicker {
    color:var(--gold); font-weight:700; font-size:12px; letter-spacing:.18em; text-transform:uppercase;
  }
  #academia-root .hero h1 { font-size:clamp(30px,7vw,46px); margin:8px 0 10px; line-height:1.02; }
  #academia-root .hero p { color:var(--muted); max-width:460px; margin:0 auto; font-size:14.5px; }

  #academia-root .user-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:26px; }
  @media(max-width:520px){ #academia-root .user-grid{ grid-template-columns:1fr; } }
  #academia-root .user-card {
    background: linear-gradient(160deg, var(--card), var(--card-2));
    border:1px solid var(--line); border-radius:22px; padding:30px 22px; cursor:pointer;
    text-align:center; transition:.2s; position:relative; overflow:hidden;
  }
  #academia-root .user-card:hover { transform:translateY(-4px); border-color:var(--gold); box-shadow:var(--shadow); }
  #academia-root .user-card .avatar {
    width:78px; height:78px; border-radius:50%; margin:0 auto 14px; display:grid; place-items:center;
    font-family:'Bricolage Grotesque'; font-weight:800; font-size:30px; color:#0d0f17;
  }
  #academia-root .user-card.libni .avatar { background:linear-gradient(145deg,var(--gold),var(--gold-soft)); }
  #academia-root .user-card.naara .avatar { background:linear-gradient(145deg,var(--teal),#86f3da); }
  #academia-root .user-card h3 { font-size:22px; }
  #academia-root .user-card .lvl { color:var(--muted); font-size:13px; margin-top:4px; }

  /* ---------- PIN ---------- */
  #academia-root .pin-box { max-width:340px; margin:30px auto 0; text-align:center; }
  #academia-root .pin-dots { display:flex; justify-content:center; gap:14px; margin:22px 0; }
  #academia-root .pin-dots .dot {
    width:16px; height:16px; border-radius:50%; border:2px solid var(--line); transition:.15s;
  }
  #academia-root .pin-dots .dot.on { background:var(--gold); border-color:var(--gold); transform:scale(1.1); }
  #academia-root .pin-dots.err .dot { border-color:var(--rose); animation:shake .4s; }
  @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-7px);} 75%{transform:translateX(7px);} }
  #academia-root .keypad { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
  #academia-root .keypad button {
    aspect-ratio:1.6; background:var(--card); border:1px solid var(--line); border-radius:14px;
    color:var(--text); font-family:'Bricolage Grotesque'; font-weight:700; font-size:22px; cursor:pointer; transition:.12s;
  }
  #academia-root .keypad button:hover { background:var(--card-2); }
  #academia-root .keypad button:active { transform:scale(.95); }

/* ===========================================================================
   3)  ESTADO + FIREBASE (con modo demo / memoria)
=========================================================================== */
let db = null, DB_MODE = "memory";
const memStore = {};            // fallback en memoria
let current = null;             // userId activo
let progress = { xp:0, badges:[], levels:{} };
let pinBuffer = "";
let nav = { view:"users", trackId:null, levelIdx:null };
let quizState = null;

function initFirebase(){
  try {
    if (firebaseConfig.apiKey && !firebaseConfig.apiKey.startsWith("PEGA") && window.firebase) {
      if (!firebase.apps || !firebase.apps.length) firebase.initializeApp(firebaseConfig);
      db = firebase.firestore();
      DB_MODE = "firestore";
    } else {
      DB_MODE = "memory";
    }
  } catch(e){ console.warn("Academia: Firebase no inició, modo demo.", e); DB_MODE="memory"; }
}

async function loadProgress(userId){
  if (DB_MODE === "firestore"){
    try {
      const snap = await db.collection("academia_progreso").doc(userId).get();
      return snap.exists ? snap.data() : { xp:0, badges:[], levels:{} };
    } catch(e){ console.warn(e); }
  }
  return memStore[userId] ? JSON.parse(JSON.stringify(memStore[userId])) : { xp:0, badges:[], levels:{} };
}

async function saveProgress(userId, data){
  if (DB_MODE === "firestore"){
    try { await db.collection("academia_progreso").doc(userId).set(data, {merge:true}); return; }
    catch(e){ console.warn(e); }
  }
  memStore[userId] = JSON.parse(JSON.stringify(data));
}

// Lee el PIN guardado de un usuario (null si todavía no creó uno)
async function loadUserAuth(userId){
  if (DB_MODE === "firestore"){
    try {
      const snap = await db.collection("academia_progreso").doc(userId).get();
      return snap.exists ? snap.data() : null;
    } catch(e){ console.warn(e); }
  }
  return memStore[userId] || null;
}

// Guarda el PIN del usuario sin tocar su avance
async function savePin(userId, pin){
  if (DB_MODE === "firestore"){
    try { await db.collection("academia_progreso").doc(userId).set({pin}, {merge:true}); return; }
    catch(e){ console.warn(e); }
  }
  memStore[userId] = Object.assign({xp:0,badges:[],levels:{}}, memStore[userId]||{}, {pin});
}

/* ===========================================================================
   4)  HELPERS
=========================================================================== */
const $ = id => document.getElementById(id);
const screen = () => $("aca-screen");
const levelKey = (trackId, idx) => `${trackId}-${idx}`;

function isUnlocked(trackId, idx){
  if (idx === 0) return true;
  return !!(progress.levels[levelKey(trackId, idx-1)]?.completed);
}
function trackDone(trackId){
  const tr = TRACKS.find(t=>t.id===trackId);
  return tr.levels.every((_,i)=> progress.levels[levelKey(trackId,i)]?.completed);
}
function trackProgress(trackId){
  const tr = TRACKS.find(t=>t.id===trackId);
  const done = tr.levels.filter((_,i)=> progress.levels[levelKey(trackId,i)]?.completed).length;
  return { done, total: tr.levels.length, pct: Math.round(done/tr.levels.length*100) };
}
function totalLevels(){ return TRACKS.reduce((s,t)=>s+t.levels.length,0); }

function toast(msg){
  const t=$("aca-toast"); t.textContent=msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 2600);
}

    if (nav.view==="track") return renderTrack();
    if (nav.view==="lesson")return renderLesson();
    if (nav.view==="quiz")  return renderQuiz();
    if (nav.view==="result")return renderResult();
    nav={view:"users"}; return renderUsers();

}

function shade(hex){ // versión más oscura para el degradado del banner
  const n=parseInt(hex.slice(1),16);
  const r=Math.max(0,(n>>16)-40), g=Math.max(0,((n>>8)&255)-40), b=Math.max(0,(n&255)-40);
  return `#${((r<<16)|(g<<8)|b).toString(16).padStart(6,'0')}`;
}

=========================================================================== */
initFirebase();   // intenta conectar a Firebase; si no hay config válida, queda en modo demo

return {
  abrir(){
    const root=$("academia-root");
    if(!root) return;
    root.classList.add("open");
    if (DB_MODE==="memory" && document.querySelector("#academia-root .demo-banner")===null && firebaseConfig.apiKey.startsWith("PEGA")){
      // mostramos aviso de demo una vez
    }
    nav = current ? {view:"dash"} : {view:"users"};
    render();
    if (DB_MODE==="memory"){
      const w=document.querySelector("#academia-root .wrap");
      if(!document.getElementById("aca-demo")){
        const d=document.createElement("div");
        d.id="aca-demo"; d.className="demo-banner";
        d.innerHTML="⚙️ Modo demo — pegá tu config de Firebase en el código para guardar el avance de forma permanente.";
        w.insertBefore(d, $("aca-screen"));
      }
    }
  },
  cerrar(){ location.href = "index.html"; },
  go(v){ if(v==='users'){pinBuffer="";} nav={view:v, trackId:nav.trackId, levelIdx:nav.levelIdx}; render(); },

  async pickUser(id){
    pinBuffer="";
    const auth = await loadUserAuth(id);
    if (auth && auth.pin){
      nav = { view:"pin", _pending:id, _mode:"verify", _storedPin:auth.pin };
    } else {
      nav = { view:"pin", _pending:id, _mode:"create", _step:1, _first:null };
    }
    render();
  },
  pinKey(n){
    if(pinBuffer.length>=4) return;
    pinBuffer+=n;
    const dots=$("aca-dots");
    if(dots) dots.innerHTML=[0,1,2,3].map(i=>`<div class="dot ${i<pinBuffer.length?'on':''}"></div>`).join("");
    if(pinBuffer.length===4) setTimeout(()=>this.checkPin(),180);
  },
  pinDel(){
    pinBuffer=pinBuffer.slice(0,-1);
    const dots=$("aca-dots");
    if(dots) dots.innerHTML=[0,1,2,3].map(i=>`<div class="dot ${i<pinBuffer.length?'on':''}"></div>`).join("");
  },
  _pinError(){
    const dots=$("aca-dots");
    if(dots){ dots.classList.add("err"); setTimeout(()=>dots.classList.remove("err"),420); }
    pinBuffer="";
    setTimeout(()=>{ const d=$("aca-dots"); if(d) d.innerHTML=[0,1,2,3].map(()=>`<div class="dot"></div>`).join(""); },200);
  },
  async _entrar(id){
    current=id;
    progress=await loadProgress(id);
    if(!progress || !progress.levels) progress={xp:0,badges:[],levels:{}};
    nav={view:"dash"};
    render();
  },
  async checkPin(){
    const id=nav._pending;
    // MODO CREAR: primer ingreso
    if(nav._mode==="create" && nav._step===1){
      nav._first = pinBuffer;
      nav._step = 2;
      pinBuffer = "";
      render();
      return;
    }
    // MODO CREAR: confirmación
    if(nav._mode==="create" && nav._step===2){
      if(pinBuffer === nav._first){
        await savePin(id, pinBuffer);
        toast("✅ PIN creado");
        await this._entrar(id);
      } else {
        toast("Los PIN no coincidieron, probá de nuevo");
        nav._step = 1; nav._first = null;
        this._pinError();
      }
      return;
    }
    // MODO VERIFICAR
    if(pinBuffer === nav._storedPin){
      await this._entrar(id);
    } else {
      this._pinError();
    }
  },
  logout(){ current=null; progress={xp:0,badges:[],levels:{}}; pinBuffer=""; nav={view:"users"}; render(); },

  openTrack(id){ nav={view:"track", trackId:id}; render(); window.scrollTo(0,0); },
  openLesson(id,i){
    if(!isUnlocked(id,i)){ toast("Completá el nivel anterior primero 🔒"); return; }
    nav={view:"lesson", trackId:id, levelIdx:i}; render(); window.scrollTo(0,0);
  },
  startQuiz(){
    const t=TRACKS.find(x=>x.id===nav.trackId);
    quizState={ answers:new Array(t.levels[nav.levelIdx].quiz.length).fill(null) };
    nav={...nav, view:"quiz"}; render(); window.scrollTo(0,0);
  },
  answer(qi,oi){ quizState.answers[qi]=oi; render(); },
  async submitQuiz(){
    const t=TRACKS.find(x=>x.id===nav.trackId);
    const quiz=t.levels[nav.levelIdx].quiz;
    let correct=0;
    quiz.forEach((qq,qi)=>{ if(quizState.answers[qi]===qq.a) correct++; });
    const pct=Math.round(correct/quiz.length*100);
    const passed=pct>=PASS*100;
    let xpWon=0, badge=null;

    if(passed){
      const key=levelKey(nav.trackId,nav.levelIdx);
      const prev=progress.levels[key];
      const firstTime=!prev?.completed;
      progress.levels[key]={ completed:true, best:Math.max(pct, prev?.best||0) };
      if(firstTime){ xpWon=XP_PER_LEVEL; progress.xp+=XP_PER_LEVEL; }
      // insignia si completó toda la ruta
      if(trackDone(nav.trackId) && !progress.badges.includes(nav.trackId)){
        progress.badges.push(nav.trackId);
        badge=t.name;
      }
      await saveProgress(current, progress);
    }
    quizState.result={ pct, correct, total:quiz.length, xpWon, badge };
    nav={...nav, view:"result"}; render(); window.scrollTo(0,0);
  },
  afterPass(){
    const t=TRACKS.find(x=>x.id===nav.trackId);
    const next=nav.levelIdx+1;
    if(next<t.levels.length){ nav={view:"track", trackId:nav.trackId}; }
    else { nav={view:"dash"}; toast("🏅 ¡Ruta completada, felicidades!"); }
    render(); window.scrollTo(0,0);
  }
};
})();

// El Aula se abre sola al cargar la página (a prueba de timing)
(function(){
  function go(){ try { Academia.abrir(); } catch(e){ console.error("Academia:", e); } }
  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", go);
  else go();
})();
</script>

<script id="academia-focus-total-js-v3">
(function(){
  function patchAcademia(){
    try{
      document.querySelectorAll('#academia-root .user-card').forEach((card,i)=>{
        card.classList.toggle('naara', /naara/i.test(card.textContent));
        let role=card.querySelector('.user-role');
        if(!role){ role=document.createElement('div'); role.className='user-role'; card.prepend(role); }
        role.textContent='AGENTE DE VENTAS';
        const lvl=card.querySelector('.lvl'); if(lvl) lvl.textContent='Ruta comercial · acceso por PIN';
        const enter=card.querySelector('.enter'); if(enter) enter.textContent='Entrar';
      });
      document.querySelectorAll('#academia-root .user-card h3').forEach(h=>{ if(/libni/i.test(h.textContent)) h.textContent='Lic'; });
      const title=[...document.querySelectorAll('#academia-root h1')].find(x=>/Aula|Academia|entrenamiento/i.test(x.textContent));
      if(title) title.textContent='Entrena su mente de ventas';
      const p=[...document.querySelectorAll('#academia-root .hero p,#academia-root .academy-hero-pro p')][0];
      if(p) p.textContent='Rutas cortas, retos diarios y práctica comercial para vender más sin aburrirse.';
    }catch(e){console.warn(e)}
  }
  document.addEventListener('DOMContentLoaded',patchAcademia);
  setTimeout(patchAcademia,800);
  setTimeout(patchAcademia,1800);
})();
</script>
